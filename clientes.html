<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Plagaway · Clientes</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0d0d;--bg2:#141414;--bg3:#1c1c1c;--border:#272727;--border2:#1e1e1e;--y:#f5c800;--y2:#c9a200;--y3:#7a6100;--y4:#1a1600;--tx:#f5f0e8;--tx2:#c8c0b0;--mu:#888880;--mu2:#555550;--mu3:#333330;--red:#ff4444;--blue:#4ac8f0;--green:#72c040;--orange:#ff8844}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Helvetica Neue',Arial,sans-serif;overscroll-behavior:none;font-size:15px}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.hdr{padding:13px 18px 10px;border-bottom:2px solid var(--y3);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--bg);z-index:20}
.logo-wm{font-size:22px;font-weight:900;color:var(--tx);letter-spacing:-1px;line-height:1}.logo-wm b{color:var(--y)}
.logo-pill{background:var(--y);color:#0d0d0d;font-size:7px;font-weight:900;letter-spacing:.15em;padding:3px 6px;text-transform:uppercase;align-self:flex-start;margin-top:2px}
.hdr-row{display:flex;align-items:center;gap:8px}
.hdr-sub{font-size:9px;color:var(--mu2);margin-top:4px}
.hdr-right{display:flex;gap:7px;align-items:center;margin-top:2px}
.btn-sm{background:transparent;border:1px solid var(--border);color:var(--mu);padding:7px 11px;font-size:9px;font-weight:700;letter-spacing:.1em;cursor:pointer;text-transform:uppercase;font-family:inherit}
.cnt{padding:18px 18px 40px;flex:1}
.fade{animation:fu .22s ease both}
@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.st{margin-bottom:16px;display:flex;align-items:baseline;gap:10px}
.st-n{font-size:10px;font-weight:900;color:#0d0d0d;background:var(--y);padding:3px 7px;letter-spacing:.1em;flex-shrink:0}
.st-h{font-size:18px;font-weight:700;color:var(--tx)}
.lbl{font-size:10px;font-weight:700;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;display:block}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.inp{background:var(--bg2);border:1px solid var(--border);color:var(--tx);padding:10px 12px;font-family:inherit;font-size:13px;outline:none;width:100%}
.inp:focus{border-color:var(--y)}
.blk{margin-bottom:18px}
.cta{width:100%;background:var(--y);color:#0d0d0d;border:none;padding:15px;font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-family:inherit;font-weight:900;cursor:pointer;margin-top:10px;transition:opacity .15s}
.cta:active{opacity:.85}
.cta.sec{background:transparent;border:1px solid var(--border);color:var(--mu);font-weight:700}
.cta.oy{background:transparent;border:2px solid var(--y);color:var(--y);font-weight:900}
.cta.og{background:transparent;border:2px solid var(--green);color:var(--green);font-weight:900}
.cta.ob{background:transparent;border:2px solid var(--blue);color:var(--blue);font-weight:900}
.s-row{display:flex;gap:8px;margin-bottom:12px}
.s-inp{flex:1;background:var(--bg2);border:1px solid var(--border);color:var(--tx);padding:10px 12px;font-family:inherit;font-size:13px;outline:none}
.s-inp:focus{border-color:var(--y)}
.sbadge{display:inline-flex;align-items:center;font-size:9px;font-weight:800;padding:3px 8px;letter-spacing:.08em;text-transform:uppercase;border-radius:2px;cursor:pointer;border:1px solid}
.sb-residencial{background:#001a2e;color:var(--blue);border-color:var(--blue)}
.sb-comercial{background:#1a1600;color:var(--y);border-color:var(--y)}
.sb-industrial{background:#001a0a;color:var(--green);border-color:var(--green)}
.sb-none{background:#1c1c1c;color:var(--mu);border-color:var(--border)}
.card-cli{background:var(--bg2);border:1px solid var(--border);padding:13px 14px;margin-bottom:7px;cursor:pointer;transition:all .12s}
.card-cli:active{transform:scale(.98)}
.card-cli:hover{border-color:var(--y3)}
.cli-name{font-size:14px;font-weight:700;color:var(--tx);margin-bottom:4px}
.cli-meta{font-size:10px;color:var(--mu2)}
.cli-del{background:transparent;border:none;color:var(--mu3);font-size:16px;cursor:pointer;padding:2px 6px;font-weight:700}
.ibar{padding:10px 13px;background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--y);font-size:11px;color:var(--mu);margin-bottom:12px;line-height:1.5}
.ibar strong{color:var(--y)}
.crow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border2)}
.crow:last-child{border-bottom:none}
.crl{font-size:11px;color:var(--mu)}.crv{font-size:12px;font-weight:600;text-align:right;max-width:60%}
.hist-mini{background:var(--bg2);border:1px solid var(--border);padding:10px 14px;margin-bottom:6px}
.sbadge-borrador{background:#111;color:var(--mu);border-color:var(--border)}
.sbadge-enviada{background:#001a2e;color:var(--blue);border-color:var(--blue)}
.sbadge-aprobada{background:#001a0a;color:var(--green);border-color:var(--green)}
.sbadge-rechazada{background:#1a0000;color:var(--red);border-color:var(--red)}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div>
      <div class="hdr-row"><div class="logo-wm">PLAGA<b>W</b>AY</div><div class="logo-pill">Clientes</div></div>
      <div class="hdr-sub" id="cs"><span style="width:7px;height:7px;border-radius:50%;background:var(--mu3);display:inline-block;margin-right:4px"></span>Conectando...</div>
    </div>
    <div class="hdr-right">
      <button class="btn-sm" id="btn-new" style="display:none">+ Nuevo</button>
      <button class="btn-sm" onclick="try{window.close()}catch(e){window.location.href='index.html'}">← App</button>
    </div>
  </div>
  <div class="cnt fade" id="cnt"></div>
</div>

<script type="module">
import{initializeApp,getApps}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getFirestore,doc,getDoc,setDoc,onSnapshot,collection,addDoc,updateDoc,deleteDoc,query,orderBy}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const CFG={apiKey:"AIzaSyCGz0t2xfeiMxYIcgVVQTp0bCHY6scIR_w",authDomain:"calculadora-plagaway.firebaseapp.com",projectId:"calculadora-plagaway",storageBucket:"calculadora-plagaway.firebasestorage.app",messagingSenderId:"257562908832",appId:"1:257562908832:web:14f673952eabba313c51c5"};
const fbApp=getApps().length===0?initializeApp(CFG):getApps()[0];
const fs=getFirestore(fbApp);
async function fAdd(p,d){try{return await addDoc(collection(fs,p),{...d,ts:Date.now()})}catch{return null}}
async function fUpd(p,d){try{await updateDoc(doc(fs,p),d);return true}catch{return false}}
async function fDel(p){try{await deleteDoc(doc(fs,p));return true}catch{return false}}
window.FB2={fAdd,fUpd,fDel};
onSnapshot(query(collection(fs,'clientes'),orderBy('ts','desc')),snap=>{window._clientes=snap.docs.map(d=>({...d.data(),_id:d.id}));window._cliready=true;updCS();if(window._cliRender)window._cliRender()});
onSnapshot(query(collection(fs,'history'),orderBy('ts','desc')),snap=>{window._hist=snap.docs.map(d=>({...d.data(),_id:d.id}))});
onSnapshot(doc(fs,'config/shared'),snap=>{if(snap.exists()){const d=snap.data();if(d.adminPin)window._apin=d.adminPin;if(d.techPin)window._tpin=d.techPin}});
function updCS(){const e=document.getElementById('cs');if(!e)return;e.innerHTML=window._cliready?`<span class="sync-dot" style="background:var(--green)"></span>Sincronizado · ${(window._clientes||[]).length} clientes`:`<span style="width:7px;height:7px;border-radius:50%;background:var(--mu3);display:inline-block;margin-right:4px"></span>Conectando...`;window.updCSMain&&window.updCSMain();}
window.updCS=updCS;
</script>

<script>
const db={get:k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}},set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))};
const TIPOS=['Residencial','Comercial','Industrial'];
const TIPO_CLS={Residencial:'sb-residencial',Comercial:'sb-comercial',Industrial:'sb-industrial'};
const ESTADO_CLS={Borrador:'sbadge-borrador',Enviada:'sbadge-enviada',Aprobada:'sbadge-aprobada',Rechazada:'sbadge-rechazada'};
const fmt=n=>'$'+Math.round(n).toLocaleString('es-MX');

function isAdmin(){return window._cliRole==='admin'}
function getClientes(){return window._clientes||[]}
function getHist(){return window._hist||[]}

// Check PIN on load
function checkAccess(){
  const saved=sessionStorage.getItem('pw_cli_role');
  if(saved){window._cliRole=saved;init();return}
  const ps=document.createElement('div');
  ps.style.cssText='position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:999;padding:20px';
  let buf='',selRole='tech';
  function draw(err=''){
    ps.innerHTML=`<div style="font-size:28px;font-weight:900;color:var(--tx)">PLAGA<span style="color:var(--y)">W</span>AY</div>
    <div style="font-size:11px;color:var(--mu2);text-transform:uppercase;letter-spacing:.1em">Módulo de Clientes</div>
    <div style="display:flex;gap:10px">
      <div style="flex:1;padding:10px;border:1px solid ${selRole==='tech'?'var(--y)':'var(--border)'};background:${selRole==='tech'?'var(--y4)':'var(--bg2)'};cursor:pointer;text-align:center;font-size:12px;font-weight:700;color:${selRole==='tech'?'var(--y)':'var(--mu)'}" onclick="this.parentElement._sr('tech')">👷 Técnico</div>
      <div style="flex:1;padding:10px;border:1px solid ${selRole==='admin'?'var(--y)':'var(--border)'};background:${selRole==='admin'?'var(--y4)':'var(--bg2)'};cursor:pointer;text-align:center;font-size:12px;font-weight:700;color:${selRole==='admin'?'var(--y)':'var(--mu)'}" onclick="this.parentElement._sr('admin')">🔑 Admin</div>
    </div>
    <div style="display:flex;gap:12px">${[0,1,2,3].map(i=>`<div style="width:13px;height:13px;border-radius:50%;border:2px solid var(--border);${buf.length>i?'background:var(--y);border-color:var(--y)':''}"></div>`).join('')}</div>
    <div style="color:var(--red);font-size:11px;font-weight:700;min-height:15px">${err}</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:220px">
      ${[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k=>`<button style="background:var(--bg2);border:1px solid var(--border);color:var(--tx);font-size:20px;font-weight:600;padding:16px;cursor:pointer;border-radius:50%;font-family:inherit;visibility:${k===''?'hidden':'visible'}" onclick="this.closest('[data-pin]')._pk('${k}')">${k}</button>`).join('')}
    </div>`;
    ps.setAttribute('data-pin','1');
    ps._sr=r=>{selRole=r;draw()};
    ps._pk=k=>{if(k==='⌫'){buf=buf.slice(0,-1);draw();return}if(buf.length>=4)return;buf+=k;draw();if(buf.length===4)setTimeout(()=>check(buf),120)};
  }
  function check(entered){
    const ap=window._apin||'1234',tp=window._tpin||'0000';
    if(selRole==='admin'&&entered===ap){unlock('admin')}
    else if(selRole==='tech'&&entered===tp){unlock('tech')}
    else{buf='';draw('PIN incorrecto')}
  }
  function unlock(role){window._cliRole=role;sessionStorage.setItem('pw_cli_role',role);ps.remove();init()}
  document.body.appendChild(ps);draw();
}

function init(){
  document.getElementById('btn-new').style.display=isAdmin()?'':'none';
  document.getElementById('btn-new').onclick=showNew;
  window._cliRender=()=>{if(window._currentView==='list')showList()};
  showList();
}

function showList(){
  window._currentView='list';
  const sq=db.get('pw_clq')||'',sf=db.get('pw_clf')||'Todos';
  let lista=getClientes();
  if(sf!=='Todos')lista=lista.filter(x=>x.tipo===sf);
  if(sq)lista=lista.filter(x=>(x.nombre+x.email+x.tel+x.direccion+'').toLowerCase().includes(sq.toLowerCase()));
  const c=document.getElementById('cnt');c.className='cnt fade';void c.offsetWidth;
  c.innerHTML=`<div class="st"><span class="st-n">👥</span><span class="st-h">Directorio de Clientes</span></div>
  <div class="s-row">
    <input class="s-inp" id="sq" placeholder="🔍 Buscar por nombre, email, tel..." value="${sq}" oninput="db.set('pw_clq',this.value);showList()">
  </div>
  <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
    ${['Todos',...TIPOS].map(t=>`<button class="sbadge ${t==='Todos'?'sb-none':TIPO_CLS[t]||'sb-none'}" style="${sf===t?'':'opacity:.45'}" onclick="db.set('pw_clf','${t}');showList()">${t}</button>`).join('')}
  </div>
  ${lista.length===0?`<div style="text-align:center;padding:50px 20px;color:var(--mu3)"><div style="font-size:36px;margin-bottom:12px">👥</div><div style="font-size:14px;font-weight:700;margin-bottom:8px">${getClientes().length===0?'Sin clientes registrados':'Sin resultados'}</div>${getClientes().length===0&&isAdmin()?`<div style="font-size:12px;color:var(--mu2);margin-bottom:14px">Registra tu primer cliente para tener acceso rápido al cotizar.</div><button class="cta" style="max-width:240px" onclick="showNew()">+ Agregar cliente</button>`:''}
  </div>`:lista.map(cli=>`<div class="card-cli" onclick="showDetail('${cli._id}')">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div style="flex:1">
        <div class="cli-name">${cli.nombre||'Sin nombre'}</div>
        <div class="cli-meta" style="margin-top:3px">${cli.tipo?`<span class="sbadge ${TIPO_CLS[cli.tipo]||'sb-none'}">${cli.tipo}</span> `:''}${cli.tel||''}</div>
        ${cli.email?`<div class="cli-meta" style="margin-top:2px">✉️ ${cli.email}</div>`:''}
        ${cli.direccion?`<div class="cli-meta" style="margin-top:2px">📍 ${cli.direccion}</div>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        ${isAdmin()?`<button class="cli-del" onclick="event.stopPropagation();doDelCli('${cli._id}')">✕</button>`:''}
        <span style="font-size:18px;color:var(--mu3)">›</span>
      </div>
    </div>
  </div>`).join('')}
  ${isAdmin()&&lista.length>0?`<div style="margin-top:12px;text-align:right"><button class="btn-sm" onclick="showNew()">+ Nuevo cliente</button></div>`:''}`;
}

function showNew(){
  window._currentView='new';
  const c=document.getElementById('cnt');c.className='cnt fade';void c.offsetWidth;
  c.innerHTML=`<div class="st"><span class="st-n">👥</span><span class="st-h">Nuevo cliente</span></div>
  <div class="blk">
    <input class="inp" id="cn" placeholder="Nombre completo o empresa *" style="margin-bottom:7px">
    <input class="inp" id="cd" placeholder="Dirección" style="margin-bottom:7px">
    <input class="inp" id="ct" placeholder="Teléfono" style="margin-bottom:7px">
    <input class="inp" id="ce" placeholder="Email" style="margin-bottom:7px">
    <input class="inp" id="cr" placeholder="RFC (opcional)" style="margin-bottom:7px">
    <select class="inp" id="ctipo" style="color:var(--mu)">
      <option value="">— Tipo de cliente —</option>
      ${TIPOS.map(t=>`<option>${t}</option>`).join('')}
    </select>
  </div>
  <button class="cta" onclick="guardarCli()">Guardar cliente</button>
  <button class="cta sec" onclick="showList()">Cancelar</button>`;
  document.getElementById('cn')?.focus();
}

async function guardarCli(){
  const n=document.getElementById('cn').value.trim();
  if(!n){toast('El nombre es obligatorio');document.getElementById('cn').style.borderColor='var(--red)';return}
  if(!window.FB2){toast('Firebase no listo, intenta de nuevo');return}
  const ref=await window.FB2.fAdd('clientes',{nombre:n,direccion:document.getElementById('cd').value.trim(),tel:document.getElementById('ct').value.trim(),email:document.getElementById('ce').value.trim(),rfc:document.getElementById('cr').value.trim(),tipo:document.getElementById('ctipo').value});
  if(ref){toast('Cliente guardado ✓');showList()}else{toast('Error al guardar')}
}

function showDetail(id){
  const cli=getClientes().find(c=>c._id===id);if(!cli)return;
  window._currentView='detail';
  const hist=getHist().filter(h=>h.clientId===id||h.clientName===cli.nombre);
  const totalG=hist.filter(h=>h.estado==='Aprobada').reduce((a,h)=>a+(h.precio||0),0);
  const c=document.getElementById('cnt');c.className='cnt fade';void c.offsetWidth;
  c.innerHTML=`<button style="background:transparent;border:none;color:var(--mu2);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;font-family:inherit;margin-bottom:14px" onclick="showList()">← Todos los clientes</button>
  <div class="st"><span class="st-n">👤</span><span class="st-h">${cli.nombre}</span></div>
  <div style="padding:14px;background:var(--bg2);border:1px solid var(--border);margin-bottom:18px">
    ${cli.tipo?`<div class="crow"><span class="crl">Tipo</span><span class="crv"><span class="sbadge ${TIPO_CLS[cli.tipo]||'sb-none'}">${cli.tipo}</span></span></div>`:''}
    ${cli.tel?`<div class="crow"><span class="crl">Teléfono</span><span class="crv"><a href="tel:${cli.tel}" style="color:var(--blue);text-decoration:none">${cli.tel}</a></span></div>`:''}
    ${cli.email?`<div class="crow"><span class="crl">Email</span><span class="crv" style="font-size:11px"><a href="mailto:${cli.email}" style="color:var(--blue);text-decoration:none">${cli.email}</a></span></div>`:''}
    ${cli.direccion?`<div class="crow"><span class="crl">Dirección</span><span class="crv" style="font-size:11px">${cli.direccion}</span></div>`:''}
    ${cli.rfc?`<div class="crow"><span class="crl">RFC</span><span class="crv">${cli.rfc}</span></div>`:''}
    <div class="crow"><span class="crl">Registrado</span><span class="crv">${new Date(cli.ts||0).toLocaleDateString('es-MX')}</span></div>
  </div>
  ${hist.length>0?`<div style="padding:10px 14px;background:var(--bg3);border:1px solid var(--border);margin-bottom:14px">
    <div style="display:flex;justify-content:space-between">
      <div><div style="font-size:9px;color:var(--mu2);font-weight:800;text-transform:uppercase;letter-spacing:.1em">Servicios aprobados</div><div style="font-size:20px;font-weight:700;color:var(--green)">${fmt(totalG)}</div></div>
      <div style="text-align:right"><div style="font-size:9px;color:var(--mu2);font-weight:800;text-transform:uppercase;letter-spacing:.1em">Total cotizaciones</div><div style="font-size:20px;font-weight:700;color:var(--y)">${hist.length}</div></div>
    </div>
  </div>`:''}
  <span class="lbl">Historial de cotizaciones (${hist.length})</span>
  ${hist.length===0?`<div style="color:var(--mu3);font-size:13px;padding:10px 0">Sin cotizaciones registradas aún.</div>`
  :hist.map(h=>`<div class="hist-mini">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px">
      <div style="font-size:13px;font-weight:700;color:var(--tx)">${h.paquete||'—'}</div>
      <div style="font-size:14px;font-weight:700;color:var(--y)">${fmt(h.precio||0)}</div>
    </div>
    <div style="font-size:10px;color:var(--mu2)">${new Date(h.ts||0).toLocaleDateString('es-MX')} · ${h.plaga||''} · ${h.cat||''}</div>
    <div style="margin-top:5px"><span class="sbadge ${ESTADO_CLS[h.estado||'Borrador']}">${h.estado||'Borrador'}</span></div>
    ${h.notes?`<div style="font-size:10px;color:var(--mu3);margin-top:4px;font-style:italic">${h.notes}</div>`:''}
  </div>`).join('')}
  <div style="display:flex;gap:8px;margin-top:14px">
    ${isAdmin()?`<button class="cta oy" style="margin-top:0" onclick="showEdit('${id}')">✏️ Editar</button>`:''}
    <button class="cta ob" style="margin-top:0" onclick="cotizarPara('${id}')">🧮 Cotizar</button>
  </div>`;
}

function showEdit(id){
  const cli=getClientes().find(c=>c._id===id);if(!cli)return;
  window._currentView='edit';
  const c=document.getElementById('cnt');c.className='cnt fade';void c.offsetWidth;
  c.innerHTML=`<button style="background:transparent;border:none;color:var(--mu2);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;font-family:inherit;margin-bottom:14px" onclick="showDetail('${id}')">← Volver</button>
  <div class="st"><span class="st-n">✏️</span><span class="st-h">Editar cliente</span></div>
  <div class="blk">
    <input class="inp" id="en" value="${(cli.nombre||'').replace(/"/g,'&quot;')}" placeholder="Nombre *" style="margin-bottom:7px">
    <input class="inp" id="ed" value="${(cli.direccion||'').replace(/"/g,'&quot;')}" placeholder="Dirección" style="margin-bottom:7px">
    <input class="inp" id="et" value="${cli.tel||''}" placeholder="Teléfono" style="margin-bottom:7px">
    <input class="inp" id="ee" value="${cli.email||''}" placeholder="Email" style="margin-bottom:7px">
    <input class="inp" id="er" value="${cli.rfc||''}" placeholder="RFC (opcional)" style="margin-bottom:7px">
    <select class="inp" id="etipo" style="color:var(--mu)">
      <option value="">— Tipo —</option>
      ${TIPOS.map(t=>`<option ${cli.tipo===t?'selected':''}>${t}</option>`).join('')}
    </select>
  </div>
  <button class="cta" onclick="updateCli('${id}')">Guardar cambios</button>
  <button class="cta sec" onclick="showDetail('${id}')">Cancelar</button>`;
}

async function updateCli(id){
  const n=document.getElementById('en').value.trim();if(!n){toast('Nombre obligatorio');return}
  const ok=await window.FB2.fUpd('clientes/'+id,{nombre:n,direccion:document.getElementById('ed').value,tel:document.getElementById('et').value,email:document.getElementById('ee').value,rfc:document.getElementById('er').value,tipo:document.getElementById('etipo').value});
  if(ok){toast('Guardado ✓');showDetail(id)}else toast('Error al guardar');
}

async function doDelCli(id){
  if(!confirm('¿Eliminar este cliente? No se eliminan sus cotizaciones del historial.'))return;
  await window.FB2.fDel('clientes/'+id);toast('Cliente eliminado');showList();
}

function cotizarPara(id){
  const cli=getClientes().find(c=>c._id===id);if(!cli)return;
  localStorage.setItem('pw_cotizar_cli',JSON.stringify({id,nombre:cli.nombre,direccion:cli.direccion||''}));
  window.location.href='index.html';
}

function toast(msg){const t=document.createElement('div');t.textContent=msg;t.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--y);color:#0d0d0d;padding:10px 20px;font-weight:900;font-size:12px;z-index:999;white-space:nowrap;border-radius:2px';document.body.appendChild(t);setTimeout(()=>t.remove(),2500)}

// Wait for Firebase to be ready before showing PIN
window.updCSMain=()=>{if(window._cliready&&!window._cliInited){window._cliInited=true;checkAccess()}};
setTimeout(()=>{if(!window._cliInited){checkAccess()}},1500);

window.showList=showList;window.showNew=showNew;window.showDetail=showDetail;
window.showEdit=showEdit;window.updateCli=updateCli;window.doDelCli=doDelCli;window.guardarCli=guardarCli;window.cotizarPara=cotizarPara;
</script>
</body>
</html>
