<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Plagaway">
<meta name="theme-color" content="#f5c800">
<link rel="manifest" href="manifest.json">
<title>Plagaway · Cotizador Pro</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0d0d;--bg2:#141414;--bg3:#1c1c1c;--border:#272727;--border2:#1e1e1e;
  --y:#f5c800;--y2:#c9a200;--y3:#7a6100;--y4:#1a1600;
  --tx:#f5f0e8;--tx2:#c8c0b0;--mu:#888880;--mu2:#555550;--mu3:#333330;
  --red:#ff4444;--blue:#4ac8f0;--green:#72c040;--orange:#ff8844;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Helvetica Neue',Arial,sans-serif;overscroll-behavior:none;font-size:15px}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.hdr{padding:13px 18px 10px;border-bottom:2px solid var(--y3);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--bg);z-index:20}
.logo-wm{font-size:22px;font-weight:900;color:var(--tx);letter-spacing:-1px;line-height:1}.logo-wm b{color:var(--y)}
.logo-pill{background:var(--y);color:#0d0d0d;font-size:7px;font-weight:900;letter-spacing:.15em;padding:3px 6px;text-transform:uppercase;align-self:flex-start;margin-top:2px}
.hdr-row{display:flex;align-items:center;gap:8px}
.hdr-sub{font-size:9px;color:var(--mu2);margin-top:4px;letter-spacing:.05em}
.hdr-right{display:flex;gap:7px;align-items:center;margin-top:2px}
.btn-sm{background:transparent;border:1px solid var(--border);color:var(--mu);padding:7px 11px;font-size:9px;font-weight:700;letter-spacing:.1em;cursor:pointer;text-transform:uppercase;font-family:inherit}
.prog{display:flex;padding:0 18px;background:var(--bg);border-bottom:1px solid var(--border2)}
.ps{flex:1;padding:7px 0}.pb{height:3px;background:var(--border2);transition:background .3s}
.pb.done{background:var(--y2)}.pb.act{background:var(--y)}
.pl{font-size:7px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mu3);margin-top:4px;transition:color .3s;cursor:pointer}
.pl.act{color:var(--y)}.pl.done{color:var(--mu2)}
.cnt{padding:18px 18px 90px;flex:1}
.fade{animation:fu .22s ease both}
@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.st{margin-bottom:16px;display:flex;align-items:baseline;gap:10px}
.st-n{font-size:10px;font-weight:900;color:#0d0d0d;background:var(--y);padding:3px 7px;letter-spacing:.1em;flex-shrink:0}
.st-h{font-size:18px;font-weight:700;color:var(--tx)}
.lbl{font-size:10px;font-weight:700;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;display:block}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px}.g1{display:grid;gap:7px}
.card{background:var(--bg2);border:1px solid var(--border);color:var(--tx2);padding:12px 14px;cursor:pointer;font-family:inherit;transition:all .12s;text-align:left;width:100%;-webkit-appearance:none}
.card:active{transform:scale(.97)}.card.on{background:var(--y4);border-color:var(--y);color:var(--tx)}
.card.sz{padding:10px 8px;text-align:center}.card.sz .ct{font-size:13px}.card.sz .cs{font-size:9px}
.ct{font-size:14px;font-weight:600;margin-bottom:3px}.cs{font-size:10px;color:var(--mu2)}.ch{font-size:10px;color:var(--mu3);margin-top:3px}
.ctag{font-size:9px;color:var(--red);font-weight:800;letter-spacing:.1em;text-transform:uppercase}
.badge-best{display:inline-block;font-size:8px;font-weight:900;padding:2px 7px;letter-spacing:.1em;margin-bottom:5px}
.cat-group{margin-bottom:12px}
.cat-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;user-select:none}
.cat-hdr.open{border-color:var(--y2);background:var(--y4)}
.cat-title{font-size:15px;font-weight:700;color:var(--tx)}.cat-sub{font-size:10px;color:var(--mu2);margin-top:2px}
.cat-ch{font-size:14px;color:var(--mu2);transition:transform .2s}.cat-ch.open{transform:rotate(180deg);color:var(--y)}
.cat-body{border:1px solid var(--border);border-top:none;padding:10px;display:none}.cat-body.open{display:grid;gap:7px}
.irow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.im2{background:var(--bg2);border:1px solid var(--border);color:var(--tx);padding:11px 13px;font-size:28px;font-weight:300;font-family:inherit;width:120px;outline:none;-webkit-appearance:none}
.im2:focus{border-color:var(--y)}.iu{color:var(--mu);font-size:17px}
.bsug{background:transparent;border:1px solid var(--border);color:var(--mu);font-size:9px;font-weight:700;padding:6px 10px;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;font-family:inherit}
.inp-text{background:var(--bg2);border:1px solid var(--border);color:var(--tx);padding:10px 12px;font-family:inherit;font-size:13px;outline:none;width:100%}
.inp-text:focus{border-color:var(--y)}
.inp-num{background:var(--bg2);border:1px solid var(--border);color:var(--tx);padding:10px 12px;font-family:inherit;font-size:13px;outline:none;width:80px;-webkit-appearance:none}
.inp-num:focus{border-color:var(--y)}
.trow{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:all .2s}
.trow.on{border-color:var(--y);background:var(--y4)}
.tlbl{font-size:13px;font-weight:500;color:var(--mu);transition:color .2s}.trow.on .tlbl{color:var(--tx)}
.tsub{font-size:10px;color:var(--mu2);margin-top:2px}
.tsw{width:36px;height:20px;background:var(--border);border-radius:10px;position:relative;flex-shrink:0;transition:background .2s}
.trow.on .tsw{background:var(--y)}
.tkn{width:14px;height:14px;background:var(--mu3);border-radius:50%;position:absolute;top:3px;left:3px;transition:all .2s}
.trow.on .tkn{left:19px;background:#0d0d0d}
.qty-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--y4);border:1px solid var(--y);border-top:none}
.qty-btn{background:var(--border);border:none;color:var(--tx);width:30px;height:30px;font-size:16px;cursor:pointer;font-weight:700;font-family:inherit}
.qty-val{font-size:16px;font-weight:700;color:var(--y);min-width:24px;text-align:center}.qty-price{font-size:11px;color:var(--mu2)}
input[type=range]{width:100%;accent-color:var(--y);height:4px;-webkit-appearance:none;background:var(--border);border-radius:2px;outline:none;display:block}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;background:var(--y);border-radius:50%;cursor:pointer}
.rlbls{display:flex;justify-content:space-between;font-size:9px;font-weight:700;color:var(--mu2);margin-top:6px;text-transform:uppercase}
.blk{margin-bottom:20px}
.note-inp{background:var(--bg2);border:1px solid var(--border);color:var(--tx);padding:11px 13px;font-family:inherit;font-size:13px;outline:none;width:100%;resize:none;height:70px;line-height:1.4}
.note-inp:focus{border-color:var(--y)}
.cta{width:100%;background:var(--y);color:#0d0d0d;border:none;padding:15px;font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-family:inherit;font-weight:900;cursor:pointer;margin-top:10px;transition:opacity .15s}
.cta:active{opacity:.85}
.cta.sec{background:transparent;border:1px solid var(--border);color:var(--mu);font-weight:700}
.cta.oy{background:transparent;border:2px solid var(--y);color:var(--y);font-weight:900}
.cta.ob{background:transparent;border:2px solid var(--blue);color:var(--blue);font-weight:900}
.cta.og{background:transparent;border:2px solid var(--green);color:var(--green);font-weight:900}
.cta.back{background:transparent;border:1px solid var(--border2);color:var(--mu2);font-weight:600;font-size:11px;padding:11px;margin-top:8px}
.rbox{border:2px solid var(--y);padding:18px;background:var(--bg2);margin-bottom:14px}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.rdiv{border:none;border-top:1px solid var(--border2);margin-bottom:14px}
.rpl{font-size:9px;font-weight:800;color:var(--mu2);letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px}
.rpv{font-size:22px;font-weight:300}.rpv.y{color:var(--y);font-weight:700}.rpv.g{color:var(--green)}.rpv.w{color:var(--tx)}
.rps{font-size:9px;color:var(--mu3);margin-top:3px}
.psel{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.popt{padding:12px 13px;border:2px solid var(--border);cursor:pointer;transition:all .15s;background:var(--bg2)}
.popt.on{border-color:var(--y);background:var(--y4)}
.popt-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--mu2);margin-bottom:4px}
.popt.on .popt-lbl{color:var(--y)}.popt-val{font-size:19px;font-weight:700;color:var(--tx)}.popt.on .popt-val{color:var(--y)}
.popt-sub{font-size:9px;color:var(--mu3);margin-top:3px}
.cbox{border:1px solid var(--border);background:var(--bg2);margin-bottom:12px;overflow:hidden}
.cbox-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer}
.cbox-title{font-size:10px;font-weight:800;color:var(--mu2);letter-spacing:.15em;text-transform:uppercase}
.cbox-ch{font-size:14px;color:var(--mu2);transition:transform .2s}.cbox-ch.open{transform:rotate(180deg)}
.cbox-body{border-top:1px solid var(--border2);display:none}.cbox-body.open{display:block}
.cbox-sec{padding:10px 14px;border-bottom:1px solid var(--border2)}.cbox-sec:last-child{border-bottom:none}
.cbox-sec-t{font-size:9px;font-weight:800;color:var(--mu3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.crow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border2)}.crow:last-child{border-bottom:none}
.crl{font-size:11px;color:var(--mu)}.crv{font-size:12px;font-weight:600}
.ibar{padding:10px 13px;background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--y);font-size:11px;color:var(--mu);margin-bottom:10px;line-height:1.5}
.ibar strong{color:var(--y)}.ibar.bl{border-left-color:var(--blue)}.ibar.bl strong{color:var(--blue)}
.ibar.gr{border-left-color:var(--green)}.ibar.gr strong{color:var(--green)}
.warn-box{padding:11px 13px;background:#1a0800;border:1px solid var(--orange);border-left:3px solid var(--orange);font-size:11px;color:var(--orange);margin-bottom:12px;line-height:1.5}
.nav{display:flex;border-top:1px solid var(--border);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg);z-index:20}
.nav-tab{flex:1;padding:9px 0 11px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:transparent;font-family:inherit;color:var(--mu2);transition:color .15s}
.nav-tab.act{color:var(--y)}.nav-icon{font-size:16px;line-height:1}
.nav-lbl{font-size:7px;font-weight:700;letter-spacing:.07em;text-transform:uppercase}
.hist-item{background:var(--bg2);border:1px solid var(--border);padding:12px 14px;margin-bottom:7px}
.hist-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.hist-name{font-size:13px;font-weight:700;color:var(--tx)}.hist-price{font-size:15px;font-weight:700;color:var(--y)}
.hist-meta{font-size:10px;color:var(--mu2);margin-top:2px}
.hist-del{background:transparent;border:none;color:var(--mu3);font-size:14px;cursor:pointer;padding:2px 4px}
.sbadge{display:inline-flex;align-items:center;font-size:9px;font-weight:800;padding:3px 8px;letter-spacing:.08em;text-transform:uppercase;border-radius:2px;cursor:pointer;border:1px solid;gap:4px}
.sb-borrador{background:#111;color:var(--mu);border-color:var(--border)}
.sb-enviada{background:#001a2e;color:var(--blue);border-color:var(--blue)}
.sb-aprobada{background:#001a0a;color:var(--green);border-color:var(--green)}
.sb-rechazada{background:#1a0000;color:var(--red);border-color:var(--red)}
.s-row{display:flex;gap:8px;margin-bottom:14px}
.s-inp{flex:1;background:var(--bg2);border:1px solid var(--border);color:var(--tx);padding:10px 12px;font-family:inherit;font-size:13px;outline:none}
.s-inp:focus{border-color:var(--y)}
.s-sel{background:var(--bg2);border:1px solid var(--border);color:var(--mu);padding:10px;font-family:inherit;font-size:12px;outline:none;cursor:pointer}
.inv-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);margin-bottom:6px}
.inv-del{background:transparent;border:none;color:var(--red);font-size:16px;cursor:pointer;padding:0 4px;font-weight:700}
.btn-add{background:var(--y);color:#0d0d0d;border:none;padding:10px 14px;font-weight:900;font-size:13px;cursor:pointer;font-family:inherit}
.cs-item{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:var(--bg2);border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:all .15s}
.cs-item.on{background:var(--y4);border-color:var(--y)}
.cs-chk{width:18px;height:18px;border:2px solid var(--border);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#0d0d0d}
.cs-item.on .cs-chk{background:var(--y);border-color:var(--y)}
.lit-row{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--y4);border:1px solid var(--y);margin-bottom:6px}
.lit-inp{background:var(--bg);border:1px solid var(--y2);color:var(--y);padding:6px 10px;font-size:18px;font-weight:700;font-family:inherit;width:80px;outline:none;text-align:center;-webkit-appearance:none}
.lit-label{font-size:11px;color:var(--mu2)}.lit-cost{font-size:12px;color:var(--green);font-weight:700;margin-left:auto}
/* PIN */
.pin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);padding:40px 20px;gap:22px}
.pin-logo{font-size:32px;font-weight:900;color:var(--tx);letter-spacing:-1px}.pin-logo b{color:var(--y)}
.pin-sub{font-size:11px;color:var(--mu2);letter-spacing:.1em;text-transform:uppercase;text-align:center}
.pin-dots{display:flex;gap:14px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:all .15s}
.pin-dot.filled{background:var(--y);border-color:var(--y)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px}
.pin-key{background:var(--bg2);border:1px solid var(--border);color:var(--tx);font-size:20px;font-weight:600;padding:17px;cursor:pointer;font-family:inherit;transition:all .12s;border-radius:50%}
.pin-key:active{background:var(--y);color:#0d0d0d;transform:scale(.93)}
.pin-err{color:var(--red);font-size:11px;font-weight:700;letter-spacing:.1em;min-height:16px;text-transform:uppercase;text-align:center}
.pin-role{display:flex;gap:10px;margin-bottom:4px}
.pin-role-btn{flex:1;padding:10px;border:1px solid var(--border);background:var(--bg2);color:var(--mu);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s}
.pin-role-btn.sel{border-color:var(--y);background:var(--y4);color:var(--y)}
.pin-change{background:transparent;border:none;color:var(--mu2);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;font-family:inherit;margin-top:4px}
.role-badge{display:inline-block;font-size:8px;font-weight:900;padding:2px 6px;letter-spacing:.1em;text-transform:uppercase;margin-left:6px}
.role-admin{background:#1a0000;color:var(--red);border:1px solid #440000}
.role-tech{background:#001a0a;color:var(--green);border:1px solid #004422}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;animation:pulse 2s infinite}
.odot,.xdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
.odot{background:var(--green)}.xdot{background:var(--mu3)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block;margin-right:6px;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* triple settings */
.triple-settings{background:var(--bg3);border:1px solid var(--border);padding:14px;margin-bottom:14px}
.triple-settings-title{font-size:10px;font-weight:800;color:var(--mu2);letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px}
/* Share panel */
.share-panel{background:var(--bg3);border:1px solid var(--border);padding:14px;margin-top:14px}
.share-panel-title{font-size:10px;font-weight:800;color:var(--mu2);letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px}
.share-btn{display:flex;align-items:center;gap:12px;width:100%;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);color:var(--tx);font-family:inherit;cursor:pointer;text-align:left;margin-bottom:7px;transition:all .15s}
.share-btn:last-child{margin-bottom:0}
.share-btn:active{opacity:.8;transform:scale(.98)}
.share-btn-icon{font-size:20px;flex-shrink:0}
.share-btn-label{font-size:13px;font-weight:600;color:var(--tx)}
.share-btn-sub{font-size:10px;color:var(--mu2);margin-top:2px}
/* vigencia */
.vig-row{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--bg2);border:1px solid var(--border);margin-bottom:10px}
.vig-inp{background:var(--bg);border:1px solid var(--y2);color:var(--y);padding:6px 8px;font-size:18px;font-weight:700;font-family:inherit;width:68px;outline:none;text-align:center;-webkit-appearance:none}
.vig-inp:focus{border-color:var(--y)}
/* story overlay */
.story-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px}
.story-close-btn{position:absolute;top:16px;right:16px;background:var(--y);color:#0d0d0d;border:none;width:36px;height:36px;font-size:18px;font-weight:900;cursor:pointer;border-radius:50%}
</style>
</head>
<body>
<div id="ps" style="display:none"></div>
<div id="app" style="display:none;flex-direction:column">
  <div class="hdr">
    <div>
      <div class="hdr-row"><div class="logo-wm">PLAGA<b>W</b>AY</div><div class="logo-pill">Pro</div></div>
      <div class="hdr-sub" id="cs"><span class="xdot"></span>Conectando...</div>
    </div>
    <div class="hdr-right">
      <button class="btn-sm" id="btnr" style="display:none" onclick="resetQ()">← Nueva</button>
      <button class="btn-sm" id="btn-cfg" style="display:none" onclick="showCfg()">⚙️</button>
      <button class="btn-sm" onclick="showPinChange()">🔒</button>
    </div>
  </div>
  <div class="prog" id="pgbar">
    <div class="ps"><div class="pb" id="pb1"></div><div class="pl" id="pl1" onclick="goStep(1)">Lugar</div></div>
    <div class="ps"><div class="pb" id="pb2"></div><div class="pl" id="pl2" onclick="goStep(2)">Plaga</div></div>
    <div class="ps"><div class="pb" id="pb3"></div><div class="pl" id="pl3" onclick="goStep(3)">Paquete</div></div>
    <div class="ps"><div class="pb" id="pb4"></div><div class="pl" id="pl4" onclick="goStep(4)">Detalles</div></div>
    <div class="ps"><div class="pb" id="pb5"></div><div class="pl" id="pl5">Precio</div></div>
  </div>
  <div class="cnt fade" id="cnt"></div>
  <div class="nav">
    <button class="nav-tab act" id="nt0" onclick="swTab(0)"><div class="nav-icon">🧮</div><div class="nav-lbl">Cotizar</div></button>
    <button class="nav-tab" id="nt1" onclick="swTab(1)"><div class="nav-icon">📋</div><div class="nav-lbl">Historial</div></button>
    <button class="nav-tab" id="nt2" onclick="swTab(2)"><div class="nav-icon">👥</div><div class="nav-lbl">Clientes</div></button>
    <button class="nav-tab" id="nt3" onclick="swTab(3)"><div class="nav-icon">☑️</div><div class="nav-lbl">Checklist</div></button>
    <button class="nav-tab" id="nt4" onclick="swTab(4)"><div class="nav-icon">⚙️</div><div class="nav-lbl">Admin</div></button>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getFirestore,doc,getDoc,setDoc,onSnapshot,collection,addDoc,updateDoc,deleteDoc,query,orderBy,where}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const fbApp=initializeApp({apiKey:"AIzaSyCGz0t2xfeiMxYIcgVVQTp0bCHY6scIR_w",authDomain:"calculadora-plagaway.firebaseapp.com",projectId:"calculadora-plagaway",storageBucket:"calculadora-plagaway.firebasestorage.app",messagingSenderId:"257562908832",appId:"1:257562908832:web:14f673952eabba313c51c5"});
const fs=getFirestore(fbApp);
async function fGet(p){try{const s=await getDoc(doc(fs,p));return s.exists()?s.data():null}catch{return null}}
async function fSet(p,d){try{await setDoc(doc(fs,p),d,{merge:true});return true}catch(e){console.error(e);return false}}
function fListen(p,cb){return onSnapshot(doc(fs,p),s=>{if(s.exists())cb(s.data())})}
function fListenCol(p,cb){return onSnapshot(query(collection(fs,p),orderBy('ts','desc')),s=>{cb(s.docs.map(d=>({...d.data(),_id:d.id})))})}
async function fAdd(p,d){try{return await addDoc(collection(fs,p),d)}catch{return null}}
async function fUpd(p,d){try{await updateDoc(doc(fs,p),d);return true}catch{return false}}
async function fDel(p){try{await deleteDoc(doc(fs,p));return true}catch{return false}}
async function fGetCol(p){try{const s=await getDoc(doc(fs,p));return s.docs?s.docs.map(d=>({...d.data(),_id:d.id})):[]}catch{return[]}}
window.FB={fGet,fSet,fListen,fListenCol,fAdd,fUpd,fDel};

async function initFB(){
  const cfg=await fGet('config/shared');
  if(cfg){
    if(cfg.inventory)window._inv=cfg.inventory;
    if(cfg.sellers)window._sellers=cfg.sellers;
    if(cfg.adminPin)window._apin=cfg.adminPin;
    if(cfg.techPin)window._tpin=cfg.techPin;
    if(cfg.minPrice!=null)window._minPrice=cfg.minPrice;
    if(cfg.kmPrice!=null)window._kmPrice=cfg.kmPrice;
    if(cfg.empresa)window._empresa=cfg.empresa;
    // migrate: add service type if old inventory lacks it
    if(cfg.inventory&&!cfg.inventory.some(x=>x.type==='service')){
      const merged=[...cfg.inventory,...DEF_INV.filter(d=>d.type==='service')];
      window._inv=merged;await fSet('config/shared',{inventory:merged});
    }
  } else {
    const def={inventory:DEF_INV,sellers:['Heriberto','Mauro'],adminPin:'1234',techPin:'0000',minPrice:500,kmPrice:8,empresa:DEF_EMP};

    Object.assign(window,{_inv:DEF_INV,_sellers:def.sellers,_apin:'1234',_tpin:'0000',_minPrice:500,_kmPrice:8,_empresa:DEF_EMP});
  }
  fListen('config/shared',d=>{
    if(d.inventory)window._inv=d.inventory;
    if(d.sellers)window._sellers=d.sellers;
    if(d.adminPin)window._apin=d.adminPin;
    if(d.techPin)window._tpin=d.techPin;
    if(d.minPrice!=null)window._minPrice=d.minPrice;
    if(d.kmPrice!=null)window._kmPrice=d.kmPrice;
    if(d.empresa)window._empresa=d.empresa;
    updCS();
  });
  fListenCol('history',e=>{window._hist=e;if(window._hcb)window._hcb(e)});
  fListenCol('clientes',e=>{window._clientes=e;if(window._clicb)window._clicb(e)});
  window._fbReady=true;updCS();
}
initFB();
</script>

// ─── PIN SCREEN ───────────────────────────────────────────────────────────────
function renderPin(mode,onOk){
  const ps=document.getElementById('ps');ps.style.cssText='display:flex;flex-direction:column;min-height:100vh';
  let buf='',step=0,fp='',selRole='tech';
  function draw(err=''){
    ps.innerHTML=`<div class="pin-wrap"><div class="pin-logo">PLAGA<b>W</b>AY</div>
      ${mode==='unlock'
        ?`<div class="pin-sub">Selecciona tu rol de acceso</div><div class="pin-role"><div class="pin-role-btn ${selRole==='tech'?'sel':''}" onclick="sR('tech')">👷 Técnico</div><div class="pin-role-btn ${selRole==='admin'?'sel':''}" onclick="sR('admin')">🔑 Admin</div></div>`
        :`<div class="pin-sub">${step===0?(mode==='changeAdmin'?'Nuevo PIN Admin':'Nuevo PIN Técnico'):'Confirmar PIN'}</div>`}
      <div class="pin-dots">${[0,1,2,3].map(i=>`<div class="pin-dot ${buf.length>i?'filled':''}"></div>`).join('')}</div>
      <div class="pin-err">${err}</div>
      <div class="pin-pad">${[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k=>`<button class="pin-key" onclick="pk('${k}')" ${k===''?'style="visibility:hidden"':''}>${k}</button>`).join('')}</div>
      ${mode!=='unlock'?`<button class="pin-change" onclick="cancelPC()">Cancelar</button>`:''}</div>`;
    window.sR=r=>{selRole=r;draw()};
    window.pk=k=>{if(k==='⌫'){buf=buf.slice(0,-1);draw();return}if(buf.length>=4)return;buf+=k;draw();if(buf.length===4)setTimeout(()=>chk(buf),120)};
  }
  function chk(entered){
    if(mode==='unlock'){
      if(entered===getAdminPin()){currentRole='admin';unlock(onOk)}
      else if(entered===getTechPin()){currentRole='tech';unlock(onOk)}
      else{buf='';draw('PIN incorrecto')}
    }else{
      if(step===0){fp=entered;buf='';step=1;draw()}
      else{if(entered===fp){(mode==='changeAdmin'?setAdminPin:setTechPin)(entered).then(()=>{cancelPC();toast('PIN actualizado ✓')})}else{buf='';step=0;fp='';draw('No coinciden')}}
    }
  }
  function unlock(cb){ps.style.display='none';const a=document.getElementById('app');a.style.display='flex';a.style.flexDirection='column';updCS();if(cb)cb();else render()}
  draw();
}

// ─── CALC DOSE ────────────────────────────────────────────────────────────────
// FIX Bug 7: use useLineal flag, not l.id.includes
function calcDose(l,plagaId,area,lineal,useLineal){
  const isHogar=l.id==='hogar'||l.id==='hogar_ext';
  const isEvento=l.id==='evento_abierto'||l.id==='evento_cerrado';
  if(isHogar){
    if(l.exteriorOnly)return{cynoff:0,demand:area*DOSE.hogar_ext_d};
    return{cynoff:area*DOSE.hogar_c,demand:0};
  }
  if(isEvento)return{cynoff:area*DOSE.ev_c,demand:area*DOSE.ev_d};
  const p=PLAGAS[plagaId]||PLAGAS.comun;
  const litros=useLineal?lineal*(p.lineal||.03):area*(p.litros||.075);
  return{general:litros};
}

// ─── CALC ─────────────────────────────────────────────────────────────────────
function calcFor(lugarOvr,pkOvr,state){
  const st=state||S;
  const inv=getInv();const chems=inv.filter(x=>x.type==='chemical');
  const p=PLAGAS[st.plaga]||PLAGAS.comun;
  const l=lugarOvr||st.lugar;
  const f=FREQS.find(x=>x.id===st.freq)||FREQS[0];
  const pk=PKS.find(x=>x.id===(pkOvr||st.paquete))||PKS[1];

  let area=0,lineal=0;
  if(st.useLineal&&st.linealM){lineal=parseFloat(st.linealM);area=lineal*3}
  else area=parseFloat(st.m2)||0;

  const dose=calcDose(l,st.plaga,area,lineal,st.useLineal);
  let cq=0;const chemBD=[];
  const cynoff=chems.find(x=>x.id==='cynoff')||{price:16.25,name:'Cynoff 40'};
  const demand=chems.find(x=>x.id==='demand')||{price:21.73,name:'Demand Duo'};

  if(dose.cynoff!==undefined||dose.demand!==undefined){
    const lC=st.manualLitros?.cynoff!=null?st.manualLitros.cynoff:(dose.cynoff||0);
    const lD=st.manualLitros?.demand!=null?st.manualLitros.demand:(dose.demand||0);
    if(lC>0){cq+=lC*cynoff.price;chemBD.push({name:cynoff.name,L:lC,cost:lC*cynoff.price,id:'cynoff'})}
    if(lD>0){cq+=lD*demand.price;chemBD.push({name:demand.name,L:lD,cost:lD*demand.price,id:'demand'})}
  }else{
    const sel=st.selChemIds.length?chems.filter(c=>st.selChemIds.includes(c.id)):chems.slice(0,1);
    const totalL=dose.general||0;const lpc=totalL/Math.max(sel.length,1);
    sel.forEach(c=>{const l2=st.manualLitros?.[c.id]!=null?st.manualLitros[c.id]:lpc;cq+=l2*c.price;chemBD.push({name:c.name,L:l2,cost:l2*c.price,id:c.id})});
    if(p.b&&sel.length===1)cq*=1.4;
  }

  // FIX Bug 10: products from inventory type='product' only
  let extP=0;const prodBD=[];
  (st.selProducts||[]).forEach(({id,qty})=>{
    const prod=inv.find(x=>x.id===id&&x.type==='product');
    if(prod){extP+=prod.price*qty;prodBD.push({name:prod.name,qty,cost:prod.price*qty})}
  });

  // FIX Bug 1: service extras from inventory type='service'
  let extS=0;const svcBD=[];
  (st.selServices||[]).forEach(({id,qty,km})=>{
    const svc=inv.find(x=>x.id===id&&x.type==='service');if(!svc)return;
    const cost=svc.unit==='km_base'&&km>0?(svc.price||0)+km*(svc.pricePerKm||getKmPrice()):svc.price*(qty||1);
    extS+=cost;svcBD.push({name:svc.name,qty:qty||1,km,cost});
  });

  const co=6.25+123;const costoTotal=cq+extP+extS+co+167;
  const denom=Math.max(1-(st.margen/100)-0.25,0.05);
  let pb=(costoTotal/denom)*l.mult*pk.mult;

  // Floor: basico never below 65% of completo
  if(pk.id==='basico'){const comp=(costoTotal/denom)*l.mult*1.0;if(pb<comp*0.65)pb=comp*0.65}

  let mm=1.0,ml=[];
  if(st.infestacion==='alta'){mm*=1.25;ml.push('+25% infestación severa')}
  if(st.horario==='nocturno'){mm*=1.20;ml.push('+20% horario especial')}

  const pm=pb*mm;const pD0=pm*(1-f.desc);
  const minP=getMinPrice();const pDbase=Math.max(pD0,minP);

  // Block 3: cash discount 3.8% applied after minimum
  const descMonto=st.descEfectivo?pDbase*0.038:0;
  const pD=pDbase-descMonto;
  const pI=pD*1.16;const pIn=pD*.95;const pInI=pIn*1.16;
  const mano=pD*.10,util=pD*(st.margen/100),fondoCarro=pD*.08,reinversion=pD*.07;

  return{cq,extP,extS,co,cf:167,mano,util,fondoCarro,reinversion,costoTotal,
    pD,pI,pIn,pInI,descMonto,
    area:area.toFixed(0),lineal:lineal.toFixed(0),
    g:f.g,desc:f.desc*100,ml,paquete:pk?.label||'',
    chemBD,prodBD,svcBD,belowMin:pD0<minP,minP,dose};
}

      <input type="range" min="10" max="45" value="${TC.margen}" oninput="TC.margen=parseInt(this.value);document.getElementById('tc-mv').textContent=TC.margen+'%';renderTriple()"></div>`:''}

      <div class="g1">${svcs.map(svc=>{const on=TC.selServiceIds.includes(svc.id);const showKm=on&&svc.unit==='km_base';return`<div class="cs-item ${on?'on':''}" onclick="togTCSvc('${svc.id}')">
        <div><div style="font-size:12px;font-weight:600;color:var(--tx)">${svc.name}</div>
        <div style="font-size:10px;color:var(--mu2)">${fmt(svc.price)}${svc.unit==='km_base'?' base + $'+(svc.pricePerKm||getKmPrice())+'/km':' c/u'}</div></div>
        <div class="cs-chk">${on?'✓':''}</div></div>
        ${showKm?`<div class="qty-row"><span style="font-size:12px;color:var(--mu)">Km:</span>
          <input class="lit-inp" type="number" step="1" min="0" value="${TC.km}" oninput="TC.km=parseFloat(this.value)||0;renderTriple()" style="width:70px"></div>`:''}`}).join('')}</div></div>`:''}
    <!-- Vigencia -->

        <span style="font-size:12px;color:var(--mu2)">Válido por</span>
        <input class="vig-inp" type="number" min="1" max="365" value="${S.vigenciaDias}" oninput="S.vigenciaDias=parseInt(this.value)||7">
        <span style="font-size:12px;color:var(--mu2)">días · hasta ${vigFecha(S.vigenciaDias)}</span>
      </div></div>
  </div>
  <!-- Price cards -->
  ${[{pk:PKS[0],r:rB},{pk:PKS[1],r:rC},{pk:PKS[2],r:rP}].map(({pk,r})=>`
  <div style="background:var(--bg2);border:1px solid ${S.paquete===pk.id?pk.color:'var(--border)'};padding:15px;margin-bottom:10px">

        <div style="font-size:10px;color:var(--mu2);margin-top:2px">${isExt?'Solo Exterior':''}</div>
      </div>

        <!-- FIX 2.5: no tax text, clean price only -->
        <div style="font-size:22px;font-weight:700;color:var(--y)">${fmt(r.pD)}</div>

window.togTCSvc=id=>{const i=TC.selServiceIds.indexOf(id);if(i>=0)TC.selServiceIds.splice(i,1);else TC.selServiceIds.push(id);renderTriple()};
function applyTCAndSelect(pkId){
  S.infestacion=TC.infestacion;S.horario=TC.horario;S.freq=TC.freq;
  if(isAdmin())S.margen=TC.margen;
  S.selServices=TC.selServiceIds.map(id=>({id,qty:1,km:TC.km}));
  S.selProducts=TC.selProducts||[];
  selPk(pkId);
}
function tcSendSingle(pkId){
  const st=mkTCState(pkId);S.paquete=pkId;S.result=calcFor(null,pkId,st);shareWA('single');
}

// ─── STEP 4: DETALLES ─────────────────────────────────────────────────────────
function s4(c){
  const inv=getInv(),chems=getChems(),prods=getProds(),svcs=getSvcs();
  const area=parseFloat(S.m2)||0,lineal=parseFloat(S.linealM)||0;
  const l=S.lugar||findL('hogar');
  const dose=calcDose(l,S.plaga,area,lineal,S.useLineal);
  const isStructured=dose.cynoff!==undefined;

  c.innerHTML=`<div class="st"><span class="st-n">04</span><span class="st-h">Detalles del servicio</span></div>
  <div class="blk"><span class="lbl">Dosificación de químicos</span>
    <div style="font-size:10px;color:var(--mu3);margin-bottom:9px">Ajusta si la inspección lo requiere</div>
    ${isStructured
      ?(['cynoff','demand'].map(cid=>{const base=dose[cid]||0;const manual=S.manualLitros[cid]!=null?S.manualLitros[cid]:base;const chem=chems.find(x=>x.id===cid)||{name:cid,price:16.25};if(base===0&&manual===0)return '';
        return`<div class="lit-row"><div style="display:grid;gap:2px"><div style="font-size:12px;font-weight:700;color:var(--tx)">${chem.name}</div><div style="font-size:9px;color:var(--mu2)">Base: ${fmtL(base)}</div></div>
          <input class="lit-inp" type="number" step="0.1" min="0" value="${parseFloat(manual).toFixed(1)}" oninput="S.manualLitros['${cid}']=parseFloat(this.value)||0;updLC('lc_${cid}','${cid}')">
          <span class="lit-label">L</span><span class="lit-cost" id="lc_${cid}">${fmt(manual*(chem.price||16.25))}</span></div>`;}).join(''))
      :chems.map(chem=>{const totalL=dose.general||0;const lpc=totalL/Math.max(chems.length,1);const manual=S.manualLitros[chem.id]!=null?S.manualLitros[chem.id]:lpc;
        return`<div class="lit-row"><div style="display:grid;gap:2px"><div style="font-size:12px;font-weight:700;color:var(--tx)">${chem.name}</div><div style="font-size:9px;color:var(--mu2)">Base: ${fmtL(lpc)}</div></div>
          <input class="lit-inp" type="number" step="0.1" min="0" value="${parseFloat(manual).toFixed(1)}" oninput="S.manualLitros['${chem.id}']=parseFloat(this.value)||0;updLC('lc_${chem.id}','${chem.id}')">
          <span class="lit-label">L</span><span class="lit-cost" id="lc_${chem.id}">${fmt(manual*chem.price)}</span></div>`;}).join('')}
  </div>
  ${prods.length?`<div class="blk"><span class="lbl">Productos a instalar</span><div class="g1" style="margin-top:9px">
    ${prods.map(prod=>{const sel=S.selProducts.find(x=>x.id===prod.id);return`<div class="cs-item ${sel?'on':''}" onclick="togProd('${prod.id}')">
      <div><div style="font-size:13px;font-weight:600;color:var(--tx)">${prod.name}</div><div style="font-size:10px;color:var(--mu2)">${fmt(prod.price)} c/u</div></div>
      <div class="cs-chk">${sel?'✓':''}</div></div>
      ${sel?`<div class="qty-row"><span style="font-size:12px;color:var(--mu)">Cantidad:</span>
        <button class="qty-btn" onclick="event.stopPropagation();adjProd('${prod.id}',-1)">−</button>
        <span class="qty-val">${sel.qty}</span>
        <button class="qty-btn" onclick="event.stopPropagation();adjProd('${prod.id}',1)">+</button>
        <span class="qty-price">${fmt(prod.price*sel.qty)}</span></div>`:''}`}).join('')}
  </div></div>`:''}
  ${svcs.length?`<div class="blk"><span class="lbl">Extras de servicio</span><div class="g1" style="margin-top:9px">
    ${svcs.map(svc=>{const sel=S.selServices.find(x=>x.id===svc.id);const showKm=sel&&svc.unit==='km_base';return`<div class="cs-item ${sel?'on':''}" onclick="togSvc('${svc.id}')">
      <div><div style="font-size:13px;font-weight:600;color:var(--tx)">${svc.name}</div>
      <div style="font-size:10px;color:var(--mu2)">${fmt(svc.price)}${svc.unit==='km_base'?' base + $'+(svc.pricePerKm||getKmPrice())+'/km':' c/u'}</div></div>
      <div class="cs-chk">${sel?'✓':''}</div></div>
      ${showKm?`<div class="qty-row"><span style="font-size:12px;color:var(--mu)">Km ida+vuelta:</span>
        <input class="lit-inp" type="number" step="1" min="0" value="${sel.km||0}" oninput="updSvcKm('${svc.id}',this.value)" style="width:70px">
        <span style="font-size:11px;color:var(--mu2)">km = ${fmt((svc.price||0)+((sel.km||0)*(svc.pricePerKm||getKmPrice())))}</span></div>`:''}`}).join('')}
  </div></div>`:''}
  <div class="blk"><span class="lbl">Condición de la plaga</span><div class="g2" style="margin-top:9px">
    <button class="card ${S.infestacion==='normal'?'on':''}" onclick="S.infestacion='normal';render()"><div class="ct">Normal</div><div class="cs">Estándar</div></button>
    <button class="card ${S.infestacion==='alta'?'on':''}" onclick="S.infestacion='alta';render()"><div class="ct" style="color:var(--red)">Severa +25%</div></button>
  </div></div>
  <div class="blk"><span class="lbl">Horario del servicio</span><div class="g2" style="margin-top:9px">
    <button class="card ${S.horario==='normal'?'on':''}" onclick="S.horario='normal';render()"><div class="ct">Diurno / L–S</div></button>
    <button class="card ${S.horario==='nocturno'?'on':''}" onclick="S.horario='nocturno';render()"><div class="ct" style="color:var(--orange)">Nocturno / Dom. +20%</div></button>
  </div></div>
  <div class="blk"><span class="lbl">Frecuencia / contrato</span><div class="g2" style="margin-top:9px">
    ${FREQS.map(f=>`<button class="card ${S.freq===f.id?'on':''}" onclick="S.freq='${f.id}';render()">
      <div class="ct">${f.label}</div>${f.desc?`<div class="cs" style="color:var(--green)">−${f.desc*100}% dcto.</div>`:''}
      <div class="cs">${f.g}</div></button>`).join('')}
  </div></div>
  ${isAdmin()?`<div class="blk"><span class="lbl">Margen objetivo: <span style="color:var(--y)" id="mv">${S.margen}%</span></span>
    <p style="font-size:10px;color:var(--mu2);margin:4px 0 12px">Utilidad ${S.margen}% + mano de obra 10% + fondo vehículo 8% + reinversión 7%</p>
    <input type="range" min="10" max="45" value="${S.margen}" oninput="S.margen=parseInt(this.value);document.getElementById('mv').textContent=S.margen+'%'">
    <div class="rlbls"><span>10% mínimo</span><span>45% máximo</span></div>
  </div>`:''}
  <!-- Block 2: Vigencia configurable -->
  <div class="blk"><span class="lbl">Vigencia de la cotización</span>
    <div class="vig-row">
      <span style="font-size:12px;color:var(--mu2)">Válido por</span>
      <input class="vig-inp" type="number" min="1" max="365" value="${S.vigenciaDias}" oninput="S.vigenciaDias=parseInt(this.value)||7">
      <span style="font-size:12px;color:var(--mu2)">días · hasta ${vigFecha(S.vigenciaDias)}</span>
    </div>
  </div>
  <!-- Block 3: Descuento efectivo — Admin only -->
  ${isAdmin()?`<div class="blk"><span class="lbl">Descuento pago en efectivo / transferencia</span>
    <div class="trow ${S.descEfectivo?'on':''}" onclick="S.descEfectivo=!S.descEfectivo;render()">
      <div><div class="tlbl">Descuento 3.8%</div><div class="tsub">Elimina la comisión bancaria absorbida en el precio. Solo visible en PDF si activo.</div></div>
      <div class="tsw"><div class="tkn"></div></div>
    </div>
  </div>`:''}
  <div class="blk"><span class="lbl">Notas internas</span>
    <textarea class="note-inp" placeholder="Ej: cliente tiene perros, acceso por calle lateral..." oninput="S.notes=this.value">${S.notes}</textarea>
  </div>
  <button class="cta" style="margin-top:6px" onclick="doCalc()">Calcular precio →</button>
  <button class="cta back" onclick="S.step=3;render()">← Volver a Paquete</button>`;
}

window.updLC=(elId,chemId)=>{const inv=getInv(),chem=inv.find(x=>x.id===chemId)||{price:16.25};const el=document.getElementById(elId);if(el)el.textContent=fmt((S.manualLitros[chemId]||0)*chem.price)};
function togProd(id){const idx=S.selProducts.findIndex(x=>x.id===id);if(idx>=0)S.selProducts.splice(idx,1);else S.selProducts.push({id,qty:1});render()}
function adjProd(id,d){const p=S.selProducts.find(x=>x.id===id);if(p)p.qty=Math.max(1,p.qty+d);render()}
function togSvc(id){const idx=S.selServices.findIndex(x=>x.id===id);if(idx>=0)S.selServices.splice(idx,1);else S.selServices.push({id,qty:1,km:0});render()}
window.updSvcKm=(id,v)=>{const s=S.selServices.find(x=>x.id===id);if(s)s.km=parseFloat(v)||0;render()};
function doCalc(){S.result=calc();S.step=5;render()}

// ─── STEP 5: RESULTADO ───────────────────────────────────────────────────────
function s5(c){
  const r=S.result,pk=PKS.find(x=>x.id===S.paquete);
  const cat=LUGAR_CATS.find(cc=>cc.lugares.some(l=>l.id===S.lugar?.id));
  // FIX 2.5: no IVA mention — use pD (net price the client sees)
  const dP=S.sharePrice==='intro'?r.pIn:r.pD;

  c.innerHTML=`<div class="st"><span class="st-n">05</span><span class="st-h">Cotización</span></div>
  ${S.clientName?`<div style="margin-bottom:14px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border)">
    <div style="font-size:10px;color:var(--mu2);margin-bottom:2px;font-weight:800;letter-spacing:.1em;text-transform:uppercase">Cliente</div>
    <div style="font-size:15px;font-weight:700;color:var(--tx)">${S.clientName}</div>
    ${S.clientAddr?`<div style="font-size:11px;color:var(--mu2);margin-top:2px">${S.clientAddr}</div>`:''}
    ${S.seller?`<div style="font-size:10px;color:var(--mu3);margin-top:4px">Vendedor: <span style="color:var(--y)">${S.seller}</span></div>`:''}
  </div>`:''}
  ${r.belowMin?`<div class="warn-box"><strong>Mínimo aplicado:</strong> Precio ajustado a ${fmt(r.minP)} automáticamente.</div>`:''}
  ${pk?`<div style="margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <span style="font-size:11px;color:var(--mu2)">Paquete:</span>
    <span style="font-size:13px;font-weight:700;color:${pk.color}">${pk.label}</span>
    ${cat?`<span style="font-size:10px;color:var(--mu3)">· ${cat.label}</span>`:''}
    ${S.lugar?.exteriorOnly?`<span style="font-size:9px;color:var(--y2);font-weight:800;background:#1a1a00;padding:2px 6px">SOLO EXTERIOR</span>`:''}
    ${r.ml.map(m=>`<span style="font-size:9px;color:var(--orange);font-weight:800;background:#1a0e00;padding:2px 6px">${m}</span>`).join('')}
  </div>`:''}
  <!-- FIX 2.5: no tax label -->
  <div style="margin-bottom:12px">
    <div style="font-size:10px;font-weight:800;color:var(--mu2);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px">Precio para el cliente</div>
    <div class="psel">
      <div class="popt ${S.sharePrice==='standard'?'on':''}" onclick="S.sharePrice='standard';render()">
        <div class="popt-lbl">Precio final</div><div class="popt-val">${fmt(r.pD)}</div>
      </div>
      <div class="popt ${S.sharePrice==='intro'?'on':''}" onclick="S.sharePrice='intro';render()">
        <div class="popt-lbl">Intro −5%</div><div class="popt-val">${fmt(r.pIn)}</div><div class="popt-sub">Para cerrar</div>
      </div>
    </div>
    ${r.descMonto>0?`<div class="ibar gr"><strong>Dcto. efectivo/transferencia:</strong> −${fmt(r.descMonto)} aplicado al precio.</div>`:''}
    <div style="font-size:10px;color:var(--mu3);text-align:center;font-style:italic;margin-top:4px">El cliente solo ve el precio final, sin desglose.</div>
  </div>
  <div class="rbox">
    <div class="rgrid">
      <div><div class="rpl">Precio al cliente</div><div class="rpv y">${fmt(dP)}</div></div>
      ${isAdmin()
        ?`<div><div class="rpl">Tu utilidad</div><div class="rpv g">${fmt(r.util)}</div><div class="rps">${S.margen}% empresa</div></div>`
        :`<div><div class="rpl">Garantía</div><div class="rpv w" style="font-size:13px">${r.g}</div></div>`}
    </div>
    ${isAdmin()?`<hr class="rdiv"><div class="rgrid">
      <div><div class="rpl">Mano de obra</div><div class="rpv w">${fmt(r.mano)}</div><div class="rps">10% socios</div></div>
      <div><div class="rpl">Fondo vehículo</div><div class="rpv w">${fmt(r.fondoCarro)}</div><div class="rps">8%</div></div>
    </div>`:''}
  </div>
  ${isAdmin()?`<div class="cbox"><div class="cbox-hdr" onclick="togAcc('a1')"><span class="cbox-title">Desglose completo de costos</span><span class="cbox-ch" id="a1-i">▼</span></div>
  <div class="cbox-body" id="a1">
    <div class="cbox-sec"><div class="cbox-sec-t">▸ Químicos</div>
      ${r.chemBD.map(ch=>`<div class="crow"><span class="crl">${ch.name} · ${fmtL(ch.L)}</span><span class="crv" style="color:var(--mu)">${fmt(ch.cost)}</span></div>`).join('')}</div>
    ${r.prodBD.length?`<div class="cbox-sec"><div class="cbox-sec-t">▸ Productos</div>
      ${r.prodBD.map(p=>`<div class="crow"><span class="crl">${p.name} ×${p.qty}</span><span class="crv" style="color:var(--mu)">${fmt(p.cost)}</span></div>`).join('')}</div>`:''}
    ${r.svcBD.length?`<div class="cbox-sec"><div class="cbox-sec-t">▸ Extras de servicio</div>
      ${r.svcBD.map(sv=>`<div class="crow"><span class="crl">${sv.name}${sv.km?` · ${sv.km}km`:''}</span><span class="crv" style="color:var(--mu)">${fmt(sv.cost)}</span></div>`).join('')}</div>`:''}
    <div class="cbox-sec"><div class="cbox-sec-t">▸ Distribución</div>
      <div class="crow"><span class="crl">Fondo vehículo (8%)</span><span class="crv" style="color:var(--orange)">${fmt(r.fondoCarro)}</span></div>
      <div class="crow"><span class="crl">Reinversión (7%)</span><span class="crv" style="color:var(--blue)">${fmt(r.reinversion)}</span></div>
      <div class="crow"><span class="crl">Mano de obra (10%)</span><span class="crv" style="color:var(--y)">${fmt(r.mano)}</span></div>
      <div class="crow"><span class="crl">Utilidad empresa (${S.margen}%)</span><span class="crv" style="color:var(--green)">${fmt(r.util)}</span></div>
      ${r.descMonto>0?`<div class="crow"><span class="crl">Dcto. efectivo/transf. (3.8%)</span><span class="crv" style="color:var(--green)">−${fmt(r.descMonto)}</span></div>`:''}
      ${r.desc>0?`<div class="crow"><span class="crl">Descuento póliza</span><span class="crv" style="color:var(--green)">−${r.desc}%</span></div>`:''}
    </div>
  </div></div>`:
  `<div class="ibar"><strong>Garantía:</strong> ${r.g}${r.desc>0?`&nbsp;·&nbsp;<span style="color:var(--green)">Póliza −${r.desc}%</span>`:''}</div>`}
  <!-- Block 2: vigencia display -->
  <div class="ibar bl"><strong>Vigencia:</strong> Esta cotización es válida hasta el ${vigFecha(S.vigenciaDias)}</div>
  ${S.notes?`<div class="ibar" style="border-left-color:var(--mu2)"><strong style="color:var(--mu)">Notas:</strong> ${S.notes}</div>`:''}
  <!-- Block 2: unified share panel -->
  ${buildSharePanel(false)}
  <!-- Block 3: Aprobar → Póliza -->
  <button class="cta og" style="margin-top:8px" onclick="aprobarCotizacion()">✅ Aprobar → Generar póliza</button>
  <button class="cta" onclick="saveAndReset()" style="margin-top:8px">✓ Guardar y nueva cotización</button>
  <button class="cta sec" onclick="resetQ()">← Cancelar sin guardar</button>`;
}
window.togAcc=id=>{const b=document.getElementById(id),i=document.getElementById(id+'-i');if(!b)return;const o=b.classList.contains('open');b.classList.toggle('open',!o);if(i)i.classList.toggle('open',!o)};

// ─── BLOCK 2: SHARE PANEL (same for individual and triple) ───────────────────
function buildSharePanel(isTriple){
  return`<div class="share-panel">
    <div class="share-panel-title">Compartir esta cotización</div>
    <button class="share-btn" onclick="${isTriple?'tcShareWA()':'shareWA(\'single\')'}">
      <span class="share-btn-icon">💬</span>
      <div><div class="share-btn-label">Enviar por WhatsApp</div><div class="share-btn-sub">Mensaje pre-armado con todos los detalles</div></div>
    </button>
    <button class="share-btn" onclick="genPDF(${isTriple})">
      <span class="share-btn-icon">📄</span>
      <div><div class="share-btn-label">Exportar PDF</div><div class="share-btn-sub">Documento profesional con logo y vigencia</div></div>
    </button>

  g.addColorStop(0,'#0d0d0d');g.addColorStop(0.55,'#1a1200');g.addColorStop(1,'#0d0d0d');
  ctx.fillStyle=g;ctx.fillRect(0,0,1080,1920);

  // Top/bottom accent bars
  ctx.fillStyle='#f5c800';ctx.fillRect(0,0,1080,10);ctx.fillRect(0,1910,1080,10);

  // Brand
  ctx.textAlign='center';
  ctx.font='900 80px sans-serif';ctx.fillStyle='#fff';ctx.fillText('PLAGA',400,130);
  ctx.fillStyle='#f5c800';ctx.fillText('W',520,130);

  ctx.font='300 32px sans-serif';ctx.fillStyle='#888';
  ctx.fillText(emp.tagline||'Control total, plagas fuera',540,185);

  const drawLine=(text,x,y,size,color)=>{ctx.font=`${size}px sans-serif`;ctx.fillStyle=color;ctx.textAlign='center';ctx.fillText(text,x,y)};
  const wrapText=(text,x,y,maxW,lineH)=>{const words=text.split(' ');let line='';let currentY=y;words.forEach((w,i)=>{const test=line?line+' '+w:w;if(ctx.measureText(test).width>maxW&&line){ctx.fillText(line,x,currentY);line=w;currentY+=lineH}else line=test;if(i===words.length-1)ctx.fillText(line,x,currentY)});return currentY};

  if(!isTriple){
    if(!S.result)S.result=calc();
    const r=S.result,pk=PKS.find(x=>x.id===S.paquete);

    ctx.font='400 28px sans-serif';ctx.textAlign='left';
    let y=620;const maxLines=Math.min(inc.length,14);
    for(let i=0;i<maxLines;i++){
      ctx.fillStyle='#f5c800';ctx.fillText('✓',90,y);
      ctx.fillStyle='#c8c0b0';
      const t=inc[i].length>44?inc[i].slice(0,44)+'…':inc[i];
      ctx.fillText(t,130,y);y+=54;
    }

    const vigFin=vigFecha(S.vigenciaDias||7);
    ctx.font='300 28px sans-serif';ctx.fillStyle='#555';ctx.textAlign='center';
    ctx.fillText(`Válido hasta: ${vigFin}`,540,1660);
  }else{
    const rB=calcFor(null,'basico',S),rC=calcFor(null,'completo',S),rP=calcFor(null,'premium',S);
    const pkgs=[{pk:PKS[0],r:rB,col:'#888880'},{pk:PKS[1],r:rC,col:'#f5c800'},{pk:PKS[2],r:rP,col:'#4ac8f0'}];

      const yBase=330+i*430;const dP=S.sharePrice==='intro'?r.pIn:r.pD;
      ctx.fillStyle='#1a1400';ctx.fillRect(50,yBase,980,395);
      ctx.strokeStyle=col;ctx.lineWidth=3;ctx.strokeRect(50,yBase,980,395);
      ctx.font='900 50px sans-serif';ctx.fillStyle=col;ctx.textAlign='left';ctx.fillText(pk.label,90,yBase+65);
      ctx.font='900 68px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='right';ctx.fillText(fmt(dP),1030,yBase+65);
      ctx.font='300 28px sans-serif';ctx.fillStyle='#888';ctx.textAlign='left';ctx.fillText(pk.tagline,90,yBase+105);
      const inc3=getInc(pk.id).slice(0,3);
      inc3.forEach((f,fi)=>{const yt=yBase+165+fi*68;const ft=f.length>50?f.slice(0,50)+'…':f;ctx.fillStyle=col;ctx.font='400 26px sans-serif';ctx.textAlign='left';ctx.fillText('✓',90,yt);ctx.fillStyle='#c8c0b0';ctx.fillText(ft,130,yt)});

    ctx.fillText(`Válido hasta: ${vigFin}`,540,1660);
  }

  // CTA
  ctx.fillStyle='#f5c800';ctx.fillRect(60,1710,960,100);
  ctx.font='900 38px sans-serif';ctx.fillStyle='#0d0d0d';ctx.textAlign='center';
  ctx.fillText('📞 Contáctanos hoy · '+emp.tel,540,1770);
  ctx.font='300 26px sans-serif';ctx.fillStyle='#7a6100';ctx.textAlign='center';
  ctx.fillText(emp.licSanitaria+' · COFEPRIS',540,1862);

  // Show overlay
  const overlay=document.createElement('div');overlay.className='story-overlay';
  const w=window.innerWidth,h=window.innerHeight;
  const scale=Math.min((w-40)/540,(h-120)/960);
  const sw=540*scale,sh=960*scale;
  const preview=document.createElement('canvas');preview.width=sw;preview.height=sh;

  dlBtn.onclick=()=>{const a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download='plagaway-story.png';a.click()};
  overlay.appendChild(closeBtn);overlay.appendChild(preview);overlay.appendChild(dlBtn);
  document.body.appendChild(overlay);
}

    <input class="s-inp" placeholder="Buscar..." value="${sq}" oninput="db.set('pw_hq',this.value);rHist(document.getElementById('cnt'))">
  </div>
  <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
    ${['Todos',...ESTADOS].map(e=>`<button class="sbadge ${e==='Todos'?'sb-borrador':'sb-'+e.toLowerCase()} ${sf===e?'':'opacity:0.5'}" style="${sf===e?'':'opacity:.5'}" onclick="db.set('pw_hf','${e}');rHist(document.getElementById('cnt'))">${e}</button>`).join('')}
    <select class="s-sel" style="font-size:11px;padding:5px 8px" onchange="db.set('pw_hs',this.value);rHist(document.getElementById('cnt'))">
      ${sellers.map(s=>`<option value="${s}" ${ss===s?'selected':''}>${s}</option>`).join('')}
    </select>
  </div>
  ${isAdmin()&&h.length>0?`<div style="display:flex;gap:12px;margin-bottom:14px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border)">
    <div><div style="font-size:9px;color:var(--mu2);font-weight:800;text-transform:uppercase;letter-spacing:.1em">Total cotizado</div><div style="font-size:16px;font-weight:700;color:var(--y)">${fmt(total)}</div></div>
    <div style="border-left:1px solid var(--border);padding-left:12px"><div style="font-size:9px;color:var(--mu2);font-weight:800;text-transform:uppercase;letter-spacing:.1em">Tasa de cierre</div><div style="font-size:16px;font-weight:700;color:var(--green)">${h.length?Math.round(aprobadas/h.length*100):0}% (${aprobadas}/${h.length})</div></div>
  </div>`:''}
  ${h.length===0?`<div style="text-align:center;padding:50px 20px;color:var(--mu3)"><div style="font-size:36px;margin-bottom:12px">📋</div><div>Sin cotizaciones que coincidan.</div></div>`
  :h.map(item=>`<div class="hist-item">
    <div class="hist-top">
      <div>
        <div class="hist-name">${item.clientName||'Sin nombre'}</div>
        <div class="hist-meta">${new Date(item.ts||0).toLocaleDateString('es-MX')} · ${item.paquete||''} · ${item.plaga||''}</div>
        ${item.seller?`<div style="font-size:10px;color:var(--mu3);margin-top:2px">Vendedor: ${item.seller}</div>`:''}
      </div>
      <div style="display:flex;align-items:flex-start;gap:8px">
        <div><div class="hist-price">${fmt(item.precio||0)}</div></div>
        ${isAdmin()?`<button class="hist-del" onclick="doDelH('${item._id}')">✕</button>`:''}
      </div>
    </div>
    <!-- Block 3: estado editable -->
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:6px">
      ${ESTADOS.map(e=>`<button class="sbadge ${ESTADO_CLS[e]}" style="${(item.estado||'Borrador')===e?'':'opacity:.4'}" onclick="setEstado('${item._id}','${e}')">${e}</button>`).join('')}
    </div>
    ${item.clientAddr?`<div style="font-size:10px;color:var(--mu3);margin-top:5px">📍 ${item.clientAddr}</div>`:''}
    ${item.notes?`<div style="font-size:10px;color:var(--mu3);margin-top:4px;font-style:italic">${item.notes}</div>`:''}
  </div>`).join('')}
  ${isAdmin()&&allH.length>0?`<button class="cta sec" style="margin-top:8px" onclick="if(confirm('¿Borrar historial completo?')){window._hist=[];db.set('pw_hq','');db.set('pw_hf','Todos');rHist(document.getElementById('cnt'))}">Borrar historial</button>`:''}`;
}
window.doDelH=async id=>{await delHist(id);rHist(document.getElementById('cnt'))};
window.setEstado=async(id,estado)=>{await updHist(id,{estado});rHist(document.getElementById('cnt'))};

// ─── BLOCK 4: CLIENTES ────────────────────────────────────────────────────────
function rClientes(c){
  window._clicb=()=>{if(tab===2)rClientes(document.getElementById('cnt'))};
  const clientes=getClientes();
  const sq=db.get('pw_clq')||'',sf=db.get('pw_clf')||'Todos';
  const TIPOS=['Todos','Residencial','Comercial','Industrial'];
  let lista=clientes;
  if(sf!=='Todos')lista=lista.filter(x=>x.tipo===sf);
  if(sq)lista=lista.filter(x=>(x.nombre+x.email+x.tel+x.direccion+'').toLowerCase().includes(sq.toLowerCase()));

  c.innerHTML=`<div class="st"><span class="st-n">👥</span><span class="st-h">Clientes</span></div>
  <div class="s-row">
    <input class="s-inp" placeholder="Buscar cliente..." value="${sq}" oninput="db.set('pw_clq',this.value);rClientes(document.getElementById('cnt'))">
    ${isAdmin()?`<button class="btn-sm" onclick="newCliente()">+ Nuevo</button>`:''}
  </div>
  <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
    ${TIPOS.map(t=>`<button class="sbadge sb-borrador" style="${sf===t?'':'opacity:.5'}" onclick="db.set('pw_clf','${t}');rClientes(document.getElementById('cnt'))">${t}</button>`).join('')}
  </div>
  ${lista.length===0?`<div style="text-align:center;padding:50px 20px;color:var(--mu3)"><div style="font-size:36px;margin-bottom:12px">👥</div><div>${clientes.length===0?'Aún no hay clientes registrados.':'Sin resultados.'}</div></div>`
  :lista.map(cli=>`<div class="hist-item" style="cursor:pointer" onclick="verCliente('${cli._id}')">
    <div class="hist-top">
      <div>
        <div class="hist-name">${cli.nombre||'Sin nombre'}</div>
        <div class="hist-meta">${cli.tipo||''} ${cli.email?'· '+cli.email:''}</div>
        ${cli.tel?`<div style="font-size:10px;color:var(--mu2);margin-top:2px">📞 ${cli.tel}</div>`:''}
        ${cli.direccion?`<div style="font-size:10px;color:var(--mu3);margin-top:2px">📍 ${cli.direccion}</div>`:''}
      </div>
      <div style="display:flex;gap:6px;align-items:flex-start">
        <span class="sbadge sb-borrador">${cli.tipo||'Sin tipo'}</span>
        ${isAdmin()?`<button class="hist-del" onclick="event.stopPropagation();doDelCli('${cli._id}')">✕</button>`:''}
      </div>
    </div>
  </div>`).join('')}`;
}

window.newCliente=()=>{
  const c=document.getElementById('cnt');c.className='cnt fade';void c.offsetWidth;
  c.innerHTML=`<div class="st"><span class="st-n">👥</span><span class="st-h">Nuevo cliente</span></div>
  <div class="blk">
    <input class="inp-text" id="cn" placeholder="Nombre completo o empresa *" style="margin-bottom:7px">
    <input class="inp-text" id="cd" placeholder="Dirección" style="margin-bottom:7px">
    <input class="inp-text" id="ct" placeholder="Teléfono" style="margin-bottom:7px">
    <input class="inp-text" id="ce" placeholder="Email" style="margin-bottom:7px">
    <input class="inp-text" id="cr" placeholder="RFC (opcional)" style="margin-bottom:7px">
    <select class="inp-text" id="ctipo" style="color:var(--mu)">
      <option value="">— Tipo de cliente —</option>
      <option>Residencial</option><option>Comercial</option><option>Industrial</option>
    </select>
  </div>
  <button class="cta" onclick="guardarCliente()">Guardar cliente</button>
  <button class="cta sec" onclick="swTab(2)">Cancelar</button>`;
};

window.guardarCliente=async()=>{
  const n=document.getElementById('cn').value.trim();
  if(!n){toast('El nombre es obligatorio');return}
  await addCliente({nombre:n,direccion:document.getElementById('cd').value,tel:document.getElementById('ct').value,email:document.getElementById('ce').value,rfc:document.getElementById('cr').value,tipo:document.getElementById('ctipo').value});
  toast('Cliente guardado ✓');swTab(2);
};

window.verCliente=id=>{
  const cli=getClientes().find(c=>c._id===id);if(!cli)return;
  const hist=getHist().filter(h=>h.clientName===cli.nombre||h.clientId===id);
  const c=document.getElementById('cnt');c.className='cnt fade';void c.offsetWidth;
  c.innerHTML=`<div class="st"><span class="st-n">👥</span><span class="st-h">${cli.nombre}</span></div>
  <div class="blk" style="padding:14px;background:var(--bg2);border:1px solid var(--border)">
    <div class="crow"><span class="crl">Tipo</span><span class="crv">${cli.tipo||'—'}</span></div>
    <div class="crow"><span class="crl">Teléfono</span><span class="crv">${cli.tel||'—'}</span></div>
    <div class="crow"><span class="crl">Email</span><span class="crv">${cli.email||'—'}</span></div>
    <div class="crow"><span class="crl">Dirección</span><span class="crv" style="text-align:right;font-size:11px">${cli.direccion||'—'}</span></div>
    ${cli.rfc?`<div class="crow"><span class="crl">RFC</span><span class="crv">${cli.rfc}</span></div>`:''}
  </div>
  <div class="blk">
    <span class="lbl">Cotizaciones registradas (${hist.length})</span>
    ${hist.length===0?`<div style="color:var(--mu3);font-size:13px;padding:10px 0">Sin cotizaciones registradas.</div>`
    :hist.map(h=>`<div style="padding:10px 14px;background:var(--bg2);border:1px solid var(--border);margin-bottom:6px">
      <div style="display:flex;justify-content:space-between">
        <div style="font-size:13px;font-weight:600;color:var(--tx)">${h.paquete||'—'}</div>
        <div style="font-size:13px;font-weight:700;color:var(--y)">${fmt(h.precio||0)}</div>
      </div>
      <div style="font-size:10px;color:var(--mu2);margin-top:3px">${new Date(h.ts||0).toLocaleDateString('es-MX')} · ${h.plaga||''} · <span class="sbadge ${ESTADO_CLS[h.estado||'Borrador']}">${h.estado||'Borrador'}</span></div>
    </div>`).join('')}
  </div>
  ${isAdmin()?`<div style="display:flex;gap:8px">
    <button class="cta oy" style="margin-top:0" onclick="editCliente('${id}')">✏️ Editar</button>
    <button class="cta" style="margin-top:0" onclick="usarCliente('${id}')">🧮 Cotizar</button>
  </div>`:''}
  <button class="cta back" onclick="swTab(2)">← Volver</button>`;
};

window.editCliente=id=>{
  const cli=getClientes().find(c=>c._id===id);if(!cli)return;
  const c=document.getElementById('cnt');c.className='cnt fade';void c.offsetWidth;
  c.innerHTML=`<div class="st"><span class="st-n">👥</span><span class="st-h">Editar cliente</span></div>
  <div class="blk">
    <input class="inp-text" id="en" value="${cli.nombre||''}" placeholder="Nombre *" style="margin-bottom:7px">
    <input class="inp-text" id="ed" value="${cli.direccion||''}" placeholder="Dirección" style="margin-bottom:7px">
    <input class="inp-text" id="et" value="${cli.tel||''}" placeholder="Teléfono" style="margin-bottom:7px">
    <input class="inp-text" id="ee" value="${cli.email||''}" placeholder="Email" style="margin-bottom:7px">
    <input class="inp-text" id="er" value="${cli.rfc||''}" placeholder="RFC (opcional)" style="margin-bottom:7px">
    <select class="inp-text" id="etipo" style="color:var(--mu)">
      <option value="">— Tipo —</option>
      ${['Residencial','Comercial','Industrial'].map(t=>`<option ${cli.tipo===t?'selected':''}>${t}</option>`).join('')}
    </select>
  </div>
  <button class="cta" onclick="updateCli('${id}')">Guardar cambios</button>
  <button class="cta sec" onclick="verCliente('${id}')">Cancelar</button>`;
};

window.updateCli=async id=>{
  const n=document.getElementById('en').value.trim();if(!n){toast('Nombre obligatorio');return}
  await updCliente(id,{nombre:n,direccion:document.getElementById('ed').value,tel:document.getElementById('et').value,email:document.getElementById('ee').value,rfc:document.getElementById('er').value,tipo:document.getElementById('etipo').value});
  toast('Cliente actualizado ✓');verCliente(id);
};

window.usarCliente=id=>{
  const cli=getClientes().find(c=>c._id===id);if(!cli)return;
  S.clientName=cli.nombre||'';S.clientAddr=cli.direccion||'';S.clientId=id;
  swTab(0);
};

window.doDelCli=async id=>{if(confirm('¿Eliminar este cliente?')){await delCliente(id);swTab(2)}};

// ─── BLOCK 5: CHECKLIST ──────────────────────────────────────────────────────
function rChecklist(c){
  c.innerHTML=`<div class="st"><span class="st-n">☑️</span><span class="st-h">Checklist de servicio</span></div>
  <div style="display:flex;gap:8px;margin-bottom:14px">
    ${isAdmin()?`<button class="cta oy" style="margin-top:0" onclick="window.open('checklist.html','_blank')">⚙️ Configurar plantillas</button>`:''}
    <button class="cta ob" style="margin-top:0" onclick="window.open('checklist.html','_blank')">▶️ Ejecutar checklist</button>
  </div>
  <div class="ibar">El módulo completo de checklist está en <strong>checklist.html</strong>. Abre esa pantalla para configurar plantillas (Admin) o ejecutar un servicio (Técnico).</div>
  <div style="padding:20px;background:var(--bg2);border:1px solid var(--border);text-align:center">
    <div style="font-size:40px;margin-bottom:10px">☑️</div>
    <div style="font-size:14px;font-weight:700;color:var(--tx);margin-bottom:6px">Checklist de servicio</div>
    <div style="font-size:11px;color:var(--mu2)">Configura los pasos del servicio por tipo de plaga y ejecútalos durante cada visita.</div>
    <button class="cta" style="margin-top:14px" onclick="window.open('checklist.html','_blank')">Abrir módulo</button>
  </div>`;
}

// ─── ADMIN TAB ────────────────────────────────────────────────────────────────
function swAdmin(c){
  if(!isAdmin()){c.innerHTML=`<div style="text-align:center;padding:60px 20px;color:var(--mu3)"><div style="font-size:36px">🔒</div><div style="margin-top:12px;font-size:13px">Acceso restringido a Admin</div></div>`;return}
  c.innerHTML=`<div class="st"><span class="st-n">⚙️</span><span class="st-h">Administración</span></div>
  <div class="blk"><span class="lbl">Acceso rápido</span>
    <div class="g2" style="margin-top:9px">
      <button class="card" onclick="showCfg()"><div class="ct">⚙️ Configuración</div><div class="cs">PINs, empresa, precios</div></button>
      <button class="card" onclick="window.open('inventario.html','_blank')"><div class="ct">📦 Inventario</div><div class="cs">Químicos, productos, extras</div></button>
      <button class="card" onclick="openDocs('',null)"><div class="ct">📄 Documentos</div><div class="cs">Pólizas y certificados</div></button>
      <button class="card" onclick="swTab(1)"><div class="ct">📋 Historial</div><div class="cs">Cotizaciones y estados</div></button>
      <button class="card" onclick="swTab(2)"><div class="ct">👥 Clientes</div><div class="cs">Fichas y búsqueda</div></button>
      <button class="card" onclick="window.open('checklist.html','_blank')"><div class="ct">☑️ Checklist</div><div class="cs">Plantillas de servicio</div></button>
    </div>
  </div>
  <div class="blk"><span class="lbl">Equipo de ventas</span>
    <div id="team-list">${getSellers().map((s,i)=>`<div class="inv-item"><div style="font-size:13px;font-weight:700;color:var(--tx)">${s}</div><button class="inv-del" onclick="delSel(${i})">✕</button></div>`).join('')}</div>
    <div style="display:flex;gap:8px;margin-top:9px">
      <input class="inp-text" id="sN" placeholder="Nombre del vendedor" style="flex:1">
      <button class="btn-add" onclick="addSel()">+</button>
    </div>
  </div>`;
}
window.addSel=async()=>{const n=document.getElementById('sN')?.value?.trim();if(!n){toast('Escribe un nombre');return}const s=getSellers();if(s.includes(n)){toast('Ya existe');return}s.push(n);await saveSellers(s);swAdmin(document.getElementById('cnt'))};
window.delSel=async i=>{const s=getSellers();if(s.length<=1){toast('Mínimo un vendedor');return}s.splice(i,1);await saveSellers(s);swAdmin(document.getElementById('cnt'))};

// ─── DOCS ────────────────────────────────────────────────────────────────────
function openDocs(type,data){
  if(data)localStorage.setItem('pw_doc_prefill',JSON.stringify({type,...data}));
  else if(type)localStorage.setItem('pw_doc_prefill',JSON.stringify({type}));
  else localStorage.removeItem('pw_doc_prefill');
  window.open('docs.html','_blank');
}

// ─── SAVE / RESET ─────────────────────────────────────────────────────────────
async function saveAndReset(aprobada=false){
  const r=S.result||calc();const pk=PKS.find(x=>x.id===S.paquete);
  const cat=LUGAR_CATS.find(cc=>cc.lugares.some(l=>l.id===S.lugar?.id));
  const dP=S.sharePrice==='intro'?r.pIn:r.pD;
  await addHist({
    clientName:S.clientName||'Sin nombre',clientAddr:S.clientAddr,clientId:S.clientId||null,
    cat:cat?.label||'',plaga:PLAGAS[S.plaga]?.label||'',paquete:pk?.label||'',
    precio:dP,seller:S.seller,notes:S.notes,
    exteriorOnly:S.lugar?.exteriorOnly||false,
    estado:aprobada?'Aprobada':'Borrador',  // Block 3: estado
    vigenciaDias:S.vigenciaDias,
    descEfectivo:S.descEfectivo,
    // Fields for Firestore financial dashboard future integration:
    costoTotal:r.costoTotal,utilidad:r.util,manoObra:r.mano,
  });
  toast('Guardado ✓');resetQ();
}
function resetQ(){S=iS();TC={infestacion:'normal',horario:'normal',freq:'unica',margen:38,selServiceIds:[],km:0,selProducts:[]};render()}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function toast(msg){
  const t=document.createElement('div');t.textContent=msg;
  t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--y);color:#0d0d0d;padding:10px 20px;font-weight:900;font-size:12px;letter-spacing:.1em;z-index:999;white-space:nowrap;border-radius:2px';
  document.body.appendChild(t);setTimeout(()=>t.remove(),2500);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
renderPin('unlock');
</script>
