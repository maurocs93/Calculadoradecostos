<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<meta name="theme-color" content="#f5c800">
<link rel="manifest" href="manifest.json">
<title>Plagaway · Cotizador</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0d0d;--bg2:#141414;--bg3:#1c1c1c;--border:#272727;--border2:#1e1e1e;--y:#f5c800;--y2:#c9a200;--y3:#7a6100;--y4:#1a1600;--tx:#f5f0e8;--tx2:#c8c0b0;--mu:#888880;--mu2:#555550;--mu3:#333330;--red:#ff4444;--blue:#4ac8f0;--green:#72c040;--orange:#ff8844}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Helvetica Neue',Arial,sans-serif;overscroll-behavior:none;font-size:15px}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.hdr{padding:13px 18px 10px;border-bottom:2px solid var(--y3);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--bg);z-index:20}
.logo-wm{font-size:22px;font-weight:900;color:var(--tx);letter-spacing:-1px;line-height:1}
.logo-wm b{color:var(--y)}
.logo-pill{background:var(--y);color:#0d0d0d;font-size:7px;font-weight:900;letter-spacing:.15em;padding:3px 6px;text-transform:uppercase;align-self:flex-start;margin-top:2px}
.hdr-row{display:flex;align-items:center;gap:8px}
.hdr-sub{font-size:9px;color:var(--mu2);margin-top:4px;letter-spacing:.05em}
.hdr-right{display:flex;gap:7px;align-items:center;margin-top:2px}
.btn-sm{background:transparent;border:1px solid var(--border);color:var(--mu);padding:7px 11px;font-size:9px;font-weight:700;letter-spacing:.1em;cursor:pointer;text-transform:uppercase;font-family:inherit}
.prog{display:flex;padding:0 18px;background:var(--bg);border-bottom:1px solid var(--border2)}
.ps{flex:1;padding:7px 0}
.pb{height:3px;background:var(--border2);transition:background .3s}
.pb.done{background:var(--y2)}.pb.act{background:var(--y)}
.pl{font-size:7px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu3);margin-top:4px;transition:color .3s}
.pl.act{color:var(--y)}.pl.done{color:var(--mu2)}
.cnt{padding:18px 18px 90px;flex:1}
.fade{animation:fu .22s ease both}
@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.st{margin-bottom:16px;display:flex;align-items:baseline;gap:10px}
.st-n{font-size:10px;font-weight:900;color:#0d0d0d;background:var(--y);padding:3px 7px;letter-spacing:.1em;flex-shrink:0}
.st-h{font-size:19px;font-weight:700;color:var(--tx)}
.lbl{font-size:10px;font-weight:700;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;display:block}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.g1{display:grid;gap:7px}
.card{background:var(--bg2);border:1px solid var(--border);color:var(--tx2);padding:12px 14px;cursor:pointer;font-family:inherit;transition:all .12s;text-align:left;width:100%;-webkit-appearance:none}
.card:active{transform:scale(.97)}
.card.on{background:var(--y4);border-color:var(--y);color:var(--tx)}
.ct{font-size:14px;font-weight:600;margin-bottom:3px}
.cs{font-size:10px;color:var(--mu2)}
.ch{font-size:10px;color:var(--mu3);margin-top:3px;font-weight:500}
.ctag{font-size:9px;color:var(--red);font-weight:800;letter-spacing:.1em;text-transform:uppercase}
.badge-best{display:inline-block;font-size:8px;font-weight:900;padding:2px 7px;letter-spacing:.1em;margin-bottom:5px}
.cat-group{margin-bottom:12px}
.cat-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;user-select:none}
.cat-hdr.open{border-color:var(--y2);background:var(--y4)}
.cat-title{font-size:15px;font-weight:700;color:var(--tx)}
.cat-sub{font-size:10px;color:var(--mu2);margin-top:2px}
.cat-ch{font-size:14px;color:var(--mu2);transition:transform .2s}
.cat-ch.open{transform:rotate(180deg);color:var(--y)}
.cat-body{border:1px solid var(--border);border-top:none;padding:10px;display:none}
.cat-body.open{display:grid;gap:7px}
.irow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.im2{background:var(--bg2);border:1px solid var(--border);color:var(--tx);padding:11px 13px;font-size:30px;font-weight:300;font-family:inherit;width:130px;outline:none;-webkit-appearance:none}
.im2:focus{border-color:var(--y)}
.iu{color:var(--mu);font-size:18px}
.bsug{background:transparent;border:1px solid var(--border);color:var(--mu);font-size:9px;font-weight:700;padding:6px 10px;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;font-family:inherit}
.inp-text{background:var(--bg2);border:1px solid var(--border);color:var(--tx);padding:10px 12px;font-family:inherit;font-size:13px;outline:none;width:100%}
.inp-text:focus{border-color:var(--y)}
.inp-num{background:var(--bg2);border:1px solid var(--border);color:var(--tx);padding:10px 12px;font-family:inherit;font-size:13px;outline:none;width:80px;-webkit-appearance:none}
.trow{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:all .2s}
.trow.on{border-color:var(--y);background:var(--y4)}
.tlbl{font-size:13px;font-weight:500;color:var(--mu);transition:color .2s}
.trow.on .tlbl{color:var(--tx)}
.tsub{font-size:10px;color:var(--mu2);margin-top:2px}
.tsw{width:36px;height:20px;background:var(--border);border-radius:10px;position:relative;flex-shrink:0;transition:background .2s}
.trow.on .tsw{background:var(--y)}
.tkn{width:14px;height:14px;background:var(--mu3);border-radius:50%;position:absolute;top:3px;left:3px;transition:all .2s}
.trow.on .tkn{left:19px;background:#0d0d0d}
.qty-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--y4);border:1px solid var(--y);border-top:none}
.qty-btn{background:var(--border);border:none;color:var(--tx);width:30px;height:30px;font-size:16px;cursor:pointer;font-weight:700;font-family:inherit}
.qty-val{font-size:16px;font-weight:700;color:var(--y);min-width:24px;text-align:center}
.qty-price{font-size:11px;color:var(--mu2)}
input[type=range]{width:100%;accent-color:var(--y);height:4px;-webkit-appearance:none;background:var(--border);border-radius:2px;outline:none;display:block}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;background:var(--y);border-radius:50%;cursor:pointer}
.rlbls{display:flex;justify-content:space-between;font-size:9px;font-weight:700;color:var(--mu2);margin-top:6px;text-transform:uppercase}
.blk{margin-bottom:20px}
.note-inp{background:var(--bg2);border:1px solid var(--border);color:var(--tx);padding:11px 13px;font-family:inherit;font-size:13px;outline:none;width:100%;resize:none;height:75px;line-height:1.4}
.note-inp:focus{border-color:var(--y)}
.cta{width:100%;background:var(--y);color:#0d0d0d;border:none;padding:16px;font-size:13px;letter-spacing:.2em;text-transform:uppercase;font-family:inherit;font-weight:900;cursor:pointer;margin-top:10px;transition:opacity .15s}
.cta:active{opacity:.85}
.cta.sec{background:transparent;border:1px solid var(--border);color:var(--mu);font-weight:700}
.cta.oy{background:transparent;border:2px solid var(--y);color:var(--y);font-weight:900}
.rbox{border:2px solid var(--y);padding:20px;background:var(--bg2);margin-bottom:14px}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.rdiv{border:none;border-top:1px solid var(--border2);margin-bottom:16px}
.rpl{font-size:9px;font-weight:800;color:var(--mu2);letter-spacing:.18em;text-transform:uppercase;margin-bottom:4px}
.rpv{font-size:24px;font-weight:300}
.rpv.y{color:var(--y);font-weight:700}.rpv.b{color:var(--blue)}.rpv.w{color:var(--tx)}.rpv.g{color:var(--green)}
.rps{font-size:9px;color:var(--mu3);margin-top:3px}
.psel{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.popt{padding:13px 14px;border:2px solid var(--border);cursor:pointer;transition:all .15s;background:var(--bg2)}
.popt.on{border-color:var(--y);background:var(--y4)}
.popt-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.15em;color:var(--mu2);margin-bottom:4px}
.popt.on .popt-lbl{color:var(--y)}
.popt-val{font-size:20px;font-weight:700;color:var(--tx)}
.popt.on .popt-val{color:var(--y)}
.popt-sub{font-size:9px;color:var(--mu3);margin-top:3px}
.cbox{border:1px solid var(--border);background:var(--bg2);margin-bottom:12px;overflow:hidden}
.cbox-hdr{display:flex;justify-content:space-between;align-items:center;padding:13px 15px;cursor:pointer}
.cbox-title{font-size:10px;font-weight:800;color:var(--mu2);letter-spacing:.18em;text-transform:uppercase}
.cbox-ch{font-size:14px;color:var(--mu2);transition:transform .2s}
.cbox-ch.open{transform:rotate(180deg)}
.cbox-body{border-top:1px solid var(--border2);display:none}
.cbox-body.open{display:block}
.cbox-sec{padding:11px 15px;border-bottom:1px solid var(--border2)}
.cbox-sec:last-child{border-bottom:none}
.cbox-sec-t{font-size:9px;font-weight:800;color:var(--mu3);letter-spacing:.13em;text-transform:uppercase;margin-bottom:7px}
.crow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border2)}
.crow:last-child{border-bottom:none}
.crl{font-size:11px;color:var(--mu)}
.crv{font-size:12px;font-weight:600}
.ibar{padding:11px 13px;background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--y);font-size:11px;color:var(--mu);margin-bottom:10px;line-height:1.5}
.ibar strong{color:var(--y)}
.ibar.bl{border-left-color:var(--blue)}.ibar.bl strong{color:var(--blue)}
.nav{display:flex;border-top:1px solid var(--border);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg);z-index:20}
.nav-tab{flex:1;padding:10px 0 12px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:transparent;font-family:inherit;color:var(--mu2);transition:color .15s}
.nav-tab.act{color:var(--y)}
.nav-icon{font-size:17px;line-height:1}
.nav-lbl{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.hist-item{background:var(--bg2);border:1px solid var(--border);padding:12px 14px;margin-bottom:7px}
.hist-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.hist-name{font-size:13px;font-weight:700;color:var(--tx)}
.hist-price{font-size:15px;font-weight:700;color:var(--y)}
.hist-meta{font-size:10px;color:var(--mu2)}
.hist-del{background:transparent;border:none;color:var(--mu3);font-size:14px;cursor:pointer;padding:2px 4px}
.s-row{display:flex;gap:8px;margin-bottom:14px}
.s-inp{flex:1;background:var(--bg2);border:1px solid var(--border);color:var(--tx);padding:10px 12px;font-family:inherit;font-size:13px;outline:none}
.s-inp:focus{border-color:var(--y)}
.s-sel{background:var(--bg2);border:1px solid var(--border);color:var(--mu);padding:10px;font-family:inherit;font-size:12px;outline:none;cursor:pointer}
.chem-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);margin-bottom:6px}
.chem-del{background:transparent;border:none;color:var(--red);font-size:16px;cursor:pointer;padding:0 4px;font-weight:700}
.add-row{display:grid;grid-template-columns:1fr auto auto;gap:7px;margin-top:9px}
.btn-add{background:var(--y);color:#0d0d0d;border:none;padding:10px 14px;font-weight:900;font-size:14px;cursor:pointer;font-family:inherit}
.cs-item{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:var(--bg2);border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:all .15s}
.cs-item.on{background:var(--y4);border-color:var(--y)}
.cs-chk{width:18px;height:18px;border:2px solid var(--border);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#0d0d0d}
.cs-item.on .cs-chk{background:var(--y);border-color:var(--y)}
.pin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);padding:40px 20px;gap:22px}
.pin-logo{font-size:32px;font-weight:900;color:var(--tx);letter-spacing:-1px}
.pin-logo b{color:var(--y)}
.pin-sub{font-size:11px;color:var(--mu2);letter-spacing:.1em;text-transform:uppercase}
.pin-dots{display:flex;gap:14px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:all .15s}
.pin-dot.filled{background:var(--y);border-color:var(--y)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px}
.pin-key{background:var(--bg2);border:1px solid var(--border);color:var(--tx);font-size:20px;font-weight:600;padding:17px;cursor:pointer;font-family:inherit;transition:all .12s;border-radius:50%}
.pin-key:active{background:var(--y);color:#0d0d0d;transform:scale(.93)}
.pin-err{color:var(--red);font-size:11px;font-weight:700;letter-spacing:.1em;min-height:16px;text-transform:uppercase;text-align:center}
.pin-change{background:transparent;border:none;color:var(--mu2);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;font-family:inherit;margin-top:4px}
.odot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px}
.xdot{width:7px;height:7px;border-radius:50%;background:var(--mu3);display:inline-block;margin-right:5px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block;margin-right:6px;vertical-align:middle}
</style>
</head>
<body>
<div id="ps" style="display:none"></div>
<div id="app" style="display:none;flex-direction:column">
  <div class="hdr">
    <div>
      <div class="hdr-row"><div class="logo-wm">PLAGA<b>W</b>AY</div><div class="logo-pill">Pro</div></div>
      <div class="hdr-sub" id="cs"><span class="xdot"></span>Hermosillo, Son. · COFEPRIS</div>
    </div>
    <div class="hdr-right">
      <button class="btn-sm" id="btnr" style="display:none" onclick="resetQ()">← Nueva</button>
      <button class="btn-sm" onclick="showPC()">🔒</button>
    </div>
  </div>
  <div class="prog" id="pgbar">
    <div class="ps"><div class="pb" id="pb1"></div><div class="pl" id="pl1">Lugar</div></div>
    <div class="ps"><div class="pb" id="pb2"></div><div class="pl" id="pl2">Plaga</div></div>
    <div class="ps"><div class="pb" id="pb3"></div><div class="pl" id="pl3">Paquete</div></div>
    <div class="ps"><div class="pb" id="pb4"></div><div class="pl" id="pl4">Detalles</div></div>
    <div class="ps"><div class="pb" id="pb5"></div><div class="pl" id="pl5">Precio</div></div>
  </div>
  <div class="cnt fade" id="cnt"></div>
  <div class="nav">
    <button class="nav-tab act" id="nt0" onclick="swTab(0)"><div class="nav-icon">🧮</div><div class="nav-lbl">Cotizar</div></button>
    <button class="nav-tab" id="nt1" onclick="swTab(1)"><div class="nav-icon">📋</div><div class="nav-lbl">Historial</div></button>
    <button class="nav-tab" id="nt2" onclick="swTab(2)"><div class="nav-icon">⚗️</div><div class="nav-lbl">Químicos</div></button>
    <button class="nav-tab" id="nt3" onclick="swTab(3)"><div class="nav-icon">👤</div><div class="nav-lbl">Equipo</div></button>
  </div>
</div>
<script>
const db={get:k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}},set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))};
let isOnline=navigator.onLine;
window.addEventListener('online',()=>{isOnline=true;updCS()});
window.addEventListener('offline',()=>{isOnline=false;updCS()});
function updCS(){const e=document.getElementById('cs');if(!e)return;e.innerHTML=isOnline?'<span class="odot"></span>En línea · Hermosillo, Son.':'<span class="xdot"></span>Sin conexión · Modo local'}
function getPin(){return db.get('pw_pin')||'1234'}
function setPin(p){db.set('pw_pin',p)}
function renderPin(mode,onOk){
  const ps=document.getElementById('ps');
  ps.style.cssText='display:flex;flex-direction:column;min-height:100vh';
  let buf='',step=0,fp='';
  function draw(err=''){
    ps.innerHTML=`<div class="pin-wrap"><div class="pin-logo">PLAGA<b>W</b>AY</div><div class="pin-sub">${mode==='unlock'?'Cotizador Interno':step===0?'PIN nuevo':'Confirmar PIN'}</div><div class="pin-dots">${[0,1,2,3].map(i=>`<div class="pin-dot ${buf.length>i?'filled':''}"></div>`).join('')}</div><div class="pin-err">${err}</div><div class="pin-pad">${[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k=>`<button class="pin-key" onclick="pk('${k}')" ${k===''?'style="visibility:hidden"':''}>${k}</button>`).join('')}</div>${mode!=='unlock'?`<button class="pin-change" onclick="cancelPC()">Cancelar</button>`:''}</div>`;
    window.pk=k=>{if(k==='⌫'){buf=buf.slice(0,-1);draw();return}if(buf.length>=4)return;buf+=k;draw();if(buf.length===4)setTimeout(()=>chk(buf),120)};
  }
  function chk(entered){
    if(mode==='unlock'){
      if(entered===getPin()){ps.style.display='none';const a=document.getElementById('app');a.style.display='flex';a.style.flexDirection='column';updCS();if(onOk)onOk();else render()}
      else{buf='';draw('PIN incorrecto')}
    }else{
      if(step===0){fp=entered;buf='';step=1;draw()}
      else{if(entered===fp){setPin(entered);cancelPC();toast('PIN actualizado ✓')}else{buf='';step=0;fp='';draw('No coinciden')}}
    }
  }
  draw();
}
function showPC(){document.getElementById('app').style.display='none';renderPin('change')}
window.cancelPC=()=>{document.getElementById('ps').style.display='none';const a=document.getElementById('app');a.style.display='flex';a.style.flexDirection='column'};
function getSellers(){return db.get('pw_sellers')||['Heriberto','Mauro']}
function saveSellers(s){db.set('pw_sellers',s)}
function getChems(){return db.get('pw_chems')||[{id:'cynoff',name:'Cynoff 40',price:16.25},{id:'demand',name:'Demand Duo',price:21.73}]}
function saveChems(c){db.set('pw_chems',c)}
function getHist(){return db.get('pw_hist')||[]}
function saveHist(h){db.set('pw_hist',h)}
function addHist(e){const h=getHist();h.unshift({...e,id:Date.now(),date:new Date().toLocaleDateString('es-MX')});if(h.length>100)h.pop();saveHist(h)}
const FIJOS=167,GAS=123,CONS=6.25;
const PLAGAS={
  comun:{label:'Plaga Común',sub:'Cucaracha, grillo, araña, pescadito',color:'#f5c800',litros:.075,lineal:.03,b:false},
  voladores:{label:'Insectos Voladores',sub:'Moscas, mosquitos, zancudos',color:'#4ac8f0',litros:.06,lineal:.02,b:false},
  especial:{label:'Plaga Especial',sub:'Chinches, termita, roedores',color:'#ff4444',litros:.10,lineal:.04,b:true,tag:true},
  alacran:{label:'Alacrán (correctivo)',sub:'Presencia activa confirmada',color:'#ff8844',litros:.12,lineal:.05,b:true,tag:true},
};
const LUGAR_CATS=[
  {id:'hogar',label:'Hogar',sub:'Residencia',icon:'🏠',lugares:[
    {id:'hogar',label:'Hogar / Residencia',sub:'Cotización por área',m2:200,mult:1.0}]},
  {id:'negocio',label:'Negocios',sub:'Comercio y servicios',icon:'🏪',lugares:[
    {id:'restaurante',label:'Restaurante / Cafetería',sub:'Food service · COFEPRIS',m2:150,mult:1.2},
    {id:'oficina',label:'Oficinas / Locales',sub:'Corporativo y comercio',m2:200,mult:1.0},
    {id:'hotel',label:'Hotel / Hospedaje',sub:'Turismo y hospitalidad',m2:400,mult:1.25},
    {id:'otro_neg',label:'Otro negocio',sub:'Captura manual de m²',m2:0,mult:1.05}]},
  {id:'industria',label:'Industrias',sub:'Manufactura y logística',icon:'🏭',lugares:[
    {id:'bodega',label:'Bodega / Almacén',sub:'Logística e industrial',m2:500,mult:1.15},

  if(S.useLineal&&S.linealM){lineal=parseFloat(S.linealM);area=lineal*3}else{area=parseFloat(S.m2)||0}
  let cq=0;

  else{const lt=S.useLineal?lineal*p.lineal:area*p.litros;cq=lt*16.25;if(p.b)cq+=lt*.4*21.73}

      <div><div class="rpl">Mano de obra</div><div class="rpv w">${fmt(r.mano)}</div><div class="rps">10% socios</div></div>
    </div>
  </div>

  <div class="cbox">
    <div class="cbox-hdr" onclick="togAcc('a1')"><span class="cbox-title">Desglose completo de costos</span><span class="cbox-ch" id="a1-i">▼</span></div>
    <div class="cbox-body" id="a1">
      <div class="cbox-sec"><div class="cbox-sec-t">▸ Insumos y extras</div>
        ${r.sc.length>0?r.sc.map(ch=>`<div class="crow"><span class="crl">${ch.name}</span><span class="crv" style="color:var(--mu)">${fmt(r.cq/r.sc.length)}</span></div>`).join(''):`<div class="crow"><span class="crl">Químicos (base)</span><span class="crv" style="color:var(--mu)">${fmt(r.cq)}</span></div>`}
        ${S.hormiga?`<div class="crow"><span class="crl">Hormigueros</span><span class="crv" style="color:var(--mu)">$50</span></div>`:''}
        ${S.trampaMosca?`<div class="crow"><span class="crl">Trampas moscas ×${S.trampaMoscaQty}</span><span class="crv" style="color:var(--mu)">${fmt(S.trampaMoscaQty*280)}</span></div>`:''}
        ${S.cebaderoRoedor?`<div class="crow"><span class="crl">Cebaderos roedores ×${S.cebaderoQty}</span><span class="crv" style="color:var(--mu)">${fmt(S.cebaderoQty*180)}</span></div>`:''}
      </div>
      <div class="cbox-sec"><div class="cbox-sec-t">▸ Operativo</div>
        <div class="crow"><span class="crl">Gasolina</span><span class="crv" style="color:var(--mu)">$123</span></div>
        <div class="crow"><span class="crl">Consumibles técnicos</span><span class="crv" style="color:var(--mu)">$6</span></div>
        ${S.foraneo?`<div class="crow"><span class="crl">Traslado foráneo</span><span class="crv" style="color:var(--mu)">$200</span></div>`:''}
        ${S.cert?`<div class="crow"><span class="crl">Certificado COESPRISSON</span><span class="crv" style="color:var(--mu)">$450</span></div>`:''}
      </div>
      <div class="cbox-sec"><div class="cbox-sec-t">▸ Fijos prorrateados</div>
        <div class="crow"><span class="crl">Renta y gastos fijos</span><span class="crv" style="color:var(--mu)">${fmt(r.cf)}</span></div>
      </div>
      <div class="cbox-sec"><div class="cbox-sec-t">▸ Distribución</div>
        <div class="crow"><span class="crl">Mano de obra (10%)</span><span class="crv" style="color:var(--y)">${fmt(r.mano)}</span></div>
        <div class="crow"><span class="crl">Utilidad empresa (${S.margen}%)</span><span class="crv" style="color:var(--green)">${fmt(r.util)}</span></div>
        ${r.ml.map(m=>`<div class="crow"><span class="crl">${m}</span><span class="crv" style="color:var(--orange)">aplicado</span></div>`).join('')}
        ${r.desc>0?`<div class="crow"><span class="crl">Descuento póliza</span><span class="crv" style="color:var(--green)">−${r.desc}%</span></div>`:''}
        ${S.sharePrice==='intro'?`<div class="crow"><span class="crl">Precio intro</span><span class="crv" style="color:var(--blue)">−5%</span></div>`:''}
      </div>
    </div>
  </div>

  <div class="ibar"><strong>Garantía:</strong> ${r.g}${r.desc>0?`&nbsp;·&nbsp;<span style="color:var(--green)">Póliza −${r.desc}%</span>`:''}</div>
  ${S.notes?`<div class="ibar" style="border-left-color:var(--mu2)"><strong style="color:var(--mu)">Notas internas:</strong> ${S.notes}</div>`:''}
  ${ev?`<div class="ibar bl"><strong>Ref. Expogan 2024:</strong> Competencia cobró $6,600 + IVA. Tu precio (${fmt(dP)} + IVA) es ${dP<6600?'competitivo, deja margen para negociar.':'similar al mercado — justifica con certificado.'}</div>`:''}

  <button class="cta oy" style="margin-top:14px" onclick="shareQ()">📤 &nbsp;Compartir cotización</button>
  <button class="cta" onclick="saveAndReset()">✓ Guardar y nueva cotización</button>
  <button class="cta sec" onclick="resetQ()">← Cancelar sin guardar</button>`;
}
window.togAcc=id=>{const b=document.getElementById(id),i=document.getElementById(id+'-i');if(!b)return;const o=b.classList.contains('open');b.classList.toggle('open',!o);if(i)i.classList.toggle('open',!o)};
function shareQ(){
  const r=S.result,pk=PAQUETES.find(x=>x.id===S.paquete),isH=S.lugar?.id==='hogar';
  const inc=isH?pk.hInc:pk.gInc;
  const fecha=new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'long',year:'numeric'});
  const dP=S.sharePrice==='intro'?r.pIn:r.pD,dI=S.sharePrice==='intro'?r.pInI:r.pI;
  const cat=LUGAR_CATS.find(c=>c.lugares.some(l=>l.id===S.lugar?.id));
  const txt=`*PLAGAWAY* · Control total, plagas fuera 🦟\n_Hermosillo, Son. · COFEPRIS · COESPRISSON_\n━━━━━━━━━━━━━━━━━━━\n\n📋 *COTIZACIÓN PROFESIONAL*\nFecha: ${fecha}${S.clientName?'\nCliente: *'+S.clientName+'*':''}${S.clientAddr?'\nLugar: '+S.clientAddr:''}${cat?'\nTipo: '+cat.label:''}\n\n📦 *${pk?.label||''}*\n${PLAGAS[S.plaga]?.label||''}${S.infestacion==='alta'?'\n⚠️ Infestación severa':''}${S.horario==='nocturno'?'\n🌙 Horario especial':''}\n\n━━━━━━━━━━━━━━━━━━━\n💰 *INVERSIÓN*\n\nPrecio: *${fmt(dP)}* (sin IVA)\nTotal con IVA: *${fmt(dI)}*\n\n━━━━━━━━━━━━━━━━━━━\n✅ *¿QUÉ INCLUYE?*\n${inc.map(i=>'• '+i).join('\n')}${S.cert?'\n• Certificado COESPRISSON oficial':''}${S.trampaMosca?'\n• Trampas para moscas ×'+S.trampaMoscaQty:''}${S.cebaderoRoedor?'\n• Cebaderos para roedores ×'+S.cebaderoQty:''}\n\n🛡️ *Garantía:* ${r.g}${r.desc>0?'\n🎁 Descuento aplicado: '+r.desc+'%':''}\n\n━━━━━━━━━━━━━━━━━━━\n🏅 *¿Por qué Plagaway?*\n• Licencia sanitaria COFEPRIS\n• Protocolos validados ante COESPRISSON\n• Productos de banda verde (baja toxicidad)\n• Reporte técnico de puntos de riesgo\n\n_"Control total, plagas fuera"_ 🦟`.trim();
  if(navigator.share)navigator.share({text:txt}).catch(()=>copyClip(txt));else copyClip(txt);
}
function copyClip(t){navigator.clipboard.writeText(t).then(()=>toast('Cotización copiada ✓')).catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Cotización copiada ✓')})}
function toast(msg){const t=document.createElement('div');t.textContent=msg;t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--y);color:#0d0d0d;padding:10px 20px;font-weight:900;font-size:12px;letter-spacing:.1em;z-index:999;white-space:nowrap';document.body.appendChild(t);setTimeout(()=>t.remove(),2500)}
function saveAndReset(){
  const r=S.result,pk=PAQUETES.find(x=>x.id===S.paquete),cat=LUGAR_CATS.find(c=>c.lugares.some(l=>l.id===S.lugar?.id));
  addHist({clientName:S.clientName||'Sin nombre',clientAddr:S.clientAddr,cat:cat?.label||'',plaga:PLAGAS[S.plaga]?.label||'',paquete:pk?.label||'',precio:S.sharePrice==='intro'?r.pIn:r.pD,precioIVA:S.sharePrice==='intro'?r.pInI:r.pI,priceType:S.sharePrice,seller:S.seller,notes:S.notes});
  toast('Guardado ✓');resetQ();
}
function resetQ(){S=iS();render()}
function rHist(c){
  const allH=getHist(),sellers=['Todos',...getSellers()],ss=db.get('pw_hs')||'Todos',sq=db.get('pw_hq')||'';
  let h=allH;if(ss!=='Todos')h=h.filter(x=>x.seller===ss);if(sq)h=h.filter(x=>(x.clientName+x.clientAddr+x.plaga+x.paquete+x.seller).toLowerCase().includes(sq.toLowerCase()));
  c.innerHTML=`<div class="st"><span class="st-n">📋</span><span class="st-h">Historial</span></div>
  <div class="s-row">
    <input class="s-inp" placeholder="Buscar cliente, plaga..." value="${sq}" oninput="db.set('pw_hq',this.value);rHist(document.getElementById('cnt'))">
    <select class="s-sel" onchange="db.set('pw_hs',this.value);rHist(document.getElementById('cnt'))">
      ${sellers.map(s=>`<option value="${s}" ${ss===s?'selected':''}>${s}</option>`).join('')}
    </select>
  </div>
  ${h.length===0?`<div style="text-align:center;padding:50px 20px;color:var(--mu3)"><div style="font-size:36px;margin-bottom:12px">📋</div><div style="font-size:13px">Sin cotizaciones${sq||ss!=='Todos'?' que coincidan.':' guardadas.'}</div></div>`
  :h.map(item=>`<div class="hist-item">
    <div class="hist-top">
      <div><div class="hist-name">${item.clientName}</div>
      <div class="hist-meta">${item.date} · ${item.cat||''} · ${item.plaga||''}</div>
      ${item.paquete?`<div style="font-size:10px;color:var(--y);margin-top:2px">${item.paquete}</div>`:''}
      ${item.seller?`<div style="font-size:10px;color:var(--mu3);margin-top:2px">Vendedor: ${item.seller}</div>`:''}
      </div>
      <div style="display:flex;align-items:flex-start;gap:8px">
        <div><div class="hist-price">${fmt(item.precio)}</div><div style="font-size:9px;color:var(--mu3);text-align:right">${item.priceType==='intro'?'intro':'estándar'}</div></div>
        <button class="hist-del" onclick="delH(${allH.indexOf(item)})">✕</button>
      </div>
    </div>
    ${item.clientAddr?`<div style="font-size:10px;color:var(--mu3);margin-top:4px">${item.clientAddr}</div>`:''}
    ${item.notes?`<div style="font-size:10px;color:var(--mu3);margin-top:2px;font-style:italic">${item.notes}</div>`:''}
  </div>`).join('')}
  ${allH.length>0?`<button class="cta sec" style="margin-top:8px" onclick="if(confirm('¿Borrar todo el historial?')){saveHist([]);db.set('pw_hq','');db.set('pw_hs','Todos');rHist(document.getElementById('cnt'))}">Borrar historial completo</button>`:''}`;
}
window.delH=i=>{const h=getHist();h.splice(i,1);saveHist(h);rHist(document.getElementById('cnt'))};
function rChems(c){
  const chems=getChems();
  c.innerHTML=`<div class="st"><span class="st-n">⚗️</span><span class="st-h">Químicos</span></div>
  <div style="margin-bottom:16px">${chems.map((ch,i)=>`<div class="chem-item"><div><div style="font-size:13px;font-weight:600;color:var(--tx)">${ch.name}</div><div style="font-size:11px;color:var(--mu)">$${ch.price}/litro</div></div><button class="chem-del" onclick="delCh(${i})">✕</button></div>`).join('')}</div>
  <span class="lbl">Agregar químico</span>
  <div class="add-row"><input class="inp-text" id="chN" placeholder="Nombre del producto"><input class="inp-num" id="chP" placeholder="$/L" type="number" step="0.01" inputmode="decimal"><button class="btn-add" onclick="addCh()">+</button></div>
  <div style="font-size:10px;color:var(--mu3);margin-top:8px">Los químicos guardados estarán disponibles en todas las cotizaciones.</div>`;
}
window.addCh=()=>{const n=document.getElementById('chN').value.trim(),p=parseFloat(document.getElementById('chP').value);if(!n||!p||p<=0){toast('Completa nombre y precio');return}const c=getChems();c.push({id:'c'+Date.now(),name:n,price:p});saveChems(c);rChems(document.getElementById('cnt'))};
window.delCh=i=>{const c=getChems();if(c.length<=1){toast('Debe haber al menos un químico');return}c.splice(i,1);saveChems(c);rChems(document.getElementById('cnt'))};
function rSellers(c){
  const sellers=getSellers(),hist=getHist();
  c.innerHTML=`<div class="st"><span class="st-n">👤</span><span class="st-h">Equipo de ventas</span></div>
  <div style="margin-bottom:16px">${sellers.map((s,i)=>`<div class="chem-item"><div style="font-size:13px;font-weight:700;color:var(--tx)">${s}</div><button class="chem-del" onclick="delSel(${i})">✕</button></div>`).join('')}</div>
  <span class="lbl">Agregar vendedor</span>
  <div class="add-row"><input class="inp-text" id="sN" placeholder="Nombre del vendedor"><div></div><button class="btn-add" onclick="addSel()">+</button></div>
  <div style="font-size:10px;color:var(--mu3);margin-top:8px;margin-bottom:24px">Los vendedores aparecen al cotizar y en el historial.</div>
  <span class="lbl">Resumen por vendedor</span>
  ${sellers.map(s=>{const h=hist.filter(x=>x.seller===s),tot=h.reduce((a,x)=>a+x.precio,0);return`<div style="display:flex;justify-content:space-between;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);margin-bottom:6px"><div><div style="font-size:13px;font-weight:700;color:var(--tx)">${s}</div><div style="font-size:10px;color:var(--mu2)">${h.length} cotización${h.length!==1?'es':''}</div></div><div style="font-size:15px;font-weight:700;color:var(--y)">${h.length?fmt(tot):'—'}</div></div>`}).join('')}`;
}
window.addSel=()=>{const n=document.getElementById('sN').value.trim();if(!n){toast('Escribe un nombre');return}const s=getSellers();if(s.includes(n)){toast('Ya existe');return}s.push(n);saveSellers(s);rSellers(document.getElementById('cnt'))};
window.delSel=i=>{const s=getSellers();if(s.length<=1){toast('Debe haber al menos un vendedor');return}s.splice(i,1);saveSellers(s);rSellers(document.getElementById('cnt'))};
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
renderPin('unlock');
</script>
</body>
</html>
