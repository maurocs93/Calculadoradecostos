<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Plagaway · Checklist</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0d0d;--bg2:#141414;--bg3:#1c1c1c;--border:#272727;--border2:#1e1e1e;--y:#f5c800;--y2:#c9a200;--y3:#7a6100;--y4:#1a1600;--tx:#f5f0e8;--tx2:#c8c0b0;--mu:#888880;--mu2:#555550;--mu3:#333330;--red:#ff4444;--blue:#4ac8f0;--green:#72c040;--orange:#ff8844}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Helvetica Neue',Arial,sans-serif;overscroll-behavior:none;font-size:15px}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.hdr{padding:13px 18px 10px;border-bottom:2px solid var(--y3);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--bg);z-index:20}
.logo-wm{font-size:22px;font-weight:900;color:var(--tx);letter-spacing:-1px;line-height:1}.logo-wm b{color:var(--y)}
.logo-pill{background:var(--y);color:#0d0d0d;font-size:7px;font-weight:900;letter-spacing:.15em;padding:3px 6px;text-transform:uppercase;align-self:flex-start;margin-top:2px}
.hdr-row{display:flex;align-items:center;gap:8px}
.hdr-sub{font-size:9px;color:var(--mu2);margin-top:4px}
.hdr-right{display:flex;gap:7px;align-items:center;margin-top:2px}
.btn-sm{background:transparent;border:1px solid var(--border);color:var(--mu);padding:7px 11px;font-size:9px;font-weight:700;letter-spacing:.1em;cursor:pointer;text-transform:uppercase;font-family:inherit}
.cnt{padding:18px 18px 40px;flex:1}
.fade{animation:fu .22s ease both}
@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.st{margin-bottom:16px;display:flex;align-items:baseline;gap:10px}
.st-n{font-size:10px;font-weight:900;color:#0d0d0d;background:var(--y);padding:3px 7px;letter-spacing:.1em;flex-shrink:0}
.st-h{font-size:18px;font-weight:700;color:var(--tx)}
.lbl{font-size:10px;font-weight:700;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;display:block}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.inp{background:var(--bg2);border:1px solid var(--border);color:var(--tx);padding:10px 12px;font-family:inherit;font-size:13px;outline:none;width:100%}
.inp:focus{border-color:var(--y)}
.blk{margin-bottom:18px}
.cta{width:100%;background:var(--y);color:#0d0d0d;border:none;padding:15px;font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-family:inherit;font-weight:900;cursor:pointer;margin-top:10px;transition:opacity .15s}
.cta:active{opacity:.85}
.cta.sec{background:transparent;border:1px solid var(--border);color:var(--mu);font-weight:700}
.cta.oy{background:transparent;border:2px solid var(--y);color:var(--y);font-weight:900}
.cta.og{background:transparent;border:2px solid var(--green);color:var(--green);font-weight:900}
.cta.ob{background:transparent;border:2px solid var(--blue);color:var(--blue);font-weight:900}
.card{background:var(--bg2);border:1px solid var(--border);padding:13px 14px;margin-bottom:7px;cursor:pointer;transition:all .12s;text-align:left;width:100%;font-family:inherit}
.card:active{transform:scale(.98)}.card.on{background:var(--y4);border-color:var(--y)}
.ct{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:3px}.cs{font-size:10px;color:var(--mu2)}
.ibar{padding:10px 13px;background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--y);font-size:11px;color:var(--mu);margin-bottom:12px;line-height:1.5}
.ibar strong{color:var(--y)}.ibar.gr{border-left-color:var(--green)}.ibar.gr strong{color:var(--green)}
.ibar.bl{border-left-color:var(--blue)}.ibar.bl strong{color:var(--blue)}
/* Check items */
.chk-item{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;background:var(--bg2);border:1px solid var(--border);margin-bottom:7px;cursor:pointer;transition:all .15s;position:relative}
.chk-item.done{background:var(--y4);border-color:var(--y2)}
.chk-item.done .chk-label{color:var(--tx);text-decoration:none}
.chk-box{width:22px;height:22px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;transition:all .2s;margin-top:1px}
.chk-item.done .chk-box{background:var(--y);border-color:var(--y);color:#0d0d0d}
.chk-label{font-size:13px;font-weight:500;color:var(--mu);line-height:1.4;flex:1}
.chk-note{font-size:10px;color:var(--mu3);margin-top:3px}
.chk-item.done .chk-note{color:var(--mu2)}
/* Progress bar */
.prog-bar-wrap{background:var(--border);height:8px;margin-bottom:14px;border-radius:4px;overflow:hidden}
.prog-bar-fill{height:100%;background:var(--y);transition:width .3s ease;border-radius:4px}
.prog-pct{font-size:11px;font-weight:700;color:var(--y);margin-bottom:5px}
/* Template editor */
.step-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);margin-bottom:6px}
.step-drag{color:var(--mu3);font-size:16px;cursor:grab;flex-shrink:0}
.step-text{flex:1;font-size:12px;color:var(--tx)}
.step-del{background:transparent;border:none;color:var(--red);font-size:16px;cursor:pointer;font-weight:700;padding:0 4px;flex-shrink:0}
.step-add{display:flex;gap:8px;margin-top:8px}
.step-add-inp{flex:1;background:var(--bg2);border:1px solid var(--border);color:var(--tx);padding:9px 12px;font-family:inherit;font-size:12px;outline:none}
.step-add-inp:focus{border-color:var(--y)}
.btn-add{background:var(--y);color:#0d0d0d;border:none;padding:9px 14px;font-weight:900;font-size:13px;cursor:pointer;font-family:inherit;flex-shrink:0}
.tmpl-card{background:var(--bg2);border:1px solid var(--border);padding:12px 14px;margin-bottom:8px}
.tmpl-name{font-size:14px;font-weight:700;color:var(--tx);margin-bottom:3px}
.tmpl-meta{font-size:10px;color:var(--mu2)}
.tmpl-actions{display:flex;gap:7px;margin-top:10px}
.tbtn{background:transparent;border:1px solid var(--border);color:var(--mu);font-size:10px;font-weight:700;padding:6px 10px;cursor:pointer;font-family:inherit;letter-spacing:.08em;text-transform:uppercase}
.tbtn.y{border-color:var(--y);color:var(--y)}
.tbtn.g{border-color:var(--green);color:var(--green)}
.tbtn.r{border-color:var(--red);color:var(--red)}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* Exec history */
.exec-item{background:var(--bg2);border:1px solid var(--border);padding:11px 14px;margin-bottom:6px}
.exec-name{font-size:13px;font-weight:700;color:var(--tx)}.exec-meta{font-size:10px;color:var(--mu2);margin-top:3px}
.exec-pct{font-size:11px;font-weight:700;margin-top:5px}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div>
      <div class="hdr-row"><div class="logo-wm">PLAGA<b>W</b>AY</div><div class="logo-pill">Checklist</div></div>
      <div class="hdr-sub" id="cs"><span style="width:7px;height:7px;border-radius:50%;background:var(--mu3);display:inline-block;margin-right:4px"></span>Conectando...</div>
    </div>
    <div class="hdr-right">
      <button class="btn-sm" onclick="try{window.close()}catch(e){window.location.href='index.html'}">← App</button>
    </div>
  </div>
  <div class="cnt fade" id="cnt"></div>
</div>

<script type="module">
import{initializeApp,getApps}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getFirestore,doc,getDoc,setDoc,onSnapshot,collection,addDoc,updateDoc,deleteDoc,query,orderBy}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const CFG={apiKey:"AIzaSyCGz0t2xfeiMxYIcgVVQTp0bCHY6scIR_w",authDomain:"calculadora-plagaway.firebaseapp.com",projectId:"calculadora-plagaway",storageBucket:"calculadora-plagaway.firebasestorage.app",messagingSenderId:"257562908832",appId:"1:257562908832:web:14f673952eabba313c51c5"};
const fbApp=getApps().length===0?initializeApp(CFG):getApps()[0];
const fs=getFirestore(fbApp);
async function fSet(p,d){try{await setDoc(doc(fs,p),d,{merge:true});return true}catch{return false}}
async function fAdd(p,d){try{return await addDoc(collection(fs,p),{...d,ts:Date.now()})}catch{return null}}
async function fUpd(p,d){try{await updateDoc(doc(fs,p),d);return true}catch{return false}}
async function fDel(p){try{await deleteDoc(doc(fs,p));return true}catch{return false}}
window.FBCK={fSet,fAdd,fUpd,fDel};
onSnapshot(query(collection(fs,'checklists'),orderBy('ts','desc')),snap=>{window._tmpl=snap.docs.map(d=>({...d.data(),_id:d.id}));if(window._ckRender)window._ckRender()});
onSnapshot(query(collection(fs,'checklist_ejecuciones'),orderBy('ts','desc')),snap=>{window._execs=snap.docs.map(d=>({...d.data(),_id:d.id}));if(window._ckRender)window._ckRender()});
onSnapshot(doc(fs,'config/shared'),snap=>{if(snap.exists()){const d=snap.data();if(d.adminPin)window._apin=d.adminPin;if(d.techPin)window._tpin=d.techPin;}});
window._fbCKReady=true;
document.getElementById('cs').innerHTML='<span class="sync-dot" style="background:var(--green)"></span>Sincronizado';
setTimeout(()=>{if(!window._ckInited){checkAccess()}},800);
</script>

<script>
const db={get:k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}},set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))};

// Default templates seeded if Firebase empty
const DEF_TEMPLATES=[
  {nombre:'Servicio General de Fumigación',plagas:'Cucaracha, Grillo, Araña',pasos:['Inspección visual del área y perímetro','Identificar focos de infestación','Aplicar gel de cebo en cocina y baños','Aspersión de Cynoff 40 en zócalos y rendijas','Tratamiento de drenajes y coladeras','Aspersión exterior en fachada y jardín','Retiro de telarañas con cepillo de alcance','Verificar puntos de entrada y reportar al cliente','Tomar fotos de evidencia','Llenar certificado de servicio'],
   notas:['','','Enfocar bajo fregadero y alacenas','A 15cm de altura','Aplicar Demandan Duo diluido','Cubrir perímetro completo','Incluir cornisas y esquinas altas','Grietas, tuberías, marcos de puerta','Mínimo 3 fotos: antes, durante y después','Requiere firma del cliente']},
  {nombre:'Control de Alacrán (Correctivo)',plagas:'Alacrán, Escorpión',pasos:['Inspección nocturna con luz UV','Identificar y sellar grietas y hendiduras','Aplicar insecticida en barrera perimetral interna','Tratamiento de recámaras y áreas de dormir','Revisar y tratar garaje y bodega','Aspersión exterior y jardín','Colocar trampas pegajosas en puntos críticos','Asesorar al cliente sobre medidas preventivas','Inspección de patio, jardín y barda','Llenar certificado de servicio'],
   notas:['Buscar en rincones, muebles, bajo camas','Silicón o sellador apropiado','Fokus en rodapié y esquinas de piso','Especial atención bajo camas y colchones','Revisar cajas, herramientas y ropa almacenada','Barrera activa hasta 1m de altura','Cambiar mensualmente','Enfatizar no dejar ropa en el suelo','Revisar orificios en muros y jardineras','Requiere firma del cliente']},
  {nombre:'Nebulización Térmica (Eventos)',plagas:'Mosquitos, Moscas, Voladores',pasos:['Inspección del área y tipo de vegetación','Verificar dirección del viento','Preparar mezcla de Demand Duo a dosis evento','Nebulizar perímetro de área verde','Nebulizar jardines y áreas de estar','Tratamiento de drenajes y charcos','Esperar 30 minutos antes de ocupar el área','Verificar cobertura y re-aplicar si necesario','Tomar fotos de antes y después','Entregar hoja informativa al cliente'],
   notas:['Registrar m² del área','A favor del viento siempre','Ver dosificación calibrada en app','Cubrir toda la periferia','Movimientos de abanico continuo','Con pastilla de BTI si hay agua estancada','Área no apta durante aplicación','Especial atención en zonas de sombra','Para evidencia y control de calidad','Con recomendaciones post-servicio']},
];

function isAdmin(){return window._ckRole==='admin'}
function getTmpl(){return window._tmpl||[]}
function getExecs(){return window._execs||[]}

// PIN check
function checkAccess(){
  if(window._ckInited)return;
  window._ckInited=true;
  const saved=sessionStorage.getItem('pw_ck_role');
  if(saved){window._ckRole=saved;init();return}
  const ps=document.createElement('div');
  ps.style.cssText='position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:999;padding:20px';
  let buf='',selRole='tech';
  function draw(err=''){
    ps.innerHTML=`<div style="font-size:28px;font-weight:900;color:var(--tx)">PLAGA<span style="color:var(--y)">W</span>AY</div>
    <div style="font-size:11px;color:var(--mu2);text-transform:uppercase;letter-spacing:.1em">Módulo Checklist</div>
    <div style="display:flex;gap:10px;width:220px">
      <div style="flex:1;padding:10px;border:1px solid ${selRole==='tech'?'var(--y)':'var(--border)'};background:${selRole==='tech'?'var(--y4)':'var(--bg2)'};cursor:pointer;text-align:center;font-size:12px;font-weight:700;color:${selRole==='tech'?'var(--y)':'var(--mu)'}" onclick="this.parentElement._sr('tech')">👷 Técnico</div>
      <div style="flex:1;padding:10px;border:1px solid ${selRole==='admin'?'var(--y)':'var(--border)'};background:${selRole==='admin'?'var(--y4)':'var(--bg2)'};cursor:pointer;text-align:center;font-size:12px;font-weight:700;color:${selRole==='admin'?'var(--y)':'var(--mu)'}" onclick="this.parentElement._sr('admin')">🔑 Admin</div>
    </div>
    <div style="display:flex;gap:12px">${[0,1,2,3].map(i=>`<div style="width:13px;height:13px;border-radius:50%;border:2px solid var(--border);${buf.length>i?'background:var(--y);border-color:var(--y)':''}"></div>`).join('')}</div>
    <div style="color:var(--red);font-size:11px;font-weight:700;min-height:15px">${err}</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:220px">
      ${[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k=>`<button style="background:var(--bg2);border:1px solid var(--border);color:var(--tx);font-size:20px;font-weight:600;padding:16px;cursor:pointer;border-radius:50%;font-family:inherit;visibility:${k===''?'hidden':'visible'}" onclick="this.closest('[data-pin]')._pk('${k}')">${k}</button>`).join('')}
    </div>`;
    ps.setAttribute('data-pin','1');
    ps._sr=r=>{selRole=r;draw()};
    ps._pk=k=>{if(k==='⌫'){buf=buf.slice(0,-1);draw();return}if(buf.length>=4)return;buf+=k;draw();if(buf.length===4)setTimeout(()=>check(buf),120)};
  }
  function check(entered){
    const ap=window._apin||'1234',tp=window._tpin||'0000';
    if(selRole==='admin'&&entered===ap){unlock('admin')}
    else if(selRole==='tech'&&entered===tp){unlock('tech')}
    else{buf='';draw('PIN incorrecto')}
  }
  function unlock(role){window._ckRole=role;sessionStorage.setItem('pw_ck_role',role);ps.remove();init()}
  document.body.appendChild(ps);draw();
}

async function init(){
  // Seed default templates if Firebase returns empty after 1s
  setTimeout(async()=>{
    if(getTmpl().length===0&&isAdmin()&&window.FBCK){
      for(const t of DEF_TEMPLATES){await window.FBCK.fAdd('checklists',t)}
    }
  },1200);
  window._ckRender=()=>{if(window._currentCKView==='home')showHome()};
  showHome();
}

function showHome(){
  window._currentCKView='home';
  const tmpls=getTmpl();const execs=getExecs();
  const c=document.getElementById('cnt');c.className='cnt fade';void c.offsetWidth;
  const recent=execs.slice(0,3);
  c.innerHTML=`<div class="st"><span class="st-n">☑️</span><span class="st-h">Checklist de Servicio</span></div>
  ${isAdmin()?`<div class="ibar"><strong>Admin:</strong> Crea y edita plantillas de checklist. Los técnicos las ejecutan en cada servicio.</div>`
  :`<div class="ibar bl"><strong>Técnico:</strong> Selecciona una plantilla y completa el checklist durante el servicio.</div>`}
  <div class="blk">
    <span class="lbl">Ejecutar checklist</span>
    ${tmpls.length===0?`<div style="padding:20px;text-align:center;color:var(--mu3);background:var(--bg2);border:1px solid var(--border)"><div style="font-size:24px;margin-bottom:8px">☑️</div><div style="font-size:12px">${isAdmin()?'Crea una plantilla para empezar.':'El Admin aún no ha configurado plantillas.'}</div></div>`
    :tmpls.map(t=>`<button class="card" onclick="startExec('${t._id}')">
      <div class="ct">▶️ ${t.nombre}</div>
      <div class="cs">${t.pasos?.length||0} pasos · ${t.plagas||''}</div>
    </button>`).join('')}
  </div>
  ${isAdmin()?`<div class="blk">
    <span class="lbl">Plantillas configuradas (${tmpls.length})</span>
    ${tmpls.map(t=>`<div class="tmpl-card">
      <div class="tmpl-name">${t.nombre}</div>
      <div class="tmpl-meta">${t.pasos?.length||0} pasos · ${t.plagas||''}</div>
      <div class="tmpl-actions">
        <button class="tbtn y" onclick="editTmpl('${t._id}')">✏️ Editar</button>
        <button class="tbtn r" onclick="delTmpl('${t._id}')">✕ Eliminar</button>
      </div>
    </div>`).join('')}
    <button class="cta oy" style="margin-top:4px" onclick="newTmpl()">+ Nueva plantilla</button>
  </div>`:''}
  ${recent.length?`<div class="blk">
    <span class="lbl">Ejecuciones recientes</span>
    ${recent.map(ex=>{const total=ex.pasos?.length||0;const done=(ex.checked||[]).length;const pct=total?Math.round(done/total*100):0;return`<div class="exec-item">
      <div class="exec-name">${ex.tmplNombre||'Sin nombre'}</div>
      <div class="exec-meta">${new Date(ex.ts||0).toLocaleDateString('es-MX')} · ${ex.tecnico||''} · ${ex.cliente||''}</div>
      <div class="exec-pct" style="color:${pct===100?'var(--green)':'var(--y)'}">Completado: ${pct}% (${done}/${total})</div>
    </div>`}).join('')}
  </div>`:''}`;
}

function newTmpl(){
  window._editTmpl={nombre:'',plagas:'',pasos:[],notas:[]};
  showTmplEditor(null);
}
function editTmpl(id){
  const t=getTmpl().find(x=>x._id===id);if(!t)return;
  window._editTmpl={...t,pasos:[...(t.pasos||[])],notas:[...(t.notas||[])]};
  showTmplEditor(id);
}
async function delTmpl(id){
  if(!confirm('¿Eliminar esta plantilla?'))return;
  await window.FBCK.fDel('checklists/'+id);toast('Plantilla eliminada');showHome();
}

function showTmplEditor(id){
  window._currentCKView='editor';
  const t=window._editTmpl;
  const c=document.getElementById('cnt');c.className='cnt fade';void c.offsetWidth;
  c.innerHTML=`<button style="background:transparent;border:none;color:var(--mu2);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;font-family:inherit;margin-bottom:14px" onclick="showHome()">← Volver</button>
  <div class="st"><span class="st-n">⚙️</span><span class="st-h">${id?'Editar plantilla':'Nueva plantilla'}</span></div>
  <div class="blk">
    <input class="inp" id="tn" placeholder="Nombre de la plantilla *" value="${(t.nombre||'').replace(/"/g,'&quot;')}" style="margin-bottom:7px">
    <input class="inp" id="tp" placeholder="Plagas que cubre (ej. Cucaracha, Alacrán)" value="${t.plagas||''}">
  </div>
  <div class="blk">
    <span class="lbl">Pasos del checklist</span>
    <div id="step-list">
      ${(t.pasos||[]).map((paso,i)=>`<div class="step-item" data-idx="${i}">
        <span class="step-drag">⠿</span>
        <div style="flex:1">
          <div class="step-text">${paso}</div>
          <input class="inp" style="margin-top:5px;font-size:11px;color:var(--mu)" placeholder="Nota técnica (opcional)" value="${(t.notas||[])[i]||''}" oninput="window._editTmpl.notas[${i}]=this.value">
        </div>
        <button class="step-del" onclick="removeStep(${i})">✕</button>
      </div>`).join('')}
    </div>
    <div class="step-add">
      <input class="step-add-inp" id="new-step" placeholder="Agregar paso..." onkeydown="if(event.key==='Enter')addStep()">
      <button class="btn-add" onclick="addStep()">+</button>
    </div>
  </div>
  <button class="cta" onclick="saveTmpl('${id||''}')">💾 Guardar plantilla</button>
  <button class="cta sec" onclick="showHome()">Cancelar</button>`;
}

function addStep(){
  const inp=document.getElementById('new-step');const v=inp.value.trim();if(!v)return;
  window._editTmpl.pasos.push(v);if(!window._editTmpl.notas)window._editTmpl.notas=[];window._editTmpl.notas.push('');
  inp.value='';showTmplEditor(window._editTmpl._id||null);
}
function removeStep(i){window._editTmpl.pasos.splice(i,1);window._editTmpl.notas.splice(i,1);showTmplEditor(window._editTmpl._id||null)}
async function saveTmpl(id){
  const n=document.getElementById('tn').value.trim();if(!n){toast('El nombre es obligatorio');return}
  const plagas=document.getElementById('tp').value.trim();
  const data={nombre:n,plagas,pasos:window._editTmpl.pasos,notas:window._editTmpl.notas};
  let ok;
  if(id){ok=await window.FBCK.fUpd('checklists/'+id,data)}
  else{const ref=await window.FBCK.fAdd('checklists',data);ok=!!ref}
  if(ok){toast('Plantilla guardada ✓');showHome()}else toast('Error al guardar');
}

// EXECUTE checklist
let execState={tmplId:null,tmplNombre:'',pasos:[],notas:[],checked:[],tecnico:'',cliente:''};

function startExec(tmplId){
  const t=getTmpl().find(x=>x._id===tmplId);if(!t)return;
  execState={tmplId,tmplNombre:t.nombre,plagas:t.plagas||'',pasos:[...(t.pasos||[])],notas:[...(t.notas||[])],checked:[],tecnico:'',cliente:'',savedId:null};
  showExecSetup();
}

function showExecSetup(){
  window._currentCKView='exec-setup';
  const t=execState;
  const c=document.getElementById('cnt');c.className='cnt fade';void c.offsetWidth;
  c.innerHTML=`<button style="background:transparent;border:none;color:var(--mu2);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;font-family:inherit;margin-bottom:14px" onclick="showHome()">← Volver</button>
  <div class="st"><span class="st-n">▶️</span><span class="st-h">Iniciar servicio</span></div>
  <div class="ibar"><strong>${t.tmplNombre}</strong> · ${t.pasos.length} pasos · ${t.plagas}</div>
  <div class="blk">
    <input class="inp" id="exec-tec" placeholder="Tu nombre (técnico) *" value="${t.tecnico}" style="margin-bottom:7px">
    <input class="inp" id="exec-cli" placeholder="Cliente / dirección del servicio" value="${t.cliente}">
  </div>
  <button class="cta" onclick="startChecklist()">Iniciar checklist →</button>
  <button class="cta sec" onclick="showHome()">Cancelar</button>`;
}

function startChecklist(){
  const tec=document.getElementById('exec-tec').value.trim();
  if(!tec){toast('Ingresa tu nombre');return}
  execState.tecnico=tec;execState.cliente=document.getElementById('exec-cli').value.trim();
  showExec();
}

function showExec(){
  window._currentCKView='exec';
  const t=execState;const done=t.checked.length;const total=t.pasos.length;const pct=total?Math.round(done/total*100):0;
  const c=document.getElementById('cnt');c.className='cnt fade';void c.offsetWidth;
  c.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <div style="font-size:13px;font-weight:700;color:var(--tx)">${t.tmplNombre}</div>
    <div style="font-size:11px;color:var(--mu2)">${t.tecnico}${t.cliente?' · '+t.cliente:''}</div>
  </div>
  <div class="prog-pct">${pct}% completado (${done}/${total})</div>
  <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
  ${pct===100?`<div class="ibar gr"><strong>✓ Servicio completado.</strong> Puedes guardar el registro.</div>`:''}
  ${t.pasos.map((paso,i)=>{const checked=t.checked.includes(i);return`<div class="chk-item ${checked?'done':''}" onclick="toggleChk(${i})">
    <div class="chk-box">${checked?'✓':''}</div>
    <div>
      <div class="chk-label">${i+1}. ${paso}</div>
      ${t.notas[i]?`<div class="chk-note">💡 ${t.notas[i]}</div>`:''}
    </div>
  </div>`}).join('')}
  <div style="display:flex;gap:8px;margin-top:14px">
    <button class="cta og" style="margin-top:0" onclick="saveExec()">💾 Guardar registro</button>
    <button class="cta sec" style="margin-top:0" onclick="showHome()">Cancelar</button>
  </div>`;
}

function toggleChk(i){
  const idx=execState.checked.indexOf(i);
  if(idx>=0)execState.checked.splice(idx,1);else execState.checked.push(i);
  execState.checked.sort((a,b)=>a-b);
  showExec();
}

async function saveExec(){
  const total=execState.pasos.length;const done=execState.checked.length;const pct=total?Math.round(done/total*100):0;
  const data={...execState,pct,savedAt:Date.now()};delete data.savedId;
  const ref=await window.FBCK.fAdd('checklist_ejecuciones',data);
  if(ref){toast(`Registro guardado ✓ (${pct}% completado)`);showHome()}else toast('Error al guardar');
}

function toast(msg){const t=document.createElement('div');t.textContent=msg;t.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--y);color:#0d0d0d;padding:10px 20px;font-weight:900;font-size:12px;z-index:999;white-space:nowrap;border-radius:2px';document.body.appendChild(t);setTimeout(()=>t.remove(),2500)}

window.showHome=showHome;window.newTmpl=newTmpl;window.editTmpl=editTmpl;window.delTmpl=delTmpl;
window.showTmplEditor=showTmplEditor;window.addStep=addStep;window.removeStep=removeStep;window.saveTmpl=saveTmpl;
window.startExec=startExec;window.startChecklist=startChecklist;window.toggleChk=toggleChk;window.saveExec=saveExec;
</script>
</body>
