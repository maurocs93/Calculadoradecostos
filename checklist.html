<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Plagaway · Checklist</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0d0d;--bg2:#141414;--bg3:#1c1c1c;--border:#272727;--border2:#1e1e1e;--y:#f5c800;--y2:#c9a200;--y3:#7a6100;--y4:#1a1600;--tx:#f5f0e8;--tx2:#c8c0b0;--mu:#888880;--mu2:#555550;--mu3:#333330;--red:#ff4444;--blue:#4ac8f0;--green:#72c040;--orange:#ff8844}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Helvetica Neue',Arial,sans-serif;overscroll-behavior:none;font-size:15px}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.hdr{padding:13px 18px 10px;border-bottom:2px solid var(--y3);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--bg);z-index:20}
.logo-wm{font-size:22px;font-weight:900;color:var(--tx);letter-spacing:-1px;line-height:1}.logo-wm b{color:var(--y)}
.logo-pill{background:var(--y);color:#0d0d0d;font-size:7px;font-weight:900;letter-spacing:.15em;padding:3px 6px;text-transform:uppercase;align-self:flex-start;margin-top:2px}
.hdr-row{display:flex;align-items:center;gap:8px}
.hdr-sub{font-size:9px;color:var(--mu2);margin-top:4px}
.hdr-right{display:flex;gap:7px;align-items:center;margin-top:2px}
.btn-sm{background:transparent;border:1px solid var(--border);color:var(--mu);padding:7px 11px;font-size:9px;font-weight:700;letter-spacing:.1em;cursor:pointer;text-transform:uppercase;font-family:inherit}
.cnt{padding:18px 18px 40px;flex:1}
.fade{animation:fu .22s ease both}
@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.st{margin-bottom:16px;display:flex;align-items:baseline;gap:10px}
.st-n{font-size:10px;font-weight:900;color:#0d0d0d;background:var(--y);padding:3px 7px;letter-spacing:.1em;flex-shrink:0}
.st-h{font-size:18px;font-weight:700;color:var(--tx)}
.lbl{font-size:10px;font-weight:700;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;display:block}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.inp{background:var(--bg2);border:1px solid var(--border);color:var(--tx);padding:10px 12px;font-family:inherit;font-size:13px;outline:none;width:100%}
.inp:focus{border-color:var(--y)}
.blk{margin-bottom:18px}
.cta{width:100%;background:var(--y);color:#0d0d0d;border:none;padding:15px;font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-family:inherit;font-weight:900;cursor:pointer;margin-top:10px;transition:opacity .15s}
.cta:active{opacity:.85}
.cta.sec{background:transparent;border:1px solid var(--border);color:var(--mu);font-weight:700}
.cta.oy{background:transparent;border:2px solid var(--y);color:var(--y);font-weight:900}
.cta.og{background:transparent;border:2px solid var(--green);color:var(--green);font-weight:900}
.cta.ob{background:transparent;border:2px solid var(--blue);color:var(--blue);font-weight:900}
.card{background:var(--bg2);border:1px solid var(--border);padding:13px 14px;margin-bottom:7px;cursor:pointer;transition:all .12s;text-align:left;width:100%;font-family:inherit}
.card:active{transform:scale(.98)}.card.on{background:var(--y4);border-color:var(--y)}
.ct{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:3px}.cs{font-size:10px;color:var(--mu2)}
.ibar{padding:10px 13px;background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--y);font-size:11px;color:var(--mu);margin-bottom:12px;line-height:1.5}
.ibar strong{color:var(--y)}.ibar.gr{border-left-color:var(--green)}.ibar.gr strong{color:var(--green)}
.ibar.bl{border-left-color:var(--blue)}.ibar.bl strong{color:var(--blue)}
.chk-item{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;background:var(--bg2);border:1px solid var(--border);margin-bottom:7px;cursor:pointer;transition:all .15s}
.chk-item.done{background:var(--y4);border-color:var(--y2)}
.chk-box{width:22px;height:22px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;transition:all .2s;margin-top:1px}
.chk-item.done .chk-box{background:var(--y);border-color:var(--y);color:#0d0d0d}
.chk-label{font-size:13px;font-weight:500;color:var(--mu);line-height:1.4;flex:1}
.chk-item.done .chk-label{color:var(--tx)}
.chk-note{font-size:10px;color:var(--mu3);margin-top:3px}
.chk-item.done .chk-note{color:var(--mu2)}
.prog-bar-wrap{background:var(--border);height:8px;margin-bottom:14px;border-radius:4px;overflow:hidden}
.prog-bar-fill{height:100%;background:var(--y);transition:width .3s ease;border-radius:4px}
.prog-pct{font-size:11px;font-weight:700;color:var(--y);margin-bottom:5px}
.step-item{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);margin-bottom:6px}
.step-num{font-size:10px;font-weight:900;color:var(--mu3);min-width:20px;margin-top:2px}
.step-body{flex:1}
.step-text{font-size:12px;color:var(--tx);margin-bottom:4px}
.step-note-inp{background:var(--bg);border:1px solid var(--border2);color:var(--mu);padding:5px 8px;font-family:inherit;font-size:11px;outline:none;width:100%}
.step-note-inp:focus{border-color:var(--y2)}
.step-del{background:transparent;border:none;color:var(--red);font-size:18px;cursor:pointer;font-weight:700;padding:0 4px;flex-shrink:0;margin-top:1px}
.step-add{display:flex;gap:8px;margin-top:8px}
.step-add-inp{flex:1;background:var(--bg2);border:1px solid var(--border);color:var(--tx);padding:9px 12px;font-family:inherit;font-size:12px;outline:none}
.step-add-inp:focus{border-color:var(--y)}
.btn-add{background:var(--y);color:#0d0d0d;border:none;padding:9px 14px;font-weight:900;font-size:16px;cursor:pointer;font-family:inherit;flex-shrink:0}
.tmpl-card{background:var(--bg2);border:1px solid var(--border);padding:12px 14px;margin-bottom:8px}
.tmpl-name{font-size:14px;font-weight:700;color:var(--tx);margin-bottom:3px}
.tmpl-meta{font-size:10px;color:var(--mu2)}
.tmpl-actions{display:flex;gap:7px;margin-top:10px}
.tbtn{background:transparent;border:1px solid var(--border);color:var(--mu);font-size:10px;font-weight:700;padding:7px 12px;cursor:pointer;font-family:inherit;letter-spacing:.08em;text-transform:uppercase}
.tbtn.y{border-color:var(--y);color:var(--y)}
.tbtn.r{border-color:var(--red);color:var(--red)}
.exec-item{background:var(--bg2);border:1px solid var(--border);padding:11px 14px;margin-bottom:6px}
.exec-name{font-size:13px;font-weight:700;color:var(--tx)}.exec-meta{font-size:10px;color:var(--mu2);margin-top:3px}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* PIN */
.pin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);padding:40px 20px;gap:20px}
.pin-logo{font-size:30px;font-weight:900;color:var(--tx);letter-spacing:-1px}.pin-logo b{color:var(--y)}
.pin-role{display:flex;gap:10px;width:240px}
.pin-role-btn{flex:1;padding:10px;border:1px solid var(--border);background:var(--bg2);color:var(--mu);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s}
.pin-role-btn.sel{border-color:var(--y);background:var(--y4);color:var(--y)}
.pin-dots{display:flex;gap:14px}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--border);transition:all .15s}
.pin-dot.filled{background:var(--y);border-color:var(--y)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px}
.pin-key{background:var(--bg2);border:1px solid var(--border);color:var(--tx);font-size:20px;font-weight:600;padding:17px;cursor:pointer;font-family:inherit;transition:all .12s;border-radius:50%}
.pin-key:active{background:var(--y);color:#0d0d0d;transform:scale(.93)}
.pin-err{color:var(--red);font-size:11px;font-weight:700;min-height:16px;text-transform:uppercase;text-align:center}
.role-badge{display:inline-block;font-size:8px;font-weight:900;padding:2px 6px;letter-spacing:.1em;text-transform:uppercase;margin-left:6px}
.role-admin{background:#1a0000;color:var(--red);border:1px solid #440000}
.role-tech{background:#001a0a;color:var(--green);border:1px solid #004422}
</style>
</head>
<body>
<div id="pin-screen"></div>
<div id="app" style="display:none;flex-direction:column">
  <div class="hdr">
    <div>
      <div class="hdr-row"><div class="logo-wm">PLAGA<b>W</b>AY</div><div class="logo-pill">Checklist</div></div>
      <div class="hdr-sub" id="cs"><span style="width:7px;height:7px;border-radius:50%;background:var(--mu3);display:inline-block;margin-right:4px"></span>Conectando...</div>
    </div>
    <div class="hdr-right">
      <span id="role-badge-hdr"></span>
      <button class="btn-sm" onclick="showPin()">🔒</button>
      <button class="btn-sm" onclick="try{window.close()}catch(e){window.location.href='index.html'}">← App</button>
    </div>
  </div>
  <div class="cnt fade" id="cnt"></div>
</div>

<!-- Firebase -->
<script type="module">
import{initializeApp,getApps}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getFirestore,doc,onSnapshot,collection,addDoc,updateDoc,deleteDoc,query,orderBy}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const CFG={apiKey:"AIzaSyCGz0t2xfeiMxYIcgVVQTp0bCHY6scIR_w",authDomain:"calculadora-plagaway.firebaseapp.com",projectId:"calculadora-plagaway",storageBucket:"calculadora-plagaway.firebasestorage.app",messagingSenderId:"257562908832",appId:"1:257562908832:web:14f673952eabba313c51c5"};
const fbApp=getApps().length===0?initializeApp(CFG):getApps()[0];
const fs=getFirestore(fbApp);
async function fAdd(col,d){try{return await addDoc(collection(fs,col),{...d,ts:Date.now()})}catch(e){console.error(e);return null}}
async function fUpd(path,d){try{const[col,...rest]=path.split('/');await updateDoc(doc(fs,path),d);return true}catch(e){console.error(e);return false}}
async function fDel(path){try{await deleteDoc(doc(fs,path));return true}catch(e){console.error(e);return false}}
window.FBCK={fAdd,fUpd,fDel};
onSnapshot(query(collection(fs,'checklists'),orderBy('ts','desc')),snap=>{
  window._tmpl=snap.docs.map(d=>({...d.data(),_id:d.id}));
  window._fbTmplReady=true;
  if(window._pendingInit){window._pendingInit=false;doInit()}
  else if(window._ckView==='home')showHome();
});
onSnapshot(query(collection(fs,'checklist_ejecuciones'),orderBy('ts','desc')),snap=>{
  window._execs=snap.docs.map(d=>({...d.data(),_id:d.id}));
  if(window._ckView==='home')showHome();
});
onSnapshot(doc(fs,'config/shared'),snap=>{
  if(snap.exists()){const d=snap.data();
    if(d.adminPin)window._apin=d.adminPin;
    if(d.techPin)window._tpin=d.techPin;
  }
  window._fbCfgReady=true;
  document.getElementById('cs').innerHTML='<span class="sync-dot" style="background:var(--green)"></span>Sincronizado';
  // Try to restore session after Firebase is ready
  if(!window._pinDone)tryRestoreSession();
});
</script>

<script>
// ── ROLE / SESSION ─────────────────────────────────────────────────────────
// FIX: use localStorage, not sessionStorage — works cross-tab and on iOS
const ROLE_KEY='pw_ck_role_v8';

function getRole(){return window._ckRole||null}
function isAdmin(){return window._ckRole==='admin'}

function tryRestoreSession(){
  const saved=localStorage.getItem(ROLE_KEY);
  if(saved==='admin'||saved==='tech'){
    window._ckRole=saved;
    window._pinDone=true;
    showApp();
  }else{
    showPin();
  }
}

// Wait for Firebase config before showing PIN (so PIN validation works)
// If Firebase takes too long, show PIN anyway (fallback PINs 1234/0000)
setTimeout(()=>{if(!window._pinDone)tryRestoreSession()},1500);

function showPin(forceNew=false){
  if(!forceNew){
    const saved=localStorage.getItem(ROLE_KEY);
    if(saved==='admin'||saved==='tech'){window._ckRole=saved;window._pinDone=true;showApp();return}
  }
  const ps=document.getElementById('pin-screen');
  document.getElementById('app').style.display='none';
  ps.style.cssText='display:flex;flex-direction:column;min-height:100vh';
  let buf='',selRole='tech';
  function draw(err=''){
    ps.innerHTML=`<div class="pin-wrap">
      <div class="pin-logo">PLAGA<b>W</b>AY</div>
      <div style="font-size:11px;color:var(--mu2);letter-spacing:.1em;text-transform:uppercase">Checklist de Servicio</div>
      <div class="pin-role">
        <button class="pin-role-btn ${selRole==='tech'?'sel':''}" id="pr-tech">👷 Técnico</button>
        <button class="pin-role-btn ${selRole==='admin'?'sel':''}" id="pr-admin">🔑 Admin</button>
      </div>
      <div class="pin-dots">${[0,1,2,3].map(i=>`<div class="pin-dot ${buf.length>i?'filled':''}"></div>`).join('')}</div>
      <div class="pin-err">${err}</div>
      <div class="pin-pad">${[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k=>`<button class="pin-key" data-k="${k}" style="${k===''?'visibility:hidden':''}">${k}</button>`).join('')}</div>
    </div>`;
    // Attach events after render
    ps.querySelector('#pr-tech').onclick=()=>{selRole='tech';draw()};
    ps.querySelector('#pr-admin').onclick=()=>{selRole='admin';draw()};
    ps.querySelectorAll('.pin-key').forEach(btn=>{
      btn.onclick=()=>{
        const k=btn.dataset.k;
        if(k==='⌫'){buf=buf.slice(0,-1);draw();return}
        if(buf.length>=4)return;
        buf+=k;draw();
        if(buf.length===4)setTimeout(()=>checkPin(buf,selRole),120);
      };
    });
  }
  draw();
}

function checkPin(entered,role){
  const ap=window._apin||'1234',tp=window._tpin||'0000';
  if(role==='admin'&&entered===ap){unlock('admin')}
  else if(role==='tech'&&entered===tp){unlock('tech')}
  else{
    // Re-render with error
    const ps=document.getElementById('pin-screen');
    const dots=ps.querySelectorAll('.pin-dot');dots.forEach(d=>d.classList.remove('filled'));
    const err=ps.querySelector('.pin-err');if(err)err.textContent='PIN INCORRECTO';
    setTimeout(()=>showPin(true),600);
  }
}

function unlock(role){
  window._ckRole=role;window._pinDone=true;
  localStorage.setItem(ROLE_KEY,role);
  document.getElementById('pin-screen').style.display='none';
  showApp();
}

function showApp(){
  const app=document.getElementById('app');
  app.style.display='flex';app.style.flexDirection='column';
  // Show role badge
  const badge=document.getElementById('role-badge-hdr');
  if(badge)badge.innerHTML=isAdmin()?'<span class="role-badge role-admin">Admin</span>':'<span class="role-badge role-tech">Técnico</span>';
  // Init view
  if(window._fbTmplReady){doInit()}
  else{window._pendingInit=true;document.getElementById('cnt').innerHTML='<div style="padding:40px;text-align:center;color:var(--mu2)">Cargando plantillas...</div>'}
}

function doInit(){
  // Seed defaults if admin and no templates yet
  if(isAdmin()&&getTmpl().length===0&&window.FBCK){
    DEF_TEMPLATES.forEach(t=>window.FBCK.fAdd('checklists',t));
  }
  showHome();
}

// ── DATA ───────────────────────────────────────────────────────────────────
const DEF_TEMPLATES=[
  {nombre:'Servicio General de Fumigación',plagas:'Cucaracha, Grillo, Araña',
   pasos:['Inspección visual del área y perímetro','Identificar focos de infestación','Aplicar gel de cebo en cocina y baños','Aspersión de Cynoff 40 en zócalos y rendijas','Tratamiento de drenajes y coladeras','Aspersión exterior en fachada y jardín','Retiro de telarañas con cepillo de alcance','Verificar puntos de entrada y reportar al cliente','Tomar fotos de evidencia','Llenar certificado de servicio'],
   notas:['','','Enfocar bajo fregadero y alacenas','A 15cm de altura, rodapié','Aplicar Demand Duo diluido','Cubrir perímetro completo','Incluir cornisas y esquinas altas','Grietas, tuberías, marcos de puerta','Mínimo 3 fotos: antes y después','Requiere firma del cliente']},
  {nombre:'Control de Alacrán (Correctivo)',plagas:'Alacrán, Escorpión',
   pasos:['Inspección nocturna con luz UV','Identificar y sellar grietas y hendiduras','Aplicar insecticida en barrera perimetral interna','Tratamiento de recámaras y áreas de dormir','Revisar y tratar garaje y bodega','Aspersión exterior y jardín','Colocar trampas pegajosas en puntos críticos','Asesorar al cliente sobre medidas preventivas','Llenar certificado de servicio'],
   notas:['Buscar en rincones, muebles, bajo camas','Silicón o sellador apropiado','Fokus en rodapié y esquinas de piso','Especial atención bajo camas y colchones','Revisar cajas y ropa almacenada','Barrera activa hasta 1m de altura','Cambiar mensualmente','No dejar ropa en el suelo','Requiere firma del cliente']},
  {nombre:'Nebulización Térmica (Eventos)',plagas:'Mosquitos, Moscas, Voladores',
   pasos:['Inspección del área y tipo de vegetación','Verificar dirección del viento','Preparar mezcla de Demand Duo a dosis evento','Nebulizar perímetro de área verde','Nebulizar jardines y áreas de estar','Tratamiento de drenajes y charcos','Esperar 30 minutos antes de ocupar el área','Verificar cobertura y re-aplicar si necesario','Tomar fotos de antes y después','Entregar hoja informativa al cliente'],
   notas:['Registrar m² del área','A favor del viento siempre','Ver dosificación calibrada en app','Cubrir toda la periferia','Movimientos de abanico continuo','BTI si hay agua estancada','Área no apta durante aplicación','Atención en zonas de sombra','Para evidencia','Con recomendaciones post-servicio']},
];

function getTmpl(){return window._tmpl||[]}
function getExecs(){return window._execs||[]}

// ── VIEWS ──────────────────────────────────────────────────────────────────
let editState=null; // {id|null, nombre, plagas, pasos[], notas[]}
let execState=null; // {tmplId, pasos[], notas[], checked[], tecnico, cliente}

function cnt(){return document.getElementById('cnt')}
function setCnt(html){const c=cnt();c.className='cnt fade';void c.offsetWidth;c.innerHTML=html}

function showHome(){
  window._ckView='home';
  const tmpls=getTmpl(),execs=getExecs().slice(0,4);
  setCnt(`
  <div class="st"><span class="st-n">☑️</span><span class="st-h">Checklist de Servicio</span></div>
  ${isAdmin()
    ?'<div class="ibar"><strong>Admin:</strong> Crea y edita plantillas. Los técnicos las ejecutan en cada servicio.</div>'
    :'<div class="ibar bl"><strong>Técnico:</strong> Selecciona una plantilla y ejecútala durante el servicio.</div>'}
  <div class="blk">
    <span class="lbl">Ejecutar checklist</span>
    <div id="tmpl-exec-list"></div>
  </div>
  ${isAdmin()?`<div class="blk">
    <span class="lbl">Plantillas configuradas (${tmpls.length})</span>
    <div id="tmpl-admin-list"></div>
    <button class="cta oy" id="btn-new-tmpl" style="margin-top:4px">+ Nueva plantilla</button>
  </div>`:''}
  ${execs.length?`<div class="blk">
    <span class="lbl">Ejecuciones recientes</span>
    <div id="exec-list"></div>
  </div>`:''}
  `);

  // Exec list
  const execList=document.getElementById('tmpl-exec-list');
  if(tmpls.length===0){
    execList.innerHTML=`<div style="padding:20px;text-align:center;color:var(--mu3);background:var(--bg2);border:1px solid var(--border)"><div style="font-size:24px;margin-bottom:8px">☑️</div><div style="font-size:12px">${isAdmin()?'Crea tu primera plantilla abajo.':'El Admin aún no configuró plantillas.'}</div></div>`;
  }else{
    tmpls.forEach(t=>{
      const btn=document.createElement('button');btn.className='card';
      btn.innerHTML=`<div class="ct">▶️ ${t.nombre}</div><div class="cs">${t.pasos?.length||0} pasos · ${t.plagas||''}</div>`;
      btn.onclick=()=>startExecSetup(t._id);
      execList.appendChild(btn);
    });
  }

  // Admin template list
  if(isAdmin()){
    const adminList=document.getElementById('tmpl-admin-list');
    tmpls.forEach(t=>{
      const card=document.createElement('div');card.className='tmpl-card';
      card.innerHTML=`<div class="tmpl-name">${t.nombre}</div><div class="tmpl-meta">${t.pasos?.length||0} pasos · ${t.plagas||''}</div>
        <div class="tmpl-actions">
          <button class="tbtn y" data-id="${t._id}">✏️ Editar</button>
          <button class="tbtn r" data-id="${t._id}">✕ Eliminar</button>
        </div>`;
      card.querySelectorAll('.tbtn.y').forEach(b=>b.onclick=()=>startEditTmpl(t._id));
      card.querySelectorAll('.tbtn.r').forEach(b=>b.onclick=()=>delTmpl(t._id));
      adminList.appendChild(card);
    });
    document.getElementById('btn-new-tmpl').onclick=startNewTmpl;
  }

  // Recent execs
  const execListEl=document.getElementById('exec-list');
  if(execListEl){
    execs.forEach(ex=>{
      const total=ex.pasos?.length||0,done=(ex.checked||[]).length;
      const pct=total?Math.round(done/total*100):0;
      const el=document.createElement('div');el.className='exec-item';
      el.innerHTML=`<div class="exec-name">${ex.tmplNombre||'Sin nombre'}</div>
        <div class="exec-meta">${new Date(ex.ts||0).toLocaleDateString('es-MX')} · ${ex.tecnico||''} · ${ex.cliente||''}</div>
        <div style="font-size:11px;font-weight:700;color:${pct===100?'var(--green)':'var(--y)'};margin-top:4px">${pct}% completado (${done}/${total})</div>`;
      execListEl.appendChild(el);
    });
  }
}

// ── TEMPLATE EDITOR ────────────────────────────────────────────────────────
function startNewTmpl(){
  editState={id:null,nombre:'',plagas:'',pasos:[],notas:[]};
  showEditor();
}
function startEditTmpl(id){
  const t=getTmpl().find(x=>x._id===id);if(!t)return;
  editState={id,nombre:t.nombre,plagas:t.plagas||'',pasos:[...(t.pasos||[])],notas:[...(t.notas||[])]};
  showEditor();
}
async function delTmpl(id){
  if(!confirm('¿Eliminar esta plantilla? Esta acción no se puede deshacer.'))return;
  await window.FBCK.fDel('checklists/'+id);
  toast('Plantilla eliminada');
  // showHome called by Firebase listener
}

function showEditor(){
  window._ckView='editor';
  const es=editState;
  setCnt(`
  <button class="btn-sm" id="btn-back-editor" style="margin-bottom:14px">← Volver</button>
  <div class="st"><span class="st-n">⚙️</span><span class="st-h">${es.id?'Editar plantilla':'Nueva plantilla'}</span></div>
  <div class="blk">
    <span class="lbl">Nombre de la plantilla</span>
    <input class="inp" id="ed-nombre" placeholder="Ej. Servicio general de fumigación *" value="${es.nombre.replace(/"/g,'&quot;')}" style="margin-bottom:7px">
    <span class="lbl" style="margin-top:10px">Plagas que cubre</span>
    <input class="inp" id="ed-plagas" placeholder="Ej. Cucaracha, Alacrán, Mosca" value="${es.plagas.replace(/"/g,'&quot;')}">
  </div>
  <div class="blk">
    <span class="lbl">Pasos del checklist (${es.pasos.length})</span>
    <div id="steps-list"></div>
    <div class="step-add">
      <input class="step-add-inp" id="new-step-inp" placeholder="Escribe el paso y presiona +">
      <button class="btn-add" id="btn-add-step">+</button>
    </div>
  </div>
  <button class="cta" id="btn-save-tmpl">💾 ${es.id?'Actualizar plantilla':'Guardar plantilla'}</button>
  <button class="cta sec" id="btn-cancel-editor">Cancelar</button>
  `);

  renderStepsList();

  // Attach events — NO inline onclick, use getElementById
  document.getElementById('btn-back-editor').onclick=showHome;
  document.getElementById('btn-cancel-editor').onclick=showHome;
  document.getElementById('btn-save-tmpl').onclick=saveTmpl;
  document.getElementById('btn-add-step').onclick=addStep;
  document.getElementById('new-step-inp').onkeydown=e=>{if(e.key==='Enter')addStep()};
  document.getElementById('ed-nombre').oninput=e=>{editState.nombre=e.target.value};
  document.getElementById('ed-plagas').oninput=e=>{editState.plagas=e.target.value};
}

function renderStepsList(){
  const list=document.getElementById('steps-list');if(!list)return;
  list.innerHTML='';
  editState.pasos.forEach((paso,i)=>{
    const div=document.createElement('div');div.className='step-item';
    div.innerHTML=`<span class="step-num">${i+1}.</span>
      <div class="step-body">
        <div class="step-text">${paso}</div>
        <input class="step-note-inp" placeholder="Nota técnica (opcional)" value="${(editState.notas[i]||'').replace(/"/g,'&quot;')}">
      </div>
      <button class="step-del" title="Eliminar paso">✕</button>`;
    div.querySelector('.step-note-inp').oninput=e=>{editState.notas[i]=e.target.value};
    div.querySelector('.step-del').onclick=()=>{editState.pasos.splice(i,1);editState.notas.splice(i,1);renderStepsList()};
    list.appendChild(div);
  });
}

function addStep(){
  const inp=document.getElementById('new-step-inp');if(!inp)return;
  const v=inp.value.trim();if(!v){inp.focus();return}
  editState.pasos.push(v);
  if(!editState.notas)editState.notas=[];editState.notas.push('');
  inp.value='';renderStepsList();inp.focus();
}

async function saveTmpl(){
  const nombre=(document.getElementById('ed-nombre')?.value||editState.nombre).trim();
  if(!nombre){toast('El nombre es obligatorio');document.getElementById('ed-nombre')?.focus();return}
  editState.nombre=nombre;
  editState.plagas=(document.getElementById('ed-plagas')?.value||editState.plagas).trim();
  const data={nombre:editState.nombre,plagas:editState.plagas,pasos:editState.pasos,notas:editState.notas};
  let ok=false;
  if(editState.id){
    ok=await window.FBCK.fUpd('checklists/'+editState.id,data);
  }else{
    const ref=await window.FBCK.fAdd('checklists',data);ok=!!ref;
  }
  if(ok){toast('Plantilla guardada ✓');showHome()}
  else toast('Error al guardar — revisa conexión');
}

// ── EXECUTE CHECKLIST ──────────────────────────────────────────────────────
function startExecSetup(tmplId){
  const t=getTmpl().find(x=>x._id===tmplId);if(!t)return;
  execState={tmplId,tmplNombre:t.nombre,plagas:t.plagas||'',pasos:[...(t.pasos||[])],notas:[...(t.notas||[])],checked:[],tecnico:'',cliente:''};
  showExecSetup();
}

function showExecSetup(){
  window._ckView='exec-setup';
  const t=execState;
  setCnt(`
  <button class="btn-sm" id="btn-back-setup" style="margin-bottom:14px">← Volver</button>
  <div class="st"><span class="st-n">▶️</span><span class="st-h">Iniciar servicio</span></div>
  <div class="ibar"><strong>${t.tmplNombre}</strong> · ${t.pasos.length} pasos · ${t.plagas}</div>
  <div class="blk">
    <span class="lbl">Datos del servicio</span>
    <input class="inp" id="exec-tec" placeholder="Tu nombre (técnico aplicador) *" value="${t.tecnico}" style="margin-bottom:7px">
    <input class="inp" id="exec-cli" placeholder="Cliente o dirección del servicio" value="${t.cliente}">
  </div>
  <button class="cta" id="btn-start-exec">Iniciar checklist →</button>
  <button class="cta sec" id="btn-cancel-setup">Cancelar</button>
  `);
  document.getElementById('btn-back-setup').onclick=showHome;
  document.getElementById('btn-cancel-setup').onclick=showHome;
  document.getElementById('btn-start-exec').onclick=()=>{
    const tec=document.getElementById('exec-tec').value.trim();
    if(!tec){toast('Ingresa tu nombre');document.getElementById('exec-tec').focus();return}
    execState.tecnico=tec;execState.cliente=document.getElementById('exec-cli').value.trim();
    showExec();
  };
}

function showExec(){
  window._ckView='exec';
  const t=execState;const done=t.checked.length;const total=t.pasos.length;
  const pct=total?Math.round(done/total*100):0;
  setCnt(`
  <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
    <div style="font-size:13px;font-weight:700;color:var(--tx)">${t.tmplNombre}</div>
    <div style="font-size:10px;color:var(--mu2)">${t.tecnico}</div>
  </div>
  ${t.cliente?`<div style="font-size:10px;color:var(--mu3);margin-bottom:8px">📍 ${t.cliente}</div>`:''}
  <div class="prog-pct">${pct}% completado · ${done} de ${total} pasos</div>
  <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
  ${pct===100?'<div class="ibar gr"><strong>✓ Servicio completado.</strong> Guarda el registro abajo.</div>':''}
  <div id="chk-list"></div>
  <div style="display:flex;gap:8px;margin-top:14px">
    <button class="cta og" id="btn-save-exec" style="margin-top:0">💾 Guardar registro</button>
    <button class="cta sec" id="btn-cancel-exec" style="margin-top:0">Cancelar</button>
  </div>
  `);

  // Render checklist items
  const list=document.getElementById('chk-list');
  t.pasos.forEach((paso,i)=>{
    const checked=t.checked.includes(i);
    const div=document.createElement('div');
    div.className='chk-item'+(checked?' done':'');
    div.innerHTML=`<div class="chk-box">${checked?'✓':''}</div>
      <div>
        <div class="chk-label">${i+1}. ${paso}</div>
        ${t.notas[i]?`<div class="chk-note">💡 ${t.notas[i]}</div>`:''}
      </div>`;
    div.onclick=()=>{
      const idx=execState.checked.indexOf(i);
      if(idx>=0)execState.checked.splice(idx,1);else execState.checked.push(i);
      execState.checked.sort((a,b)=>a-b);
      showExec();
    };
    list.appendChild(div);
  });

  document.getElementById('btn-save-exec').onclick=saveExec;
  document.getElementById('btn-cancel-exec').onclick=showHome;
}

async function saveExec(){
  const total=execState.pasos.length,done=execState.checked.length;
  const pct=total?Math.round(done/total*100):0;
  const ref=await window.FBCK.fAdd('checklist_ejecuciones',{...execState,pct,savedAt:Date.now()});
  if(ref){toast(`Registro guardado ✓ (${pct}% completado)`);showHome()}
  else toast('Error al guardar — revisa conexión');
}

function toast(msg){
  const t=document.createElement('div');t.textContent=msg;
  t.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--y);color:#0d0d0d;padding:10px 20px;font-weight:900;font-size:12px;z-index:999;white-space:nowrap;border-radius:2px';
  document.body.appendChild(t);setTimeout(()=>t.remove(),2500);
}

// ── INIT ───────────────────────────────────────────────────────────────────
// PIN shown immediately, Firebase loads in parallel
tryRestoreSession();
</script>
