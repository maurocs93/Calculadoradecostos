<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Plagaway · Documentos</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0d0d;--bg2:#141414;--bg3:#1c1c1c;--border:#272727;--border2:#1e1e1e;--y:#f5c800;--y2:#c9a200;--y3:#7a6100;--y4:#1a1600;--tx:#f5f0e8;--tx2:#c8c0b0;--mu:#888880;--mu2:#555550;--mu3:#333330;--red:#ff4444;--blue:#4ac8f0;--green:#72c040;--orange:#ff8844}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Helvetica Neue',Arial,sans-serif;overscroll-behavior:none;font-size:15px}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.hdr{padding:13px 18px 10px;border-bottom:2px solid var(--y3);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--bg);z-index:20}
.logo-wm{font-size:22px;font-weight:900;color:var(--tx);letter-spacing:-1px;line-height:1}.logo-wm b{color:var(--y)}
.logo-pill{background:var(--y);color:#0d0d0d;font-size:7px;font-weight:900;letter-spacing:.15em;padding:3px 6px;text-transform:uppercase;align-self:flex-start;margin-top:2px}
.hdr-row{display:flex;align-items:center;gap:8px}
.hdr-sub{font-size:9px;color:var(--mu2);margin-top:4px}
.hdr-right{display:flex;gap:7px;align-items:center;margin-top:2px}
.btn-sm{background:transparent;border:1px solid var(--border);color:var(--mu);padding:7px 11px;font-size:9px;font-weight:700;letter-spacing:.1em;cursor:pointer;text-transform:uppercase;font-family:inherit}
.cnt{padding:18px 18px 40px;flex:1}
.fade{animation:fu .22s ease both}
@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.st{margin-bottom:16px;display:flex;align-items:baseline;gap:10px}
.st-n{font-size:10px;font-weight:900;color:#0d0d0d;background:var(--y);padding:3px 7px;letter-spacing:.1em;flex-shrink:0}
.st-h{font-size:18px;font-weight:700;color:var(--tx)}
.lbl{font-size:10px;font-weight:700;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;display:block}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px}.g1{display:grid;gap:7px}
.card{background:var(--bg2);border:1px solid var(--border);color:var(--tx2);padding:14px 16px;cursor:pointer;font-family:inherit;transition:all .12s;text-align:left;width:100%;-webkit-appearance:none}
.card:active{transform:scale(.97)}.card.on{background:var(--y4);border-color:var(--y);color:var(--tx)}
.ct{font-size:14px;font-weight:600;margin-bottom:3px}.cs{font-size:10px;color:var(--mu2)}
.inp{background:var(--bg2);border:1px solid var(--border);color:var(--tx);padding:10px 12px;font-family:inherit;font-size:13px;outline:none;width:100%}
.inp:focus{border-color:var(--y)}
.inp-sm{background:var(--bg2);border:1px solid var(--border);color:var(--tx);padding:8px 10px;font-family:inherit;font-size:12px;outline:none;width:100%}
.inp-sm:focus{border-color:var(--y)}
.blk{margin-bottom:18px}
.cta{width:100%;background:var(--y);color:#0d0d0d;border:none;padding:15px;font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-family:inherit;font-weight:900;cursor:pointer;margin-top:10px;transition:opacity .15s}
.cta:active{opacity:.85}
.cta.sec{background:transparent;border:1px solid var(--border);color:var(--mu);font-weight:700}
.cta.oy{background:transparent;border:2px solid var(--y);color:var(--y);font-weight:900}
.cta.og{background:transparent;border:2px solid var(--green);color:var(--green);font-weight:900}
.trow{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:all .2s;margin-bottom:6px}
.trow.on{border-color:var(--y);background:var(--y4)}
.tlbl{font-size:13px;font-weight:500;color:var(--mu);transition:color .2s}.trow.on .tlbl{color:var(--tx)}
.tsub{font-size:10px;color:var(--mu2);margin-top:2px}
.tsw{width:34px;height:19px;background:var(--border);border-radius:10px;position:relative;flex-shrink:0;transition:background .2s}
.trow.on .tsw{background:var(--y)}
.tkn{width:13px;height:13px;background:var(--mu3);border-radius:50%;position:absolute;top:3px;left:3px;transition:all .2s}
.trow.on .tkn{left:18px;background:#0d0d0d}
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px}
.tab{flex:1;padding:10px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:var(--mu2);font-family:inherit;border-bottom:2px solid transparent;transition:all .2s}
.tab.act{color:var(--y);border-bottom-color:var(--y)}
.plaga-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.plaga-item{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.plaga-item.on{border-color:var(--y);background:var(--y4)}
.plaga-chk{width:16px;height:16px;border:2px solid var(--border);border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#0d0d0d}
.plaga-item.on .plaga-chk{background:var(--y);border-color:var(--y)}
.plaga-name{font-size:11px;color:var(--mu)}.plaga-item.on .plaga-name{color:var(--tx)}
.ibar{padding:10px 13px;background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--y);font-size:11px;color:var(--mu);margin-bottom:12px;line-height:1.5}
.ibar strong{color:var(--y)}
.textarea{background:var(--bg2);border:1px solid var(--border);color:var(--tx);padding:10px 12px;font-family:inherit;font-size:12px;outline:none;width:100%;resize:none;line-height:1.5}
.textarea:focus{border-color:var(--y)}
.folio-row{display:flex;gap:8px;align-items:center}
.folio-inp{background:var(--bg2);border:1px solid var(--y2);color:var(--y);padding:10px 12px;font-family:inherit;font-size:16px;font-weight:700;outline:none;width:100%;letter-spacing:.1em}
.foto-zone{border:1px dashed var(--border);padding:20px;text-align:center;cursor:pointer;background:var(--bg2);margin-bottom:8px}
.foto-thumb{width:70px;height:70px;object-fit:cover;border:1px solid var(--border)}
.foto-grid{display:flex;flex-wrap:wrap;gap:6px}
.remove-foto{background:var(--red);border:none;color:#fff;font-size:9px;font-weight:700;padding:2px 5px;cursor:pointer;display:block;width:70px;text-align:center;margin-top:2px}
.preview-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.95);z-index:100;overflow-y:auto;padding:16px}
.preview-close{position:fixed;top:12px;right:12px;background:var(--y);color:#0d0d0d;border:none;width:36px;height:36px;font-size:18px;font-weight:900;cursor:pointer;z-index:101;border-radius:50%}
/* PDF styles */
.pdf-page{background:#fff;color:#111;font-family:'Helvetica Neue',Arial,sans-serif;max-width:760px;margin:0 auto;padding:28px 32px;position:relative}
.pdf-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;border-bottom:3px solid #f5c800;padding-bottom:12px}
.pdf-logo-img{height:54px;object-fit:contain;display:block}
.pdf-co{text-align:right;font-size:10px;color:#444;line-height:1.6}
.pdf-co .lic{color:#f5a800;font-weight:900;font-size:11px}
.pdf-title{text-align:right;margin-top:6px}
.pdf-title h1{font-size:20px;font-weight:900;color:#111;text-transform:uppercase}
.pdf-title .fol{font-size:10px;color:#888;margin-top:2px}
.pdf-sec{margin:14px 0}
.pdf-sec h3{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.15em;color:#999;margin-bottom:7px;border-bottom:1px solid #eee;padding-bottom:3px}
.pdf-f{display:flex;margin-bottom:5px;font-size:11px}
.pdf-f label{font-weight:700;color:#444;min-width:150px;flex-shrink:0}
.pdf-f span{color:#111;border-bottom:1px solid #ddd;flex:1}
.pdf-plagas{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;margin:6px 0}
.pdf-pl{font-size:11px;font-weight:700;color:#111;padding:3px 0;display:flex;align-items:center;gap:5px}
.pdf-pl::before{content:"•";color:#f5c800;font-size:14px}
.pdf-svcs{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin:6px 0}
.pdf-svc{display:flex;align-items:center;gap:7px;font-size:10px;color:#444}
.pdf-sbox{width:11px;height:11px;border:1.5px solid #aaa;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:#f5a800}
.pdf-txt{font-size:10px;color:#444;line-height:1.7;text-align:justify;margin:6px 0}
.pdf-txt strong{color:#111}
.pdf-disc{background:#f9f9f9;border-left:3px solid #f5c800;padding:9px 13px;font-size:9px;color:#555;margin:10px 0;line-height:1.6}
.pdf-disc strong{color:#333}
.pdf-footer{display:flex;justify-content:space-between;align-items:flex-end;margin-top:20px;padding-top:14px;border-top:2px solid #f5c800}
.pdf-sign{text-align:center}
.pdf-sign .ln{border-top:1px solid #333;width:150px;margin:28px auto 4px}
.pdf-sign p{font-size:10px;color:#333;font-weight:700}
.pdf-sign .ced{font-size:9px;color:#f5a800;font-weight:700}
.pdf-wm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-30deg);opacity:.04;font-size:72px;font-weight:900;color:#f5c800;pointer-events:none;white-space:nowrap}
.pdf-copy{text-align:center;font-size:8px;color:#bbb;margin-top:10px}
.pdf-btmbar{background:#111;height:7px;margin:16px -32px -28px}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div>
      <div class="hdr-row"><div class="logo-wm">PLAGA<b>W</b>AY</div><div class="logo-pill">Docs</div></div>
      <div class="hdr-sub" id="cs-docs">Documentación oficial · Admin</div>
    </div>
    <div class="hdr-right">
      <button class="btn-sm" onclick="try{window.close()}catch(e){window.location.href='index.html'}">← App</button>
    </div>
  </div>
  <div class="cnt fade" id="cnt"></div>
</div>

<!-- FIX Bug 4: Firebase initialized in docs.html with getApps() to avoid double-init -->
<script type="module">
import{initializeApp,getApps}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getFirestore,doc,getDoc,setDoc,onSnapshot}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const CFG={apiKey:"AIzaSyCGz0t2xfeiMxYIcgVVQTp0bCHY6scIR_w",authDomain:"calculadora-plagaway.firebaseapp.com",projectId:"calculadora-plagaway",storageBucket:"calculadora-plagaway.firebasestorage.app",messagingSenderId:"257562908832",appId:"1:257562908832:web:14f673952eabba313c51c5"};
const fbApp=getApps().length===0?initializeApp(CFG):getApps()[0];
const fs=getFirestore(fbApp);
async function fGet(p){try{const s=await getDoc(doc(fs,p));return s.exists()?s.data():null}catch{return null}}
async function fSet(p,d){try{await setDoc(doc(fs,p),d,{merge:true});return true}catch{return false}}
window.FBDOCS={fGet,fSet};
async function initDocsFB(){
  const cfg=await fGet('config/shared');
  if(cfg){
    if(cfg.empresa)window._docsEmp=cfg.empresa;
    if(cfg.docsNextFolio!=null)window._nextFolio=cfg.docsNextFolio;
  }
  onSnapshot(doc(fs,'config/shared'),snap=>{
    if(snap.exists()){const d=snap.data();if(d.empresa)window._docsEmp=d.empresa;if(d.docsNextFolio!=null)window._nextFolio=d.docsNextFolio}
  });
  window._fbDocsReady=true;
  document.getElementById('cs-docs').textContent='Sincronizado · Firebase activo';
}
initDocsFB();
</script>

<script>
const db={get:k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}},set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))};
const DEF_EMP={nombre:'PLAGAWAY, Control de Plagas',direccion:'C. de la Reforma, Prados del Centenario, 83260 Hermosillo, Son.',email:'Contacto.plagaway@gmail.com',tel:'(662) 443 3211',licSanitaria:'1626A00166',licCoesprisson:'2626MOFJ12138',responsable:'Lic. Heriberto Montaño',cargoResponsable:'Responsable Sanitario',rfc:'',tagline:'Control total, plagas fuera',copyright:'© PLAGAWAY 2026',logo_url:''};
function getEmp(){return{...DEF_EMP,...(window._docsEmp||{}),  ...(db.get('pw_company')||{})}}
async function saveEmp(e){db.set('pw_company',e);if(window.FBDOCS)await window.FBDOCS.fSet('config/shared',{empresa:e})}

async function nextFolio(){
  const n=(window._nextFolio||db.get('pw_folio')||0)+1;
  window._nextFolio=n;db.set('pw_folio',n);
  if(window.FBDOCS)await window.FBDOCS.fSet('config/shared',{docsNextFolio:n});
  return String(n).padStart(4,'0');
}

// FIX Bug 2.6: logo comes from Firebase URL, no base64
function getLogoTag(){
  const url=getEmp().logo_url;
  if(url)return`<img class="pdf-logo-img" src="${url}" onerror="this.style.display='none'" alt="Logo">`;
  return`<div style="font-size:26px;font-weight:900;color:#111">PLAGA<span style="color:#f5c800">W</span>AY</div>`;
}

const PLAGAS=["Cucaracha de cocina","Cucaracha de alcantarilla","Grillo","Pescadito de plata","Araña viuda negra","Araña violinista","Mosca doméstica","Mosquito / Zancudo","Alacrán","Garrapata","Chinche de cama","Termita / Comején","Ratón / Rata","Hormiga","Polilla","Ciempiés","Tijerilla","Mata venados","Plaga de jardín"];
const SVCS=["Fumigación en almacenes, oficinas, restaurantes y hospitales","Tratamiento para termitas subterráneas y de madera seca","Tratamiento preventivo en obra nueva (preconstrucción)","Fumigación general de interiores y exteriores","Control de cucarachas","Control de hormigas","Colocación de cebos rodenticidas","Trampas mecánicas y adhesivas","Control de alacranes y escorpiones","Control de pulgas y garrapatas","Control de arañas","Control de voladores","Nebulización térmica","Desinfección de superficies","Sellado de drenajes y coladeras"];

let DT='poliza',AT='client',photos=[];
let P={folio:'',clientName:'',clientAddr:'',clientRFC:'',duracion:'',vDesde:'',vHasta:'',plagas:[],notas:'',garantia:30};
let C={folio:'',clientName:'',clientAddr:'',clientTel:'',clientRFC:'',fecha:'',hora:'',hIni:'',hFin:'',tecnico:'',plaguicida:'',dosis:'',metodo:'',plagas:[],servicios:[],notas:''};

// FIX Bug 5: read prefill from localStorage (works cross-window iOS)
function applyPrefill(){
  try{
    const raw=localStorage.getItem('pw_doc_prefill');if(!raw)return;
    localStorage.removeItem('pw_doc_prefill');
    const d=JSON.parse(raw);
    if(d.type)DT=d.type;
    if(d.clientName){P.clientName=C.clientName=d.clientName;P.clientAddr=C.clientAddr=d.clientAddr||''}
    if(d.duracion)P.duracion=d.duracion;
    if(d.garantia)P.garantia=d.garantia;
    if(d.plagas&&d.plagas.length)P.plagas=d.plagas.filter(pl=>PLAGAS.includes(pl));
    if(d.notas){P.notas=d.notas;C.notas=d.notas}
    const today=new Date().toISOString().split('T')[0];
    C.fecha=today;P.vDesde=today;
  }catch(e){console.error('prefill',e)}
}

function render(){
  const c=document.getElementById('cnt');c.className='cnt fade';void c.offsetWidth;
  c.innerHTML=buildUI();attachAll();
}

function buildUI(){
  const s=DT==='poliza'?P:C;
  return`<div class="st"><span class="st-n">📄</span><span class="st-h">Documentos oficiales</span></div>
  <div class="blk"><span class="lbl">Tipo de documento</span>
    <div class="g2">
      <button class="card ${DT==='poliza'?'on':''}" id="btn-poliza"><div class="ct">📋 Póliza de Servicio</div><div class="cs">Contrato y garantía</div></button>
      <button class="card ${DT==='cert'?'on':''}" id="btn-cert"><div class="ct">🏅 Certificado</div><div class="cs">Comprobante de aplicación</div></button>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab ${AT==='client'?'act':''}" id="tab-client">Cliente</button>
    <button class="tab ${AT==='plagas'?'act':''}" id="tab-plagas">Plagas</button>
    ${DT==='cert'?`<button class="tab ${AT==='svc'?'act':''}" id="tab-svc">Servicio</button>`:''}
    <button class="tab ${AT==='co'?'act':''}" id="tab-co">Empresa</button>
  </div>
  <div id="tab-content">${AT==='client'?rClient():AT==='plagas'?rPlagas():AT==='svc'?rSvc():rCo()}</div>
  <div class="blk" style="margin-top:4px">
    <span class="lbl">Fotos de evidencia</span>
    <div class="foto-zone" id="foto-zone"><div style="font-size:26px;margin-bottom:5px">📷</div><div style="font-size:12px;color:var(--mu2)">Toca para agregar foto</div></div>
    <input type="file" id="fi" accept="image/*" multiple capture="environment" style="display:none">
    ${photos.length?`<div class="foto-grid">${photos.map((p,i)=>`<div><img class="foto-thumb" src="${p}"><button class="remove-foto" data-i="${i}">✕ Quitar</button></div>`).join('')}</div>`:''}
  </div>
  <button class="cta oy" id="btn-preview">👁️ Vista previa</button>
  <button class="cta" id="btn-pdf">📄 Generar PDF</button>
  <button class="cta og" id="btn-share">📤 Compartir por WhatsApp</button>`;
}

function attachAll(){
  document.getElementById('btn-poliza')?.addEventListener('click',()=>{DT='poliza';AT='client';render()});
  document.getElementById('btn-cert')?.addEventListener('click',()=>{DT='cert';AT='client';render()});
  document.getElementById('tab-client')?.addEventListener('click',()=>{AT='client';render()});
  document.getElementById('tab-plagas')?.addEventListener('click',()=>{AT='plagas';render()});
  document.getElementById('tab-svc')?.addEventListener('click',()=>{AT='svc';render()});
  document.getElementById('tab-co')?.addEventListener('click',()=>{AT='co';render()});
  document.getElementById('foto-zone')?.addEventListener('click',()=>document.getElementById('fi').click());
  document.getElementById('fi')?.addEventListener('change',function(){Array.from(this.files).forEach(f=>{const r=new FileReader();r.onload=e=>{photos.push(e.target.result);render()};r.readAsDataURL(f)})});
  document.querySelectorAll('.remove-foto').forEach(btn=>btn.addEventListener('click',()=>{photos.splice(+btn.dataset.i,1);render()}));
  document.getElementById('btn-preview')?.addEventListener('click',doPreview);
  document.getElementById('btn-pdf')?.addEventListener('click',()=>doGenPDF());
  document.getElementById('btn-share')?.addEventListener('click',doShare);
  // Inputs — use blur delegation
  document.getElementById('tab-content')?.querySelectorAll('[data-field]').forEach(el=>{
    el.addEventListener('input',()=>{const ref=DT==='poliza'?P:C;ref[el.dataset.field]=el.value});
  });
  document.getElementById('tab-content')?.querySelectorAll('[data-cokey]').forEach(el=>{
    el.addEventListener('blur',async()=>{const emp=getEmp();emp[el.dataset.cokey]=el.value;await saveEmp(emp)});
  });
  document.getElementById('btn-auto-folio')?.addEventListener('click',async()=>{
    const f=await nextFolio();if(DT==='poliza')P.folio=f;else C.folio=f;render();
  });
  // Garantia buttons
  document.querySelectorAll('[data-g]').forEach(btn=>{btn.addEventListener('click',()=>{P.garantia=+btn.dataset.g||0;render()})});
  // Plaga toggles
  document.querySelectorAll('[data-plaga]').forEach(el=>{el.addEventListener('click',()=>{
    const p=PLAGAS[+el.dataset.plaga];const s=DT==='poliza'?P:C;
    const i=s.plagas.indexOf(p);if(i>=0)s.plagas.splice(i,1);else s.plagas.push(p);render();
  })});
  // Service toggles
  document.querySelectorAll('[data-svc]').forEach(el=>{el.addEventListener('click',()=>{
    const sv=SVCS[+el.dataset.svc];const i=C.servicios.indexOf(sv);if(i>=0)C.servicios.splice(i,1);else C.servicios.push(sv);render();
  })});
  document.getElementById('btn-reset-co')?.addEventListener('click',async()=>{if(confirm('¿Restablecer datos?')){await saveEmp({});render()}});
}

function rClient(){
  const s=DT==='poliza'?P:C;const today=new Date().toISOString().split('T')[0];
  return`<div class="blk">
    <span class="lbl">Folio</span>
    <div class="folio-row">
      <input class="folio-inp" type="text" placeholder="Auto" value="${s.folio}" data-field="folio">
      <button class="btn-sm" id="btn-auto-folio">Auto →</button>
    </div>
  </div>
  <div class="blk"><span class="lbl">Datos del cliente</span>
    <input class="inp" data-field="clientName" placeholder="Nombre o empresa *" value="${s.clientName}" style="margin-bottom:7px">
    <input class="inp" data-field="clientAddr" placeholder="Dirección *" value="${s.clientAddr}" style="margin-bottom:7px">
    ${DT==='cert'?`<input class="inp" data-field="clientTel" placeholder="Teléfono" value="${C.clientTel}" style="margin-bottom:7px">`:''}
    <input class="inp" data-field="clientRFC" placeholder="RFC (opcional)" value="${s.clientRFC}">
  </div>
  ${DT==='poliza'?`<div class="blk"><span class="lbl">Vigencia</span>
    <input class="inp" data-field="duracion" placeholder="Duración (ej. 6 MESES, 1 AÑO)" value="${P.duracion}" style="margin-bottom:7px">

function fmtD(d){if(!d)return'___________';const[y,m,day]=d.split('-');const M=['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];return`${parseInt(day)} de ${M[parseInt(m)]} de ${y}`}

function buildPDFHTML(){

  return DT==='poliza'?buildPHTML(co,folio,fecha,LOGO):buildCHTML(co,folio,fecha,LOGO);

function doPreview(){
  const html=buildPDFHTML();
  const o=document.createElement('div');o.className='preview-overlay';o.id='po';
  const closeBtn=document.createElement('button');closeBtn.className='preview-close';closeBtn.textContent='✕';closeBtn.onclick=()=>o.remove();
  o.appendChild(closeBtn);o.innerHTML+=html;
  document.body.appendChild(o);
}

async function doGenPDF(){
  const s=DT==='poliza'?P:C;
  if(!s.folio)s.folio=await nextFolio();
  const html=buildPDFHTML();
  const STYLE=document.querySelector('style').innerHTML;
  const w=window.open('','_blank');
  if(!w){toast('Permite ventanas emergentes');return}
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Plagaway ${DT==='poliza'?'Póliza':'Certificado'} ${s.folio}</title>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Helvetica Neue',Arial,sans-serif;background:#fff}
  ${STYLE}
  @media print{body{margin:0}.pdf-page{max-width:100%!important;padding:20px!important}#pbar{display:none!important}}</style>
  </head><body>
  <div id="pbar" style="padding:14px 20px;background:#f5f5f5;border-bottom:1px solid #ddd;display:flex;align-items:center;gap:12px">
    <button onclick="window.print()" style="background:#f5c800;border:none;padding:10px 22px;font-weight:900;font-size:13px;cursor:pointer">🖨️ Guardar como PDF</button>
    <button onclick="window.close()" style="background:#eee;border:none;padding:10px 16px;font-size:12px;cursor:pointer;margin-left:auto">✕</button>
  </div>
  ${html}</body></html>`);
  w.document.close();
  toast('PDF listo — Guardar como PDF al imprimir');
}

function doShare(){
  const co=getEmp();const s=DT==='poliza'?P:C;
  const folio=s.folio||'____';const fecha=new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'long',year:'numeric'});
  let txt='';
  if(DT==='poliza'){
    txt=`*PLAGAWAY · PÓLIZA DE SERVICIO* 📋\n_${co.licSanitaria} · Lic. Sanitaria COFEPRIS_\n━━━━━━━━━━━━━━━━━━━\n\n📄 *Folio: ${folio}* · ${fecha}\n🏢 *Cliente:* ${P.clientName}\n📍 ${P.clientAddr}\n⏳ *Duración:* ${P.duracion}\n📆 ${fmtD(P.vDesde)} al ${fmtD(P.vHasta)}\n\n🦟 *Plagas cubiertas:*\n${P.plagas.map(p=>`▸ ${p}`).join('\n')}\n\n🛡️ *Garantía:* ${P.garantia} días.\n\n⚠️ *Cláusula de transparencia:* El precio cotizado es un estimado. Si detectamos condiciones imprevistas durante el servicio, notificamos de inmediato. Ningún cargo adicional sin su aprobación.\n\n━━━━━━━━━━━━━━━━━━━\n✍️ ${co.responsable} · ${co.cargoResponsable}\n📋 ${co.licCoesprisson}\n📞 ${co.tel} · ${co.email}\n_"${co.tagline}"_ 🦟`;
  }else{
    txt=`*PLAGAWAY · CERTIFICADO DE FUMIGACIÓN* 🏅\n_${co.licSanitaria} · Lic. Sanitaria COFEPRIS_\n━━━━━━━━━━━━━━━━━━━\n\n📄 *Folio: ${folio}*\n📅 ${fmtD(C.fecha)} · ${C.hora}\n🕐 Inicio: ${C.hIni} — Fin: ${C.hFin}\n🏢 *Cliente:* ${C.clientName}\n📍 ${C.clientAddr}\n👷 *Técnico:* ${C.tecnico}\n🧪 *Plaguicida:* ${C.plaguicida} · *Dosis:* ${C.dosis}\n🔧 *Método:* ${C.metodo}\n\n🦟 *Plagas tratadas:*\n${C.plagas.map(p=>`▸ ${p}`).join('\n')}\n\n✅ *Servicios:*\n${C.servicios.map(sv=>`▸ ${sv}`).join('\n')}\n\n━━━━━━━━━━━━━━━━━━━\n✍️ ${co.responsable} · ${co.cargoResponsable}\n📋 ${co.licCoesprisson}\n📞 ${co.tel}\n_"${co.tagline}"_ 🦟`;
  }
  if(navigator.share)navigator.share({text:txt}).catch(()=>cp(txt));else cp(txt);
}
function cp(t){navigator.clipboard.writeText(t).then(()=>toast('Copiado ✓')).catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Copiado ✓')})}
function toast(msg){const t=document.createElement('div');t.textContent=msg;t.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#f5c800;color:#0d0d0d;padding:10px 20px;font-weight:900;font-size:12px;z-index:999;white-space:nowrap;border-radius:2px';document.body.appendChild(t);setTimeout(()=>t.remove(),2500)}

applyPrefill();
render();
</script>
