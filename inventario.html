<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Plagaway · Inventario</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0d0d;--bg2:#141414;--bg3:#1c1c1c;--border:#272727;--border2:#1e1e1e;--y:#f5c800;--y2:#c9a200;--y3:#7a6100;--y4:#1a1600;--tx:#f5f0e8;--tx2:#c8c0b0;--mu:#888880;--mu2:#555550;--mu3:#333330;--red:#ff4444;--blue:#4ac8f0;--green:#72c040;--orange:#ff8844}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Helvetica Neue',Arial,sans-serif;overscroll-behavior:none;font-size:15px}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.hdr{padding:13px 18px 10px;border-bottom:2px solid var(--y3);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--bg);z-index:20}
.logo-wm{font-size:22px;font-weight:900;color:var(--tx);letter-spacing:-1px;line-height:1}.logo-wm b{color:var(--y)}
.logo-pill{background:var(--y);color:#0d0d0d;font-size:7px;font-weight:900;letter-spacing:.15em;padding:3px 6px;text-transform:uppercase;align-self:flex-start;margin-top:2px}
.hdr-row{display:flex;align-items:center;gap:8px}
.hdr-sub{font-size:9px;color:var(--mu2);margin-top:4px}
.hdr-right{display:flex;gap:7px;align-items:center;margin-top:2px}
.btn-sm{background:transparent;border:1px solid var(--border);color:var(--mu);padding:7px 11px;font-size:9px;font-weight:700;letter-spacing:.1em;cursor:pointer;text-transform:uppercase;font-family:inherit}
.cnt{padding:18px 18px 40px;flex:1}
.fade{animation:fu .22s ease both}
@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.st{margin-bottom:16px;display:flex;align-items:baseline;gap:10px}
.st-n{font-size:10px;font-weight:900;color:#0d0d0d;background:var(--y);padding:3px 7px;letter-spacing:.1em;flex-shrink:0}
.st-h{font-size:18px;font-weight:700;color:var(--tx)}
.lbl{font-size:10px;font-weight:700;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;display:block}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.inp{background:var(--bg2);border:1px solid var(--border);color:var(--tx);padding:10px 12px;font-family:inherit;font-size:13px;outline:none;width:100%}
.inp:focus{border-color:var(--y)}
.blk{margin-bottom:18px}
.cta{width:100%;background:var(--y);color:#0d0d0d;border:none;padding:15px;font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-family:inherit;font-weight:900;cursor:pointer;margin-top:10px;transition:opacity .15s}
.cta:active{opacity:.85}
.cta.sec{background:transparent;border:1px solid var(--border);color:var(--mu);font-weight:700}
.cta.oy{background:transparent;border:2px solid var(--y);color:var(--y);font-weight:900}
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{flex:1;padding:10px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:var(--mu2);font-family:inherit;border-bottom:2px solid transparent;transition:all .2s}
.tab.act{color:var(--y);border-bottom-color:var(--y)}
.inv-card{background:var(--bg2);border:1px solid var(--border);padding:12px 14px;margin-bottom:7px}
.inv-card.low{border-left:3px solid var(--orange)}
.inv-card.ok{border-left:3px solid var(--green)}
.inv-name{font-size:14px;font-weight:700;color:var(--tx);margin-bottom:3px}
.inv-price{font-size:16px;font-weight:700;color:var(--y)}
.inv-meta{font-size:10px;color:var(--mu2);margin-top:3px}
.inv-stock{font-size:11px;font-weight:700}
.stock-ok{color:var(--green)}.stock-low{color:var(--orange)}.stock-none{color:var(--red)}
.inv-del{background:transparent;border:none;color:var(--mu3);font-size:16px;cursor:pointer;padding:2px 6px;font-weight:700}
.inv-edit{background:transparent;border:none;color:var(--blue);font-size:14px;cursor:pointer;padding:2px 6px;font-weight:700}
.add-form{background:var(--bg3);border:1px solid var(--y3);padding:14px;margin-bottom:16px}
.add-form-title{font-size:10px;font-weight:800;color:var(--y2);letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px}
.inp-sm{background:var(--bg2);border:1px solid var(--border);color:var(--tx);padding:8px 10px;font-family:inherit;font-size:12px;outline:none;width:100%}
.inp-sm:focus{border-color:var(--y)}
.sel{background:var(--bg2);border:1px solid var(--border);color:var(--mu);padding:9px 10px;font-family:inherit;font-size:12px;outline:none;width:100%}
.badge{display:inline-block;font-size:8px;font-weight:900;padding:2px 7px;letter-spacing:.1em;border-radius:2px}
.badge-chem{background:#1a0800;color:var(--orange);border:1px solid var(--orange)}
.badge-prod{background:#001a2e;color:var(--blue);border:1px solid var(--blue)}
.badge-svc{background:var(--y4);color:var(--y);border:1px solid var(--y)}
.ibar{padding:10px 13px;background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--y);font-size:11px;color:var(--mu);margin-bottom:12px;line-height:1.5}
.ibar strong{color:var(--y)}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div>
      <div class="hdr-row"><div class="logo-wm">PLAGA<b>W</b>AY</div><div class="logo-pill">Inventario</div></div>
      <div class="hdr-sub" id="cs"><span style="width:7px;height:7px;border-radius:50%;background:var(--mu3);display:inline-block;margin-right:4px"></span>Conectando...</div>
    </div>
    <div class="hdr-right">
      <button class="btn-sm" onclick="try{window.close()}catch(e){window.location.href='index.html'}">← App</button>
    </div>
  </div>
  <div class="cnt fade" id="cnt"></div>
</div>

<script type="module">
import{initializeApp,getApps}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getFirestore,doc,setDoc,onSnapshot}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const CFG={apiKey:"AIzaSyCGz0t2xfeiMxYIcgVVQTp0bCHY6scIR_w",authDomain:"calculadora-plagaway.firebaseapp.com",projectId:"calculadora-plagaway",storageBucket:"calculaway.firebasestorage.app",messagingSenderId:"257562908832",appId:"1:257562908832:web:14f673952eabba313c51c5"};
const fbApp=getApps().length===0?initializeApp(CFG):getApps()[0];
const fs=getFirestore(fbApp);
async function fSet(p,d){try{await setDoc(doc(fs,p),d,{merge:true});return true}catch{return false}}
window.FBINV={fSet};
onSnapshot(doc(fs,'config/shared'),snap=>{
  if(snap.exists()){const d=snap.data();
    if(d.inventory)window._inv=d.inventory;
    if(d.adminPin)window._apin=d.adminPin;
    if(d.techPin)window._tpin=d.techPin;
  }
  window._invReady=true;
  document.getElementById('cs').innerHTML='<span class="sync-dot" style="background:var(--green)"></span>Sincronizado';
  if(window._invRender)window._invRender();
});
setTimeout(()=>{if(!window._invInited)checkAccess()},1200);
</script>

<script>
const db={get:k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}},set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))};
const fmt=n=>'$'+Number(n).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
const DEF_INV=[
  {id:'cynoff',name:'Cynoff 40',type:'chemical',price:16.25,unit:'L',stock:null,minStock:5},
  {id:'demand',name:'Demand Duo',type:'chemical',price:21.73,unit:'L',stock:null,minStock:5},
  {id:'cebo',name:'Cebadero roedores',type:'product',price:200,unit:'pza',stock:null,minStock:10},
  {id:'trampa_luz',name:'Trampa de luz',type:'product',price:200,unit:'pza',stock:null,minStock:3},
  {id:'trampa_mosca',name:'Trampa para moscas',type:'product',price:200,unit:'pza',stock:null,minStock:3},
  {id:'zona_foranea',name:'Zona foránea',type:'service',price:200,unit:'km_base',stock:null,minStock:null,pricePerKm:8},
  {id:'certificado',name:'Certificado COESPRISSON',type:'service',price:450,unit:'pza',stock:null,minStock:null},
  {id:'hormiguero',name:'Tratamiento hormigueros',type:'service',price:50,unit:'pza',stock:null,minStock:null},
];

function isAdmin(){return window._invRole==='admin'}
function getInv(){return window._inv||DEF_INV}
async function saveInv(v){window._inv=v;if(window.FBINV)await window.FBINV.fSet('config/shared',{inventory:v});if(window._invRender)window._invRender()}

function checkAccess(){
  if(window._invInited)return;window._invInited=true;
  const saved=sessionStorage.getItem('pw_inv_role');
  if(saved){window._invRole=saved;init();return}
  const ps=document.createElement('div');
  ps.style.cssText='position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:999;padding:20px';
  let buf='',selRole='admin';
  function draw(err=''){
    ps.innerHTML=`<div style="font-size:28px;font-weight:900;color:var(--tx)">PLAGA<span style="color:var(--y)">W</span>AY</div>
    <div style="font-size:11px;color:var(--mu2);text-transform:uppercase;letter-spacing:.1em">Módulo de Inventario</div>
    <div style="display:flex;gap:10px;width:220px">
      <div style="flex:1;padding:10px;border:1px solid ${selRole==='tech'?'var(--y)':'var(--border)'};background:${selRole==='tech'?'var(--y4)':'var(--bg2)'};cursor:pointer;text-align:center;font-size:12px;font-weight:700;color:${selRole==='tech'?'var(--y)':'var(--mu)'}" onclick="this.parentElement._sr('tech')">👷 Técnico</div>
      <div style="flex:1;padding:10px;border:1px solid ${selRole==='admin'?'var(--y)':'var(--border)'};background:${selRole==='admin'?'var(--y4)':'var(--bg2)'};cursor:pointer;text-align:center;font-size:12px;font-weight:700;color:${selRole==='admin'?'var(--y)':'var(--mu)'}" onclick="this.parentElement._sr('admin')">🔑 Admin</div>
    </div>
    <div style="display:flex;gap:12px">${[0,1,2,3].map(i=>`<div style="width:13px;height:13px;border-radius:50%;border:2px solid var(--border);${buf.length>i?'background:var(--y);border-color:var(--y)':''}"></div>`).join('')}</div>
    <div style="color:var(--red);font-size:11px;font-weight:700;min-height:15px">${err}</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:220px">
      ${[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k=>`<button style="background:var(--bg2);border:1px solid var(--border);color:var(--tx);font-size:20px;font-weight:600;padding:16px;cursor:pointer;border-radius:50%;font-family:inherit;visibility:${k===''?'hidden':'visible'}" onclick="this.closest('[data-pin]')._pk('${k}')">${k}</button>`).join('')}
    </div>`;
    ps.setAttribute('data-pin','1');
    ps._sr=r=>{selRole=r;draw()};
    ps._pk=k=>{if(k==='⌫'){buf=buf.slice(0,-1);draw();return}if(buf.length>=4)return;buf+=k;draw();if(buf.length===4)setTimeout(()=>check(buf),120)};
  }
  function check(entered){
    const ap=window._apin||'1234',tp=window._tpin||'0000';
    if(selRole==='admin'&&entered===ap){unlock('admin')}
    else if(selRole==='tech'&&entered===tp){unlock('tech')}
    else{buf='';draw('PIN incorrecto')}
  }
  function unlock(role){window._invRole=role;sessionStorage.setItem('pw_inv_role',role);ps.remove();init()}
  document.body.appendChild(ps);draw();
}

let activeTab='all',editingId=null;
function init(){window._invRender=()=>render();render()}

function render(){
  const inv=getInv();
  const chems=inv.filter(x=>x.type==='chemical');
  const prods=inv.filter(x=>x.type==='product');
  const svcs=inv.filter(x=>x.type==='service');
  const lowStock=inv.filter(x=>x.minStock!=null&&x.stock!=null&&x.stock<=x.minStock);

  const tabs=[{id:'all',label:`Todo (${inv.length})`},{id:'chemical',label:`Químicos (${chems.length})`},{id:'product',label:`Productos (${prods.length})`},{id:'service',label:`Extras (${svcs.length})`}];
  let lista=activeTab==='all'?inv:inv.filter(x=>x.type===activeTab);

  const c=document.getElementById('cnt');c.className='cnt fade';void c.offsetWidth;
  c.innerHTML=`<div class="st"><span class="st-n">📦</span><span class="st-h">Inventario</span></div>
  ${lowStock.length?`<div class="ibar" style="border-left-color:var(--orange)"><strong style="color:var(--orange)">⚠️ Stock bajo:</strong> ${lowStock.map(x=>x.name).join(', ')}</div>`:''}
  <div class="tab-bar">
    ${tabs.map(t=>`<button class="tab ${activeTab===t.id?'act':''}" onclick="activeTab='${t.id}';render()">${t.label}</button>`).join('')}
  </div>
  ${isAdmin()?`<div class="add-form">
    <div class="add-form-title">${editingId?'Editar artículo':'+ Agregar artículo'}</div>
    <input class="inp" id="iname" placeholder="Nombre del artículo *" style="margin-bottom:7px">
    <div class="f-row">
      <select class="sel" id="itype">
        <option value="chemical">🧪 Químico</option>
        <option value="product">📦 Producto</option>
        <option value="service">⚡ Extra de servicio</option>
      </select>
      <input class="inp-sm" id="iunit" placeholder="Unidad (L, pza, km_base...)">
    </div>
    <div class="f-row">
      <div><div style="font-size:9px;color:var(--mu2);margin-bottom:3px">Precio</div><input class="inp-sm" id="iprice" type="number" placeholder="0.00"></div>
      <div><div style="font-size:9px;color:var(--mu2);margin-bottom:3px">Precio/km (foráneo)</div><input class="inp-sm" id="iperkm" type="number" placeholder="0"></div>
    </div>
    <div class="f-row">
      <div><div style="font-size:9px;color:var(--mu2);margin-bottom:3px">Stock actual</div><input class="inp-sm" id="istock" type="number" placeholder="null = sin control"></div>
      <div><div style="font-size:9px;color:var(--mu2);margin-bottom:3px">Stock mínimo</div><input class="inp-sm" id="iminstock" type="number" placeholder="Alerta en"></div>
    </div>
    <div style="display:flex;gap:7px;margin-top:6px">
      <button class="cta" style="margin-top:0" onclick="saveItem()">💾 ${editingId?'Actualizar':'Agregar'}</button>
      ${editingId?`<button class="cta sec" style="margin-top:0" onclick="cancelEdit()">Cancelar</button>`:''}
    </div>
  </div>`:''}
  <div>
    ${lista.map(item=>{
      const isLow=item.minStock!=null&&item.stock!=null&&item.stock<=item.minStock;
      const stockClass=item.stock==null?'':isLow?'stock-low':'stock-ok';
      return`<div class="inv-card ${item.stock==null?'':isLow?'low':'ok'}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:7px;margin-bottom:4px">
              <div class="inv-name">${item.name}</div>
              <span class="badge ${item.type==='chemical'?'badge-chem':item.type==='product'?'badge-prod':'badge-svc'}">${item.type==='chemical'?'QUÍMICO':item.type==='product'?'PRODUCTO':'SERVICIO'}</span>
            </div>
            <div class="inv-price">${fmt(item.price)}<span style="font-size:11px;font-weight:400;color:var(--mu2)">/${item.unit}</span>
              ${item.pricePerKm?` <span style="font-size:10px;color:var(--mu2)">+ ${fmt(item.pricePerKm)}/km</span>`:''}</div>
            ${item.stock!=null?`<div class="inv-stock ${stockClass}" style="margin-top:4px">Stock: ${item.stock} ${item.unit}${item.minStock!=null?` · Mín: ${item.minStock}`:''}</div>`:'<div class="inv-meta">Sin control de stock</div>'}
          </div>
          ${isAdmin()?`<div style="display:flex;gap:2px;margin-left:8px">
            <button class="inv-edit" onclick="startEdit('${item.id}')">✏️</button>
            <button class="inv-del" onclick="delItem('${item.id}')">✕</button>
          </div>`:''}
        </div>
        ${item.stock!=null&&isAdmin()?`<div style="display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border2)">
          <span style="font-size:11px;color:var(--mu2)">Actualizar stock:</span>
          <button style="background:var(--border);border:none;color:var(--tx);width:28px;height:28px;font-size:14px;cursor:pointer;font-weight:700;font-family:inherit" onclick="adjStock('${item.id}',-1)">−</button>
          <span style="font-size:14px;font-weight:700;color:var(--y);min-width:30px;text-align:center">${item.stock}</span>
          <button style="background:var(--border);border:none;color:var(--tx);width:28px;height:28px;font-size:14px;cursor:pointer;font-weight:700;font-family:inherit" onclick="adjStock('${item.id}',1)">+</button>
          <span style="font-size:10px;color:var(--mu2)">${item.unit}</span>
        </div>`:''}`}).join('')}
    ${lista.length===0?`<div style="text-align:center;padding:40px 20px;color:var(--mu3)"><div style="font-size:30px;margin-bottom:8px">📦</div><div>Sin artículos en esta categoría.</div></div>`:''}
  </div>`;

  // Pre-fill edit form
  if(editingId&&isAdmin()){
    const item=inv.find(x=>x.id===editingId);
    if(item){
      const n=document.getElementById('iname');if(n)n.value=item.name;
      const ty=document.getElementById('itype');if(ty)ty.value=item.type;
      const u=document.getElementById('iunit');if(u)u.value=item.unit;
      const p=document.getElementById('iprice');if(p)p.value=item.price;
      const pk=document.getElementById('iperkm');if(pk)pk.value=item.pricePerKm||'';
      const s=document.getElementById('istock');if(s)s.value=item.stock!=null?item.stock:'';
      const ms=document.getElementById('iminstock');if(ms)ms.value=item.minStock!=null?item.minStock:'';
    }
  }
}

function startEdit(id){editingId=id;render();document.getElementById('iname')?.focus();document.getElementById('iname')?.scrollIntoView({behavior:'smooth',block:'start'})}
function cancelEdit(){editingId=null;render()}

async function saveItem(){
  const name=document.getElementById('iname').value.trim();
  if(!name){toast('El nombre es obligatorio');return}
  const type=document.getElementById('itype').value;
  const unit=document.getElementById('iunit').value.trim()||'pza';
  const price=parseFloat(document.getElementById('iprice').value)||0;
  const pricePerKm=parseFloat(document.getElementById('iperkm').value)||null;
  const stockVal=document.getElementById('istock').value;
  const minStockVal=document.getElementById('iminstock').value;
  const stock=stockVal!==''?parseFloat(stockVal):null;
  const minStock=minStockVal!==''?parseFloat(minStockVal):null;

  const inv=[...getInv()];
  if(editingId){
    const idx=inv.findIndex(x=>x.id===editingId);
    if(idx>=0)inv[idx]={...inv[idx],name,type,unit,price,pricePerKm,stock,minStock};
  }else{
    const id=name.toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/__+/g,'_').slice(0,30)+'_'+Date.now().toString().slice(-4);
    inv.push({id,name,type,unit,price,pricePerKm,stock,minStock});
  }
  await saveInv(inv);editingId=null;toast(editingId?'Actualizado ✓':'Artículo agregado ✓');
}

async function delItem(id){
  const item=getInv().find(x=>x.id===id);
  if(!confirm(`¿Eliminar "${item?.name}"? Esto afecta el cotizador.`))return;
  await saveInv(getInv().filter(x=>x.id!==id));toast('Eliminado');
}

async function adjStock(id,delta){
  const inv=[...getInv()];const idx=inv.findIndex(x=>x.id===id);if(idx<0)return;
  const cur=inv[idx].stock||0;inv[idx].stock=Math.max(0,cur+delta);
  await saveInv(inv);
}

function toast(msg){const t=document.createElement('div');t.textContent=msg;t.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--y);color:#0d0d0d;padding:10px 20px;font-weight:900;font-size:12px;z-index:999;white-space:nowrap;border-radius:2px';document.body.appendChild(t);setTimeout(()=>t.remove(),2500)}

window.startEdit=startEdit;window.cancelEdit=cancelEdit;window.saveItem=saveItem;
window.delItem=delItem;window.adjStock=adjStock;window.activeTab='all';
</script>
</body>
</html>
